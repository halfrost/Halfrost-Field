name: Deploy Blog

on:
  push:
    branches:
      - master  # 只在master上push触发部署
      - add_hugo
    paths-ignore:   # 下列文件的变更不触发部署，可以自行添加
      - README.md
      - LICENSE

jobs:
  deploy:

    runs-on: ubuntu-latest   # 使用ubuntu系统镜像运行自动化脚本

    steps:  # 自动化步骤
    - uses: actions/checkout@v4   # 第一步，下载代码仓库

    - name: Setup Hugo  # 第二步，安装 hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: '0.74.3'

    - name: Build  # 第三步，编译 hugo
      run: |
        cd ./website
        hugo -D --minify
    - name: Deploy to Server  # 第四步，rsync 推文件
      # 原 AEnterprise/rsync-deploy@v1.0 的容器基于 EOL 的 debian:9.5，apt 源已 404 无法构建，
      # 换成活跃维护、基于 Node 的 easingthemes/ssh-deploy（复用相同的三个 secrets）。
      uses: easingthemes/ssh-deploy@v6.0.3
      with:
        SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}   # 引用配置，SSH 私钥
        REMOTE_HOST: ${{ secrets.SSH_HOST }}         # 服务器 host（IP 或 domain.com）
        REMOTE_USER: ${{ secrets.SSH_USERNAME }}     # 服务器登录名
        REMOTE_PORT: "22"                            # SSH 端口
        SOURCE: "website/public/"                    # 源目录，末尾 / 表示推送目录内容
        TARGET: "/var/www/new_blog/"                 # 部署到目标文件夹
        ARGS: "-avz --delete"                        # rsync 参数（归档 + 删除服务器多余文件）
        EXCLUDE: "*.pyc"                             # 排除 .pyc 文件
        # DEPLOY_KEY 是 RSA 密钥，新版 OpenSSH 默认禁用 SHA-1 的 ssh-rsa 签名，
        # 而服务器只支持 ssh-rsa，导致 “no mutual signature supported / Permission denied”。
        # 这里在客户端重新允许 ssh-rsa 签名与主机密钥算法。
        SSH_CMD_ARGS: "-o StrictHostKeyChecking=no, -o PubkeyAcceptedAlgorithms=+ssh-rsa, -o HostKeyAlgorithms=+ssh-rsa"
