name: Update Star History Chart

on:
  schedule:
    - cron: "0 3 * * 1"   # every Monday 03:00 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate star history chart
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 .github/scripts/gen_star_history.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- contents/images/star-history.svg; then
            echo "Star history chart unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add contents/images/star-history.svg
            git commit -m "chore: update star history chart [skip ci]"
            git push
          fi
