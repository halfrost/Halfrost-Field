<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="610" viewBox="0 0 1080 610" role="img" aria-label="协议边界：请求模式 → 采样参数（SamplingParams）">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="610" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">协议边界：请求模式 → 采样参数（SamplingParams）</tspan></text>
<rect x="36" y="96" width="624" height="268" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="54" y="125.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="54" dy="0">宽松的 HTTP 边缘 · 记录意图（向前兼容）</tspan></text><rect class="rough" x="52" y="150" width="184" height="84" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="180.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="144" dy="0">HTTP JSON</tspan></text><text x="144" y="207.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="144" dy="0">保留未知键（extra=all</tspan><tspan x="144" dy="17.36">ow）</tspan></text><path d="M 236 192 L 243.0 192.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 250 192 L 239.0 196.4 L 239.0 187.6 z" fill="#30363d"/><rect class="rough" x="250" y="150" width="184" height="84" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="342" y="180.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="342" dy="0">pydantic 请求模型</tspan></text><text x="342" y="207.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="342" dy="0">None = 未设 ·</tspan><tspan x="342" dy="17.36">无数值边界</tspan></text><path d="M 434 192 L 441.0 192.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 448 192 L 437.0 196.4 L 437.0 187.6 z" fill="#30363d"/><rect class="rough" x="448" y="150" width="192" height="84" rx="12" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="544" y="180.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="544" dy="0">to_sampling_params</tspan></text><text x="544" y="207.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="544" dy="0">解析 · 合并 stop ·</tspan><tspan x="544" dy="17.36">选择节奏</tspan></text><rect class="rough" x="52" y="248" width="124" height="44" rx="22" fill="#e5f4e9" stroke="#30363d" stroke-width="1.8"/><text x="114" y="275.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="114" dy="0">请求值</tspan></text><rect class="rough" x="190" y="248" width="214" height="44" rx="22" fill="#b9dfc3" stroke="#30363d" stroke-width="1.8"/><text x="297" y="266.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="297" dy="0">每模型默认 ·</tspan><tspan x="297" dy="17.36">generation_config.json</tspan></text><rect class="rough" x="418" y="248" width="228" height="44" rx="22" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="532" y="266.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="532" dy="0">中性</tspan><tspan x="532" dy="17.36">_DEFAULT_SAMPLING_PARAMS</tspan></text><path d="M 176 270 L 183.0 270.0" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 190 270 L 179.0 274.4 L 179.0 265.6 z" fill="#66717a"/><path d="M 404 270 L 411.0 270.0" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 418 270 L 407.0 274.4 L 407.0 265.6 z" fill="#66717a"/><rect class="rough" x="52" y="306" width="292" height="44" rx="22" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="198" y="324.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="198" dy="0">output_kind = 流式则 DELTA，否则</tspan><tspan x="198" dy="17.36">FINAL_ONLY</tspan></text><rect class="rough" x="360" y="306" width="286" height="44" rx="22" fill="#fff0d8" stroke="#30363d" stroke-width="1.8"/><text x="503" y="324.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="503" dy="0">echo + max_tokens==0 →</tspan><tspan x="503" dy="17.36">max_tokens=1</tspan></text><rect x="676" y="96" width="368" height="264" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="694" y="125.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="694" dy="0">严格的引擎内核 · 唯一权威门</tspan></text><rect class="rough" x="692" y="166" width="336" height="68" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="860" y="192.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="860" dy="0">SamplingParams.from_optional</tspan></text><text x="860" y="211.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="860" dy="0">__post_init__ · 钳制 · seed −1→None</tspan><tspan x="860" dy="17.36">· 贪心</tspan></text><rect class="rough" x="692" y="262" width="336" height="68" rx="12" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="860" y="288.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="860" dy="0">_verify_args · 值域门</tspan></text><text x="860" y="307.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="860" dy="0">temperature ∈ [0,2] · n · top_p ·</tspan><tspan x="860" dy="17.36">top_k · min_p</tspan></text><path d="M 860 234 L 860.0 255.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 860 262 L 855.6 251.0 L 864.4 251.0 z" fill="#30363d"/><text x="986" y="351.04" text-anchor="end" font-size="14" font-weight="700" fill="#66717a"><tspan x="986" dy="0">→ EngineCore</tspan></text><path d="M 626 192 L 685.1 199.2" fill="none" stroke="#30363d" stroke-width="2.4"/><path d="M 692 200 L 680.6 203.0 L 681.6 194.3 z" fill="#30363d"/><rect class="rough" x="36" y="378" width="1008" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="540" y="405.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">前置条件 · get_max_tokens = min(剩余上下文, 请求/默认 max_tokens, override, 平台上限)</tspan></text><rect class="rough" x="36" y="436" width="1008" height="44" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="540" y="463.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">{ &quot;temperature&quot;: 5 } → HTTP 边缘 200 → SamplingParams(5.0) → _verify_args → VLLMValidationError → HTTP 400</tspan></text><rect class="rough" x="36" y="494" width="1008" height="42" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="520.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">唯一权威门在引擎边界 —— HTTP 与离线 LLM 由同一份代码校验</tspan></text><text x="540" y="563.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">vLLM 把校验分成两层：宽松的 pydantic 边缘（保留未知键、以 None 表示未设）与引擎边界处 _verify_args</tspan><tspan x="540" dy="17.36">里唯一严格的值域门。to_sampling_params 只是纯桥接 —— 解析未设旋钮、合并 stop、把 stream 映射成输出节奏 ——</tspan><tspan x="540" dy="17.36">对合法范围不作任何断言。</tspan></text>
</svg>
