<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">服务补全：HTTP → to_sampling_params → add_request</tspan></text>
<rect class="rough" x="44" y="104" width="536" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="312" y="122.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="312" dy="0">CompletionRequest（HTTP JSON） · prompt：str | 列表 | token</tspan><tspan x="312" dy="17.36">id → N 个 prompt</tspan></text><rect class="rough" x="44" y="176" width="536" height="40" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="312" y="201.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="312" dy="0">create_completion · 极薄路由</tspan></text><rect class="rough" x="44" y="244" width="536" height="50" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="312" y="265.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="312" dy="0">_create_completion · 守卫（stream+beam） · _check_model ·</tspan><tspan x="312" dy="17.36">engine.errored（流式前健康检查）</tspan></text><rect class="rough" x="44" y="322" width="536" height="42" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="312" y="348.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="312" dy="0">render_completion → N 个 EngineInput</tspan></text><rect class="rough" x="44" y="392" width="536" height="52" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="312" y="414.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="312" dy="0">逐 prompt 循环 · get_max_tokens ·</tspan><tspan x="312" dy="17.36">to_sampling_params（output_kind ← stream） · generate(id-i)</tspan></text><rect class="rough" x="44" y="472" width="536" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="312" y="494.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="312" dy="0">AsyncLLM.add_request → process_inputs → EngineCoreRequest</tspan><tspan x="312" dy="17.36">→ EngineCore</tspan></text><path d="M 312 148 L 312.0 169.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 312 176 L 307.6 165.0 L 316.4 165.0 z" fill="#30363d"/><path d="M 312 216 L 312.0 237.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 312 244 L 307.6 233.0 L 316.4 233.0 z" fill="#30363d"/><path d="M 312 294 L 312.0 315.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 312 322 L 307.6 311.0 L 316.4 311.0 z" fill="#30363d"/><path d="M 312 364 L 312.0 385.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 312 392 L 307.6 381.0 L 316.4 381.0 z" fill="#30363d"/><path d="M 312 444 L 312.0 465.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 312 472 L 307.6 461.0 L 316.4 461.0 z" fill="#30363d"/><rect x="596" y="96" width="440" height="198" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="614" y="125.04" text-anchor="start" font-size="14" font-weight="700" fill="#66717a"><tspan x="614" dy="0">一个请求 → N 个引擎请求</tspan></text><rect class="rough" x="612" y="150" width="178" height="34" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="701" y="172.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="701" dy="0">prompt 0</tspan></text><rect class="rough" x="818" y="150" width="200" height="34" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="918" y="172.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="918" dy="0">generate · id-i</tspan></text><path d="M 790 167 L 811.0 167.0" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 818 167 L 807.0 171.4 L 807.0 162.6 z" fill="#66717a"/><rect class="rough" x="612" y="198" width="178" height="34" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="701" y="220.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="701" dy="0">prompt 1</tspan></text><rect class="rough" x="818" y="198" width="200" height="34" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="918" y="220.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="918" dy="0">generate · id-i</tspan></text><path d="M 790 215 L 811.0 215.0" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 818 215 L 807.0 219.4 L 807.0 210.6 z" fill="#66717a"/><rect class="rough" x="612" y="246" width="178" height="34" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="701" y="268.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="701" dy="0">prompt N−1</tspan></text><rect class="rough" x="818" y="246" width="200" height="34" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="918" y="268.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="918" dy="0">generate · id-i</tspan></text><path d="M 790 263 L 811.0 263.0" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 818 263 L 807.0 267.4 L 807.0 258.6 z" fill="#66717a"/><rect class="rough" x="636" y="310" width="400" height="44" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="836" y="328.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">merge_async_iterators · (prompt_idx,</tspan><tspan x="836" dy="17.36">RequestOutput)</tspan></text><path d="M 918 184 L 901.0 303.1" fill="none" stroke="#66717a" stroke-width="1.4"/><path d="M 900 310 L 897.2 298.5 L 905.9 299.7 z" fill="#66717a"/><path d="M 918 232 L 901.6 303.2" fill="none" stroke="#66717a" stroke-width="1.4"/><path d="M 900 310 L 898.2 298.3 L 906.8 300.3 z" fill="#66717a"/><path d="M 918 280 L 903.6 304.0" fill="none" stroke="#66717a" stroke-width="1.4"/><path d="M 900 310 L 901.9 298.3 L 909.4 302.8 z" fill="#66717a"/><rect x="596" y="368" width="440" height="216" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="614" y="397.04" text-anchor="start" font-size="14" font-weight="700" fill="#66717a"><tspan x="614" dy="0">路由返回 = 响应契约 · 三种形态</tspan></text><rect class="rough" x="612" y="416" width="408" height="40" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="816" y="441.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="816" dy="0">ErrorResponse → JSONResponse（状态码）</tspan></text><rect class="rough" x="612" y="470" width="408" height="40" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="816" y="495.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="816" dy="0">CompletionResponse → JSONResponse（响应体）</tspan></text><rect class="rough" x="612" y="524" width="408" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="816" y="542.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="816" dy="0">AsyncGenerator[str] → StreamingResponse（流式</tspan><tspan x="816" dy="17.36">SSE · [DONE]）</tspan></text><path d="M 580 240 L 593.4 206.5" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 596 200 L 596.0 211.8 L 587.8 208.6 z" fill="#66717a"/><path d="M 580 300 L 595.2 433.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 596 440 L 590.4 429.6 L 599.1 428.6 z" fill="#66717a"/><text x="540" y="591.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">补全路由是一个三形态分发器；处理器渲染 N 个 prompt，为每个 prompt 独立算预算并构造采样参数，逐 prompt 扇出一次</tspan><tspan x="540" dy="17.36">engine_client.generate，再用 merge_async_iterators 重新归并 —— 每个 prompt 都跨过同一个 process_inputs →</tspan><tspan x="540" dy="17.36">EngineCoreRequest 边界。</tspan></text>
</svg>
