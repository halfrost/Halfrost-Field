  </style>
</defs>
<rect width="1080" height="644" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">add_request：一个请求进入 EngineCore</tspan></text>
<rect class="rough" x="390" y="96" width="320" height="50" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="550" y="126.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="550" dy="0">LLMEngine.add_request</tspan></text><text x="550" y="170.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="550" dy="0">先注册后提交：先输出侧，再引擎侧</tspan></text><path d="M 430 146 L 306.6 187.8" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 300 190 L 309.0 182.3 L 311.8 190.6 z" fill="#66717a"/><path d="M 650 146 L 783.3 187.9" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 790 190 L 778.2 190.9 L 780.8 182.5 z" fill="#66717a"/><text x="300" y="180.32" text-anchor="middle" font-size="12" font-weight="700" fill="#3a7d44"><tspan x="300" dy="0">1 · 返回路径</tspan></text><text x="800" y="180.32" text-anchor="middle" font-size="12" font-weight="700" fill="#c07a1a"><tspan x="800" dy="0">2 · 前向路径</tspan></text><rect class="rough" x="70" y="190" width="410" height="40" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="275" y="215.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="275" dy="0">OutputProcessor.add_request</tspan></text><rect class="rough" x="70" y="258" width="410" height="58" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="275" y="291.68" text-anchor="middle" font-size="13" font-weight="600" fill="#27323a"><tspan x="275" dy="0">创建 RequestState  ·  反分词器 + 输出信箱</tspan></text><path d="M 275 230 L 275.0 251.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 275 258 L 270.6 247.0 L 279.4 247.0 z" fill="#30363d"/><rect x="70" y="332" width="410" height="212" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="88" y="361.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="88" dy="0">n &gt; 1 扇出</tspan></text><rect class="rough" x="120" y="380" width="310" height="38" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="275" y="403.68" text-anchor="middle" font-size="13" font-weight="600" fill="#27323a"><tspan x="275" dy="0">ParentRequest 包裹该请求</tspan></text><rect class="rough" x="92" y="436" width="110" height="38" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="147" y="459.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="147" dy="0">子 0_id</tspan></text><path d="M 275 418 L 153.9 435.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 147 436 L 157.3 430.1 L 158.5 438.8 z" fill="#66717a"/><rect class="rough" x="220" y="436" width="110" height="38" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="275" y="459.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="275" dy="0">子 1_id</tspan></text><path d="M 275 418 L 275.0 429.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 275 436 L 270.6 425.0 L 279.4 425.0 z" fill="#66717a"/><rect class="rough" x="348" y="436" width="110" height="38" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="403" y="459.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="403" dy="0">子 … n−1</tspan></text><path d="M 275 418 L 396.1 435.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 403 436 L 391.5 438.8 L 392.7 430.1 z" fill="#66717a"/><text x="275" y="514.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="275" dy="0">每个子请求两侧都注册 · 返回父 id · 一个 RequestOutput</tspan></text><rect class="rough" x="560" y="190" width="470" height="32" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="795" y="210.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="795" dy="0">engine_core.add_request（客户端）</tspan></text><path d="M 795 222 L 795.0 245.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 795 252 L 790.6 241.0 L 799.4 241.0 z" fill="#30363d"/><rect class="rough" x="560" y="252" width="470" height="32" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="795" y="272.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="795" dy="0">序列化 → ZMQ 帧 ADD  ·  多进程时</tspan></text><path d="M 795 284 L 795.0 307.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 795 314 L 790.6 303.0 L 799.4 303.0 z" fill="#30363d"/><rect class="rough" x="560" y="314" width="470" height="32" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="795" y="334.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="795" dy="0">preprocess_add_request  ·  EngineCoreRequest → Request</tspan></text><path d="M 795 346 L 795.0 369.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 795 376 L 790.6 365.0 L 799.4 365.0 z" fill="#30363d"/><rect class="rough" x="560" y="376" width="470" height="32" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="795" y="396.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="795" dy="0">EngineCore.add_request  ·  校验 · 委派</tspan></text><path d="M 795 408 L 795.0 431.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 795 438 L 790.6 427.0 L 799.4 427.0 z" fill="#30363d"/><rect class="rough" x="560" y="438" width="470" height="32" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="795" y="458.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="795" dy="0">scheduler.add_request → 等待队列</tspan></text><text x="795" y="504.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="795" dy="0">线上结构体变成调度器拥有的 Request —— 完成块哈希、初始化语法</tspan></text><text x="540" y="592.88" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">add_request 在两侧注册 —— 先 OutputProcessor（返回）再 EngineCore→Scheduler（前向）—— 仅在多进程模式经 ZMQ</tspan><tspan x="540" dy="14.879999999999999">序列化；EngineCoreRequest→Request 的转换标志着进入调度器所有权，n&gt;1 则在一个 ParentRequest 下扇出为多个子请求。</tspan></text>
</svg>
