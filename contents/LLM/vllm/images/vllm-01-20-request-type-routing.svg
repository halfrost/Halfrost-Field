<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="642" viewBox="0 0 1080 642" role="img" aria-label="EngineCoreRequestType 路由：同一条 demux 路径">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="642" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">EngineCoreRequestType 路由：同一条 demux 路径</tspan></text>
<rect class="rough" x="56" y="108" width="244" height="40" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="178" y="133.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="178" dy="0">字节</tspan></text><rect class="rough" x="314" y="108" width="352" height="40" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="490" y="133.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="490" dy="0">来源 → 目的</tspan></text><rect class="rough" x="680" y="108" width="344" height="40" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="852" y="133.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="852" dy="0">解码器</tspan></text><rect class="rough" x="56" y="162" width="244" height="48" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><text x="178" y="190.14" text-anchor="middle" font-size="11.5" font-weight="700" fill="#27323a"><tspan x="178" dy="0">ADD = b'\x00'</tspan></text><rect class="rough" x="314" y="162" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="190.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="490" dy="0">client → engine  ·  经 socket</tspan></text><rect class="rough" x="680" y="162" width="344" height="48" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="1.6"/><text x="852" y="190.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="852" dy="0">带类型  MsgpackDecoder(EngineCoreRequest, ...)</tspan></text><rect class="rough" x="56" y="224" width="244" height="48" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><text x="178" y="252.14" text-anchor="middle" font-size="11.5" font-weight="700" fill="#27323a"><tspan x="178" dy="0">ABORT = b'\x01'</tspan></text><rect class="rough" x="314" y="224" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="252.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="490" dy="0">client → engine  ·  经 socket</tspan></text><rect class="rough" x="680" y="224" width="344" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="852" y="252.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="852" dy="0">非类型化通用</tspan></text><rect class="rough" x="56" y="286" width="244" height="48" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><text x="178" y="314.14" text-anchor="middle" font-size="11.5" font-weight="700" fill="#27323a"><tspan x="178" dy="0">UTILITY = b'\x03'</tspan></text><rect class="rough" x="314" y="286" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="314.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="490" dy="0">client → engine  ·  经 socket</tspan></text><rect class="rough" x="680" y="286" width="344" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="852" y="314.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="852" dy="0">非类型化 · 带返回值的操作，call_id ↔ Future</tspan></text><rect class="rough" x="56" y="348" width="244" height="48" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="1.6"/><text x="178" y="376.14" text-anchor="middle" font-size="11.5" font-weight="700" fill="#27323a"><tspan x="178" dy="0">START_DP_WAVE = b'\x02'</tspan></text><rect class="rough" x="314" y="348" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="376.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="490" dy="0">coordinator → engine</tspan></text><rect class="rough" x="680" y="348" width="344" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="852" y="376.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="852" dy="0">—</tspan></text><rect class="rough" x="56" y="410" width="244" height="48" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="1.6"/><text x="178" y="438.14" text-anchor="middle" font-size="11.5" font-weight="700" fill="#27323a"><tspan x="178" dy="0">EXECUTOR_FAILED = b'\x04'</tspan></text><rect class="rough" x="314" y="410" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="438.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="490" dy="0">进程内哨兵  ·  从不走线上</tspan></text><rect class="rough" x="680" y="410" width="344" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="852" y="438.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="852" dy="0">—</tspan></text><rect class="rough" x="56" y="472" width="244" height="48" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="1.6"/><text x="178" y="500.14" text-anchor="middle" font-size="11.5" font-weight="700" fill="#27323a"><tspan x="178" dy="0">WAKEUP = b'\x05'</tspan></text><rect class="rough" x="314" y="472" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="500.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="490" dy="0">进程内哨兵  ·  关停</tspan></text><rect class="rough" x="680" y="472" width="344" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="852" y="500.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="852" dy="0">—</tspan></text><text x="540" y="542.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">UTILITY 携带 get_supported_tasks / sleep / add_lora / collective_rpc</tspan></text><text x="540" y="568.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#c07a1a"><tspan x="540" dy="0">哨兵复用同一条分发路径，所以忙循环只需一个 demux；只有 ADD 使用带类型的解码器</tspan></text><text x="540" y="604.75" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">ADD / ABORT / UTILITY 从 client 跨 socket 到 engine（只有 ADD 使用带类型的 MsgpackDecoder，其余共享非类型化解码器），START_DP_WAVE 是</tspan><tspan x="540" dy="15.5">coordinator→engine，而 EXECUTOR_FAILED / WAKEUP 是从不走线上的进程内哨兵，却复用同一条 demux 分发路径。</tspan></text>
</svg>
