<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" role="img" aria-label="LLM.generate()：add_request / step 之上的薄编排层">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="600" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">LLM.generate()：add_request / step 之上的薄编排层</tspan></text>
<rect class="rough" x="44" y="108" width="552" height="132" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="66" y="144.12" text-anchor="start" font-size="17" font-weight="800" fill="#27323a"><tspan x="66" dy="0">LLM 门面  ·  entrypoints/llm.py</tspan></text><text x="66" y="171.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="66" dy="0">公开的 generate / chat / enqueue —— 校验 · 填默认值 · 编排</tspan></text><rect class="rough" x="66" y="190" width="508" height="44" rx="22" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="320" y="217.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="320" dy="0">不变量：不含调度 / 内存 / 执行逻辑</tspan></text><path d="M 134 240 L 134.0 249.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 134 256 L 129.6 245.0 L 138.4 245.0 z" fill="#30363d"/><rect class="rough" x="44" y="256" width="552" height="132" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="66" y="292.12" text-anchor="start" font-size="17" font-weight="800" fill="#27323a"><tspan x="66" dy="0">OfflineInferenceMixin  ·  offline_utils.py</tspan></text><text x="66" y="319.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="66" dy="0">渲染 → 添加 → 抽干 的主干</tspan></text><rect class="rough" x="66" y="338" width="508" height="44" rx="22" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="320" y="365.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="320" dy="0">不变量：FINAL_ONLY · 批次原子准入 · 按序还原排序</tspan></text><path d="M 134 388 L 134.0 397.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 134 404 L 129.6 393.0 L 138.4 393.0 z" fill="#30363d"/><rect class="rough" x="44" y="404" width="552" height="132" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="66" y="440.12" text-anchor="start" font-size="17" font-weight="800" fill="#27323a"><tspan x="66" dy="0">单一 LLMEngine 句柄</tspan></text><text x="66" y="467.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="66" dy="0">一个多态 EngineCoreClient</tspan></text><rect class="rough" x="66" y="486" width="508" height="44" rx="22" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="320" y="513.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="320" dy="0">不变量：传输在构造时一次性固定</tspan></text><text x="836" y="109.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="836" dy="0">只编排 add_request / step 这套 API</tspan></text><rect class="rough" x="636" y="124" width="400" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="836" y="150.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">校验 · 默认采样参数 · 生成 request_id</tspan></text><path d="M 836 166 L 836.0 181.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 188 L 831.6 177.0 L 840.4 177.0 z" fill="#30363d"/><rect class="rough" x="636" y="188" width="400" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="836" y="214.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">渲染输入 → 构建 EngineCoreRequest</tspan></text><path d="M 836 230 L 836.0 245.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 252 L 831.6 241.0 L 840.4 241.0 z" fill="#30363d"/><rect class="rough" x="636" y="252" width="400" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="836" y="278.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">add_request(s) → 引擎</tspan></text><path d="M 836 294 L 836.0 309.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 316 L 831.6 305.0 L 840.4 305.0 z" fill="#30363d"/><rect class="rough" x="636" y="316" width="400" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="836" y="342.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">_run_engine：step() 直到全部完成</tspan></text><path d="M 836 358 L 836.0 373.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 380 L 831.6 369.0 L 840.4 369.0 z" fill="#30363d"/><rect class="rough" x="636" y="380" width="400" height="42" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="836" y="406.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">收集已完成的 RequestOutput</tspan></text><path d="M 836 422 L 836.0 437.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 444 L 831.6 433.0 L 840.4 433.0 z" fill="#30363d"/><rect class="rough" x="636" y="444" width="400" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="836" y="470.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">还原输入顺序（按 id 排序）</tspan></text><path d="M 600 312 L 627.6 278.4" fill="none" stroke="#66717a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 632 273 L 628.4 284.3 L 621.6 278.7 z" fill="#66717a"/><text x="836" y="504.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="836" dy="0">就是引擎已暴露的那套 add_request / step ——</tspan><tspan x="836" dy="17.36">这层只负责驱动它</tspan></text><text x="540" y="562.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">generate() 做校验、填默认、生成 id，然后驱动引擎自身的 add_request / step 循环并还原输入顺序 ——</tspan><tspan x="540" dy="17.36">每一层只守护一个不变量，且都不做调度、分配或跑 kernel。</tspan></text>
</svg>
