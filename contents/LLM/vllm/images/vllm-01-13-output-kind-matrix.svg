<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="616" viewBox="0 0 1080 616" role="img" aria-label="RequestOutputKind：三种流式模式对比">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="616" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">RequestOutputKind：三种流式模式对比</tspan></text>
<rect x="764" y="92" width="268" height="404" rx="12" fill="#fff7e8" stroke="#f6c77c" stroke-width="2"/><rect class="rough" x="260" y="108" width="236" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="378" y="134.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="378" dy="0">CUMULATIVE = 0</tspan></text><rect class="rough" x="512" y="108" width="236" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="630" y="134.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="630" dy="0">DELTA = 1</tspan></text><rect class="rough" x="780" y="108" width="236" height="42" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="898" y="134.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="898" dy="0">FINAL_ONLY = 2</tspan></text><rect class="rough" x="48" y="166" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="196.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="146" dy="0">每个中间 step</tspan></text><rect class="rough" x="260" y="166" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="196.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="378" dy="0">重发整个已生成部分</tspan></text><rect class="rough" x="512" y="166" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="187.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="630" dy="0">从 sent_tokens_offset</tspan><tspan x="630" dy="17.36">起的新切片</tspan></text><rect class="rough" x="780" y="166" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="196.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="898" dy="0">None（不产出）</tspan></text><rect class="rough" x="48" y="232" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="262.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="146" dy="0">完成时</tspan></text><rect class="rough" x="260" y="232" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="262.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="378" dy="0">产出最终结果</tspan></text><rect class="rough" x="512" y="232" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="262.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="630" dy="0">产出最终结果</tspan></text><rect class="rough" x="780" y="232" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="262.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="898" dy="0">恰好产出一次，在完成时</tspan></text><rect class="rough" x="48" y="298" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="319.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="146" dy="0">每请求 RequestOutput</tspan><tspan x="146" dy="17.36">数</tspan></text><rect class="rough" x="260" y="298" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="328.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="378" dy="0">不断增长，多个</tspan></text><rect class="rough" x="512" y="298" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="328.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="630" dy="0">多个 delta</tspan></text><rect class="rough" x="780" y="298" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="328.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="898" dy="0">恰好 1 个</tspan></text><rect class="rough" x="48" y="364" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="394.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="146" dy="0">使用方</tspan></text><rect class="rough" x="260" y="364" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="394.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="378" dy="0">非 delta 流式</tspan></text><rect class="rough" x="512" y="364" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="394.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="630" dy="0">OpenAI SSE 流式</tspan></text><rect class="rough" x="780" y="364" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="385.36" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="898" dy="0">离线 LLM.generate（由</tspan><tspan x="898" dy="17.36">_add_request 强制）</tspan></text><rect class="rough" x="48" y="430" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="460.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="146" dy="0">mailbox 合并</tspan></text><rect class="rough" x="260" y="430" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="460.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="378" dy="0">替换槽位</tspan></text><rect class="rough" x="512" y="430" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="460.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="630" dy="0">aggregate=True → 拼接</tspan></text><rect class="rough" x="780" y="430" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="460.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="898" dy="0">替换槽位</tspan></text><text x="540" y="521.04" text-anchor="middle" font-size="14" font-weight="600" fill="#c07a1a"><tspan x="540" dy="0">FINAL_ONLY 是 _add_request 为离线强制的默认值 —— drain 循环的 `if output.finished:` 依赖每请求恰好一个输出。</tspan></text><text x="540" y="568.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">CUMULATIVE 重发不断增长的完整内容，DELTA 只发出新切片（mailbox aggregate=True 拼接），FINAL_ONLY 只在完成时产出一次</tspan><tspan x="540" dy="17.36">—— 正是 _add_request 为离线批量推理强制设置的模式，也是 `if output.finished:` drain 所依赖的假设。</tspan></text>
</svg>
