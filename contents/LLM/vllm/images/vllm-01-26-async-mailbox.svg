<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="686" viewBox="0 0 1080 686" role="img" aria-label="在线返回路径：两个由 asyncio 解耦的边界">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="686" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">在线返回路径：两个由 asyncio 解耦的边界</tspan></text>
<rect x="56" y="104" width="316" height="260" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="74" y="133.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="74" dy="0">边界 A  ·  后台任务</tspan></text><text x="72" y="167.04" text-anchor="start" font-size="14" font-weight="700" fill="#27323a"><tspan x="72" dy="0">持有 ZMQ 输出 socket</tspan></text><text x="72" y="193" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="72" dy="0">把每个 frame 解码成</tspan><tspan x="72" dy="17.36">EngineCoreOutputs 批（每 engine</tspan><tspan x="72" dy="17.36">step 一批，含该 step</tspan><tspan x="72" dy="17.36">产生输出的请求）</tspan></text><text x="72" y="288.36" text-anchor="start" font-size="14" font-weight="700" fill="#3a7d44"><tspan x="72" dy="0">推入 AsyncMPClient.outputs_queue</tspan><tspan x="72" dy="17.36">（asyncio.Queue）</tspan></text><rect x="388" y="104" width="316" height="260" rx="16" fill="#dfeeff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="406" y="133.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="406" dy="0">边界 B · output_handler 任务</tspan></text><text x="404" y="167.04" text-anchor="start" font-size="14" font-weight="700" fill="#27323a"><tspan x="404" dy="0">await outputs_queue</tspan></text><text x="404" y="201.67999999999998" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="404" dy="0">运行</tspan><tspan x="404" dy="17.36">OutputProcessor.process_outputs</tspan><tspan x="404" dy="17.36">（唯一那处批循环）</tspan></text><text x="404" y="288.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="404" dy="0">经 req_state.queue.put(...)</tspan><tspan x="404" dy="17.36">分发每个 RequestOutput</tspan></text><rect x="720" y="104" width="316" height="260" rx="16" fill="#fff0d8" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="738" y="133.04" text-anchor="start" font-size="14" font-weight="700" fill="#66717a"><tspan x="738" dy="0">RequestOutputCollector  ·  每请求</tspan></text><rect class="rough" x="736" y="152" width="284" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="878" y="177.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="878" dy="0">单槽 + asyncio.Event</tspan></text><text x="736" y="216.35999999999999" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="736" dy="0">put() 在空时装入（Exception</tspan><tspan x="736" dy="17.36">总是抢占槽位）</tspan></text><text x="736" y="275" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="736" dy="0">否则 self.output.add(output,</tspan><tspan x="736" dy="17.36">aggregate=self.aggregate) ——</tspan><tspan x="736" dy="17.36">DELTA 拼接，否则替换；对 finished</tspan><tspan x="736" dy="17.36">做 OR 合并</tspan></text><path d="M 372 234 L 381.0 234.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 388 234 L 377.0 238.4 L 377.0 229.6 z" fill="#30363d"/><path d="M 704 234 L 713.0 234.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 720 234 L 709.0 238.4 L 709.0 229.6 z" fill="#30363d"/><rect class="rough" x="240" y="404" width="600" height="44" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="431.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="540" dy="0">generate() 消费方</tspan></text><rect class="rough" x="56" y="464" width="468" height="56" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="290" y="497.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="290" dy="0">out = q.get_nowait() or await q.get()</tspan></text><rect class="rough" x="556" y="464" width="468" height="56" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="790" y="488.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="790" dy="0">finished = out.finished；过滤 STREAM_FINISHED；yield</tspan><tspan x="790" dy="17.36">out</tspan></text><path d="M 880 364 L 706.8 402.5" fill="none" stroke="#66717a" stroke-width="1.8" stroke-dasharray="8 7"/><path d="M 700 404 L 709.8 397.3 L 711.7 405.9 z" fill="#66717a"/><rect class="rough" x="56" y="540" width="968" height="62" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="558.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">不变量：每请求至多 1 个 pending 输出（慢客户端下 O(1) 内存）；合并保留逻辑内容、合并事件边界（DELTA 每个 token</tspan><tspan x="540" dy="17.36">按序恰好一次）</tspan><tspan x="540" dy="17.36">在完成输出上终止；取消 → 两侧 abort(internal=True) + q.close()</tspan></text><text x="540" y="631.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">边界 A 把 ZMQ frame 解码成 EngineCoreOutputs 推入 outputs_queue；边界 B 运行一个</tspan><tspan x="540" dy="17.36">output_handler，把每个结果分发进每请求的单槽、可合并 RequestOutputCollector，由 generate() 用 q.get_nowait() or</tspan><tspan x="540" dy="17.36">await q.get() drain —— 每请求至多一个 pending 输出，合并无损。</tspan></text>
</svg>
