<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="604" viewBox="0 0 1080 604" role="img" aria-label="每个 MultiModalFeatureSpec 中的多模态双哈希">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="604" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">每个 MultiModalFeatureSpec 中的多模态双哈希</tspan></text>
<text x="196" y="120.68" text-anchor="middle" font-size="13" font-weight="700" fill="#66717a"><tspan x="196" dy="0">按 modality 组织的输入</tspan></text><rect class="rough" x="56" y="130" width="280" height="74" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="196" y="163.62" text-anchor="middle" font-size="13" font-weight="600" fill="#27323a"><tspan x="196" dy="0">{ &quot;image&quot;: [...],</tspan><tspan x="196" dy="16.12">&quot;audio&quot;: [...] }</tspan></text><rect class="rough" x="56" y="236" width="280" height="40" rx="20" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="196" y="252.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="196" dy="0">argsort_mm_positions  ·  按 token</tspan><tspan x="196" dy="14.879999999999999">序列偏移排序</tspan></text><rect class="rough" x="56" y="312" width="280" height="66" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="196" y="341.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="196" dy="0">展平的 mm_features（左 →</tspan><tspan x="196" dy="14.879999999999999">右，序列顺序）</tspan></text><path d="M 196 204 L 196.0 229.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 196 236 L 191.6 225.0 L 200.4 225.0 z" fill="#30363d"/><path d="M 196 276 L 196.0 305.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 196 312 L 191.6 301.0 L 200.4 301.0 z" fill="#30363d"/><rect class="rough" x="430" y="150" width="240" height="288" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.8"/><text x="550" y="181.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="550" dy="0">MultiModalFeatureSpec</tspan></text><rect class="rough" x="446" y="206" width="208" height="32" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="550" y="226.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="550" dy="0">data</tspan></text><rect class="rough" x="446" y="252" width="208" height="32" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="550" y="272.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="550" dy="0">modality</tspan></text><rect class="rough" x="446" y="298" width="208" height="32" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="550" y="318.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="550" dy="0">mm_position</tspan></text><rect class="rough" x="446" y="344" width="208" height="32" rx="6" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="550" y="364.5" text-anchor="middle" font-size="12.5" font-weight="800" fill="#27323a"><tspan x="550" dy="0">mm_hash</tspan></text><rect class="rough" x="446" y="390" width="208" height="32" rx="6" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="550" y="410.5" text-anchor="middle" font-size="12.5" font-weight="800" fill="#27323a"><tspan x="550" dy="0">identifier</tspan></text><path d="M 336 345 L 423.7 303.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 430 300 L 422.0 308.7 L 418.2 300.8 z" fill="#66717a"/><rect class="rough" x="700" y="150" width="324" height="116" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="862" y="181.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="862" dy="0">processor cache</tspan></text><text x="862" y="218.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="862" dy="0">以 mm_hash 为 key  ·  跨 LoRA 共享</tspan></text><rect class="rough" x="700" y="300" width="324" height="152" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="862" y="329.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="862" dy="0">encoder-output cache</tspan></text><text x="862" y="359.44" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="862" dy="0">以 identifier =</tspan><tspan x="862" dy="14.879999999999999">_get_mm_identifier(mm_hash,</tspan><tspan x="862" dy="14.879999999999999">lora_request) 为 key</tspan></text><text x="862" y="420.88" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="862" dy="0">→ 当 LoRA 可改变视觉嵌入时为</tspan><tspan x="862" dy="14.879999999999999">&quot;{lora_name}:{mm_hash}&quot;</tspan></text><path d="M 676 346 L 698.8 214.9" fill="none" stroke="#c07a1a" stroke-width="2"/><path d="M 700 208 L 702.5 219.6 L 693.8 218.1 z" fill="#c07a1a"/><path d="M 676 386 L 695.3 365.1" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 700 360 L 695.8 371.1 L 689.3 365.1 z" fill="#30363d"/><rect class="rough" x="56" y="476" width="974" height="40" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="543" y="500.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="543" dy="0">不变量：不同 LoRA 下相同 pixels 绝不会在 encoder-output cache 冲突；processor cache 保持共享 —— 键在此铸造，在文章 07 消费</tspan></text><text x="540" y="554.75" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">argsort_mm_positions 先把按 modality 组织的输入展平成序列顺序，然后 mm_hash 作为与 LoRA 无关的 processor cache 的</tspan><tspan x="540" dy="15.5">key，identifier（可能为 &quot;{lora_name}:{mm_hash}&quot;）作为 encoder-output cache 的 key —— 因此不同 LoRA 下相同 pixels 绝不会冲突。</tspan></text>
</svg>
