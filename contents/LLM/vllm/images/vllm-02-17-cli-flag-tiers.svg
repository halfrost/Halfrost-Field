<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" role="img" aria-label="三层 flag 叠进同一个 parser（注册顺序 = 优先级）">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="640" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">三层 flag 叠进同一个 parser（注册顺序 = 优先级）</tspan></text>
<rect class="rough" x="44" y="104" width="724" height="104" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="60" y="133.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="60" dy="0">第 1 层 · serve 专属（拓扑）</tspan></text><text x="60" y="162.67999999999998" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="60" dy="0">model_tag (nargs=&quot;?&quot;) · --headless · --api-server-count / -asc（默认 None） ·</tspan><tspan x="60" dy="17.36">--config (YAML) · --grpc</tspan><tspan x="60" dy="17.36">非 engine 字段 —— 在 serve.py 中消费</tspan></text><rect class="rough" x="44" y="222" width="724" height="104" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="60" y="251.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="60" dy="0">第 2 层 · FrontendArgs.add_cli_args（@config dataclass）</tspan></text><text x="60" y="280.68" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="60" dy="0">HTTP / SSL / CORS / tool-parser · port=8000 · host=None · uds ·</tspan><tspan x="60" dy="17.36">uvicorn_log_level</tspan><tspan x="60" dy="17.36">dataclass 即 flag 模式（经 get_kwargs 反射）</tspan></text><rect class="rough" x="44" y="340" width="724" height="104" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="60" y="369.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="60" dy="0">第 3 层 · AsyncEngineArgs.add_cli_args</tspan></text><text x="60" y="407.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="60" dy="0">--tensor-parallel-size · --max-model-len · …（全部 engine dataclass 字段）</tspan><tspan x="60" dy="17.36">dest 名 == dataclass 字段名</tspan></text><path d="M 778 116 L 778.0 435.0" fill="none" stroke="#30363d" stroke-width="2.4"/><path d="M 778 442 L 773.6 431.0 L 782.4 431.0 z" fill="#30363d"/><text x="778" y="109.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="778" dy="0">优先级 ↓</tspan></text><rect class="rough" x="792" y="110" width="252" height="150" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="804" y="133.04" text-anchor="start" font-size="14" font-weight="800" fill="#66717a"><tspan x="804" dy="0">validate</tspan></text><text x="804" y="172" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="804" dy="0">validate_parsed_serve_args</tspan><tspan x="804" dy="17.36">(cli_args.py:386-413)</tspan><tspan x="804" dy="17.36">在 main.py:92 分发前运行</tspan><tspan x="804" dy="17.36">· 跨标志检查</tspan></text><rect class="rough" x="792" y="278" width="252" height="150" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="804" y="301.04" text-anchor="start" font-size="14" font-weight="800" fill="#66717a"><tspan x="804" dy="0">collision</tspan></text><text x="804" y="348.68" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="804" dy="0">若两层冲突（同 dest /</tspan><tspan x="804" dy="17.36">选项串）</tspan><tspan x="804" dy="17.36">argparse 在注册时即报错</tspan></text><path d="M 406 444 L 406.0 453.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 406 460 L 401.6 449.0 L 410.4 449.0 z" fill="#30363d"/><rect class="rough" x="44" y="460" width="992" height="46" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="488.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">from_cli_args 只反射式拷贝同名 engine 字段 → serve 专属标志被静默丢弃</tspan></text><rect class="rough" x="44" y="520" width="992" height="40" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="545.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">唯一扁平 parser · 顺序 = 优先级 · serve 专属标志绝不到达 EngineArgs</tspan></text><text x="540" y="596.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">make_arg_parser 按注册顺序（= 优先级）把三层 flag 叠进同一个扁平 parser：serve 专属启动标志、FrontendArgs、再到</tspan><tspan x="540" dy="17.36">AsyncEngineArgs —— 而 from_cli_args 只反射式拷贝同名 engine 字段，静默丢弃 serve 专属标志。</tspan></text>
</svg>
