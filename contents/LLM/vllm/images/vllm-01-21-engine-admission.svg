<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="612" viewBox="0 0 1080 612" role="img" aria-label="engine 侧 add_request：三个 guard，一次 handoff">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="612" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">engine 侧 add_request：三个 guard，一次 handoff</tspan></text>
<text x="336" y="122.68" text-anchor="middle" font-size="13" font-weight="800" fill="#66717a"><tspan x="336" dy="0">对进来的 Request 的 guard 漏斗</tspan></text><rect class="rough" x="56" y="138" width="560" height="54" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="336" y="161.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="336" dy="0">1 · 类型 guard —— request_id 必须为 str（重新校验；engine 不信任任何过</tspan><tspan x="336" dy="14.879999999999999">socket 的东西）</tspan></text><path d="M 336 192 L 336.0 215.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 336 222 L 331.6 211.0 L 340.4 211.0 z" fill="#30363d"/><rect class="rough" x="56" y="222" width="560" height="54" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="336" y="245.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="336" dy="0">2 · pooling-task guard —— pooling_params.task ∈ 支持的任务，否则</tspan><tspan x="336" dy="14.879999999999999">ValueError（generation 跳过）</tspan></text><path d="M 336 276 L 336.0 299.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 336 306 L 331.6 295.0 L 340.4 295.0 z" fill="#30363d"/><rect class="rough" x="56" y="306" width="560" height="54" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="336" y="337.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="336" dy="0">3 · KV-transfer 告警 —— 有 kv_transfer_params 但无 KVConnector → 静默禁用</tspan></text><path d="M 336 360 L 336.0 385.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 336 392 L 331.6 381.0 L 340.4 381.0 z" fill="#30363d"/><rect class="rough" x="56" y="392" width="560" height="58" rx="12" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="336" y="411.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="336" dy="0">self.scheduler.add_request(request)</tspan></text><text x="336" y="442.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="336" dy="0">跨入 scheduler 所有权</tspan></text><rect class="rough" x="56" y="468" width="560" height="44" rx="22" fill="#fff0d8" stroke="#30363d" stroke-width="1.8"/><text x="336" y="486.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="336" dy="0">边界：if request.abort_immediately → self.abort_requests([id])（准入 +</tspan><tspan x="336" dy="14.879999999999999">拆除，同一套原语）</tspan></text><text x="850" y="122.68" text-anchor="middle" font-size="13" font-weight="800" fill="#66717a"><tspan x="850" dy="0">scheduler 拥有的状态机</tspan></text><rect class="rough" x="700" y="138" width="300" height="52" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="850" y="169.76" text-anchor="middle" font-size="16" font-weight="800" fill="#27323a"><tspan x="850" dy="0">WAITING</tspan></text><path d="M 850 190 L 850.0 223.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 850 230 L 845.6 219.0 L 854.4 219.0 z" fill="#30363d"/><rect class="rough" x="700" y="230" width="300" height="52" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="850" y="261.76" text-anchor="middle" font-size="16" font-weight="800" fill="#27323a"><tspan x="850" dy="0">RUNNING</tspan></text><path d="M 850 282 L 850.0 315.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 850 322 L 845.6 311.0 L 854.4 311.0 z" fill="#30363d"/><rect class="rough" x="700" y="322" width="300" height="52" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="850" y="353.76" text-anchor="middle" font-size="16" font-weight="800" fill="#27323a"><tspan x="850" dy="0">FINISHED</tspan></text><path d="M 850 374 L 850.0 399.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 850 406 L 845.6 395.0 L 854.4 395.0 z" fill="#30363d"/><rect class="rough" x="700" y="406" width="300" height="58" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="850" y="424.44" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="850" dy="0">FINISHED_STOPPED</tspan><tspan x="850" dy="14.879999999999999">FINISHED_LENGTH_CAPPED</tspan><tspan x="850" dy="14.879999999999999">FINISHED_ABORTED</tspan></text><text x="850" y="489.44" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="850" dy="0">abort = finish_requests(ids,</tspan><tspan x="850" dy="14.879999999999999">FINISHED_ABORTED)；EngineCore 从不释放</tspan><tspan x="850" dy="14.879999999999999">block 或推进计数器</tspan></text><path d="M 616 420 L 697.7 182.6" fill="none" stroke="#c07a1a" stroke-width="2" stroke-dasharray="8 7"/><path d="M 700 176 L 700.6 187.8 L 692.3 185.0 z" fill="#c07a1a"/><text x="540" y="557" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">engine 侧 add_request 跑三个 guard（request_id 为 str、pooling-task 成员、无 connector 的 KV-transfer 告警）、一次向</tspan><tspan x="540" dy="15.5">scheduler.add_request 的 handoff，以及 abort_immediately 边界 —— 此后 scheduler 独占 WAITING→RUNNING→FINISHED 状态机，abort</tspan><tspan x="540" dy="15.5">只是 finish_requests(ids, FINISHED_ABORTED)。</tspan></text>
</svg>
