<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="674" viewBox="0 0 1080 674" role="img" aria-label="池化端点：走 encode，而非 generate">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="674" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">池化端点：走 encode，而非 generate</tspan></text>
<rect class="rough" x="44" y="96" width="490" height="58" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="289" y="130.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="289" dy="0">生成侧 · generate(采样参数) → RequestOutput · 流式 DELTA</tspan></text><rect class="rough" x="560" y="96" width="476" height="58" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="798" y="121.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">池化侧 · encode(PoolingParams) →</tspan><tspan x="798" dy="17.36">PoolingRequestOutput · 单个最终（FINAL_ONLY）</tspan></text><rect class="rough" x="207" y="170" width="156" height="44" rx="22" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="285" y="188.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="285" dy="0">/v1/embeddings</tspan><tspan x="285" dy="17.36">（嵌入）</tspan></text><rect class="rough" x="377" y="170" width="156" height="44" rx="22" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="455" y="197.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="455" dy="0">/classify</tspan></text><rect class="rough" x="547" y="170" width="156" height="44" rx="22" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="625" y="197.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="625" dy="0">/score</tspan></text><rect class="rough" x="717" y="170" width="156" height="44" rx="22" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="795" y="197.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="795" dy="0">/pooling （池化）</tspan></text><text x="540" y="235.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="540" dy="0">端点由模型头决定，而非 URL</tspan></text><rect class="rough" x="44" y="244" width="470" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="279" y="262.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="279" dy="0">to_pooling_params · 打上 task（embed / classify /</tspan><tspan x="279" dy="17.36">score）</tspan></text><rect class="rough" x="566" y="244" width="470" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="801" y="262.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="801" dy="0">PoolingParams · __post_init__ 强制 FINAL_ONLY ·</tspan><tspan x="801" dy="17.36">字段按 task 限定</tspan></text><path d="M 514 266 L 559.0 266.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 566 266 L 555.0 270.4 L 555.0 261.6 z" fill="#30363d"/><path d="M 279 288 L 279.0 299.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 279 306 L 274.6 295.0 L 283.4 295.0 z" fill="#66717a"/><path d="M 786 288 L 786.0 299.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 786 306 L 781.6 295.0 L 790.4 295.0 z" fill="#66717a"/><rect x="44" y="306" width="470" height="294" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="62" y="335.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="62" dy="0">固定的 6 阶段 __call__</tspan></text><rect class="rough" x="60" y="360" width="438" height="26" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="279" y="378.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="279" dy="0">get_io_processor</tspan></text><rect class="rough" x="60" y="400" width="438" height="26" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="279" y="418.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="279" dy="0">_init_ctx · create_pooling_params</tspan></text><rect class="rough" x="60" y="440" width="438" height="26" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="279" y="458.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="279" dy="0">_preprocessing_async → engine_inputs</tspan></text><rect class="rough" x="60" y="480" width="438" height="26" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="279" y="498.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="279" dy="0">_prepare_generators · 扇出 encode</tspan></text><rect class="rough" x="60" y="520" width="438" height="26" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="279" y="538.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="279" dy="0">_collect_batch · 保序</tspan></text><rect class="rough" x="60" y="560" width="438" height="26" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="279" y="578.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="279" dy="0">_postprocessing_async · _build_response</tspan></text><rect x="536" y="306" width="500" height="294" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="554" y="335.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="554" dy="0">逐输入扇出 → encode</tspan></text><rect class="rough" x="552" y="360" width="104" height="34" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="604" y="382.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="604" dy="0">输入 0</tspan></text><rect class="rough" x="682" y="360" width="104" height="34" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="734" y="382.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="734" dy="0">encode</tspan></text><rect class="rough" x="812" y="360" width="196" height="34" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="910" y="382.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="910" dy="0">PoolingRequestOutput</tspan></text><path d="M 656 377 L 675.0 377.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 682 377 L 671.0 381.4 L 671.0 372.6 z" fill="#66717a"/><path d="M 786 377 L 805.0 377.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 812 377 L 801.0 381.4 L 801.0 372.6 z" fill="#66717a"/><rect class="rough" x="552" y="408" width="104" height="34" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="604" y="430.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="604" dy="0">输入 1</tspan></text><rect class="rough" x="682" y="408" width="104" height="34" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="734" y="430.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="734" dy="0">encode</tspan></text><rect class="rough" x="812" y="408" width="196" height="34" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="910" y="430.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="910" dy="0">PoolingRequestOutput</tspan></text><path d="M 656 425 L 675.0 425.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 682 425 L 671.0 429.4 L 671.0 420.6 z" fill="#66717a"/><path d="M 786 425 L 805.0 425.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 812 425 L 801.0 429.4 L 801.0 420.6 z" fill="#66717a"/><rect class="rough" x="552" y="456" width="104" height="34" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="604" y="478.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="604" dy="0">输入 N−1</tspan></text><rect class="rough" x="682" y="456" width="104" height="34" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="734" y="478.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="734" dy="0">encode</tspan></text><rect class="rough" x="812" y="456" width="196" height="34" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="910" y="478.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="910" dy="0">PoolingRequestOutput</tspan></text><path d="M 656 473 L 675.0 473.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 682 473 L 671.0 477.4 L 671.0 468.6 z" fill="#66717a"/><path d="M 786 473 L 805.0 473.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 812 473 L 801.0 477.4 L 801.0 468.6 z" fill="#66717a"/><rect class="rough" x="552" y="520" width="468" height="44" rx="22" fill="#b9dfc3" stroke="#30363d" stroke-width="1.8"/><text x="786" y="547.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="786" dy="0">全有或全无 · [None]*N 按 (i, res) 填充 · 绝无 token 流</tspan></text><path d="M 498 486 L 532.1 435.8" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 536 430 L 533.5 441.6 L 526.2 436.6 z" fill="#66717a"/><text x="540" y="632.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">池化家族是一套独立的入口栈：to_pooling_params 打上 task 并强制 FINAL_ONLY，固定的 6 阶段 __call__ 把一个 HTTP 请求扇成</tspan><tspan x="540" dy="17.36">N 个保序的 encode 请求，每个输入恰好产出一个 PoolingRequestOutput —— 一个无解码的生成侧镜像。</tspan></text>
</svg>
