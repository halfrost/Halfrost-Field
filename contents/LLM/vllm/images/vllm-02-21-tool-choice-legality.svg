<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="676" viewBox="0 0 1080 676" role="img" aria-label="render_chat 中的 tool-choice 合法性门">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="676" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">render_chat 中的 tool-choice 合法性门</tspan></text>
<rect class="rough" x="310" y="94" width="460" height="46" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="113.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">tool_parsing_unavailable = (tool_parser is None)</tspan><tspan x="540" dy="17.36">AND not is_mistral_tokenizer AND not use_harmony</tspan></text><path d="M 540 140 L 540.0 152.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 159 L 535.6 148.0 L 544.4 148.0 z" fill="#30363d"/><polygon class="rough" points="540,159 650,198 540,237 430,198" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="540" y="194.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">tool_parsing_</tspan><tspan x="540" dy="17.36">unavailable?</tspan></text><rect class="rough" x="44" y="172" width="250" height="48" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="169" y="201.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="169" dy="0">工具合法 · 继续</tspan></text><path d="M 430 198 L 301.0 198.0" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 294 198 L 305.0 193.6 L 305.0 202.4 z" fill="#30363d"/><text x="360" y="191.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="360" dy="0">False</tspan></text><path d="M 540 237 L 540.0 257.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 264 L 535.6 253.0 L 544.4 253.0 z" fill="#30363d"/><text x="556" y="257.04" text-anchor="start" font-size="14" font-weight="700" fill="#66717a"><tspan x="556" dy="0">True</tspan></text><polygon class="rough" points="540,263 660,302 540,341 420,302" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="540" y="298.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">tool_choice ∈</tspan><tspan x="540" dy="17.36">{None, &quot;none&quot;}?</tspan></text><rect class="rough" x="786" y="278" width="250" height="48" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="911" y="307.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="911" dy="0">OK · 无合法性问题</tspan></text><path d="M 660 302 L 779.0 302.0" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 786 302 L 775.0 306.4 L 775.0 297.6 z" fill="#30363d"/><text x="720" y="295.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="720" dy="0">None / none</tspan></text><path d="M 540 341 L 540.0 361.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 368 L 535.6 357.0 L 544.4 357.0 z" fill="#30363d"/><text x="556" y="361.04" text-anchor="start" font-size="14" font-weight="700" fill="#66717a"><tspan x="556" dy="0">else</tspan></text><polygon class="rough" points="540,367 660,406 540,445 420,406" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="540" y="402.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">tool_choice ==</tspan><tspan x="540" dy="17.36">&quot;auto&quot;?</tspan></text><rect class="rough" x="44" y="376" width="320" height="62" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="204" y="394.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="204" dy="0">400 · &quot;auto&quot; 需要</tspan><tspan x="204" dy="17.36">--enable-auto-tool-choice</tspan><tspan x="204" dy="17.36">+ --tool-call-parser</tspan></text><path d="M 420 406 L 371.0 406.0" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 364 406 L 375.0 401.6 L 375.0 410.4 z" fill="#30363d"/><text x="392" y="373.04" text-anchor="middle" font-size="14" font-weight="700" fill="#b3402f"><tspan x="392" dy="0">auto 且 !enable_auto_tools</tspan></text><rect class="rough" x="716" y="376" width="320" height="62" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="876" y="403.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="876" dy="0">400 · required / named</tspan><tspan x="876" dy="17.36">需要 --tool-call-parser</tspan></text><path d="M 660 406 L 709.0 406.0" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 716 406 L 705.0 410.4 L 705.0 401.6 z" fill="#30363d"/><text x="688" y="373.04" text-anchor="middle" font-size="14" font-weight="700" fill="#b3402f"><tspan x="688" dy="0">required / named</tspan></text><rect class="rough" x="170" y="470" width="740" height="62" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="540" y="488.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">tool_dicts：tools is None  或  (tool_choice==&quot;none&quot; 且</tspan><tspan x="540" dy="17.36">exclude_tools_when_tool_choice_none) → None</tspan><tspan x="540" dy="17.36">否则 [tool.model_dump() for tool in tools]</tspan></text><path d="M 169 220 L 208.9 463.1" fill="none" stroke="#b9dfc3" stroke-width="1.8" stroke-dasharray="8 7"/><path d="M 210 470 L 203.9 459.9 L 212.6 458.4 z" fill="#b9dfc3"/><path d="M 911 326 L 881.5 463.2" fill="none" stroke="#b9dfc3" stroke-width="1.8" stroke-dasharray="8 7"/><path d="M 880 470 L 878.0 458.3 L 886.6 460.2 z" fill="#b9dfc3"/><rect class="rough" x="44" y="550" width="490" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="289" y="577.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="289" dy="0">adjust_request（装配语法）在 tool_choice=&quot;none&quot; 时跳过</tspan><tspan x="289" dy="17.36">除非 reasoning / Mistral 语法必须运行</tspan></text><rect class="rough" x="560" y="550" width="476" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="798" y="577.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">第二道门 · 不可信 chat template 被拒</tspan><tspan x="798" dy="17.36">除非 --trust-request-chat-template</tspan></text><path d="M 400 532 L 306.9 548.8" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 300 550 L 310.0 543.7 L 311.6 552.4 z" fill="#66717a"/><path d="M 680 532 L 773.1 548.8" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 780 550 L 768.4 552.4 L 770.0 543.7 z" fill="#66717a"/><text x="540" y="632.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">当 tool_parsing_unavailable（无 tool_parser、非 Mistral、非 Harmony）时，除 None/&quot;none&quot; 外的任何 tool_choice</tspan><tspan x="540" dy="17.36">都会在渲染时返回 400；只有存活的工具才变成 tool_dicts，且 tool_choice=&quot;none&quot; 仍可抑制它们。</tspan></text>
</svg>
