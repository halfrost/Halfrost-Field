  </style>
</defs>
<rect width="1080" height="710" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">kwargs 整形：进入 EngineArgs 前的五处就地强制转换</tspan></text>
<rect class="rough" x="44" y="104" width="468" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="278" y="131.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="278" dy="0">原始 **kwargs · 裸 * 之后仅限关键字 (llm.py:178-220)</tspan></text><path d="M 278 148 L 278.0 169.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 176 L 273.6 165.0 L 282.4 165.0 z" fill="#30363d"/><rect class="rough" x="44" y="176" width="468" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="278" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="278" dy="0">&quot;disable_log_stats&quot; not in kwargs</tspan></text><rect class="rough" x="560" y="176" width="476" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="798" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">置为 True · 离线专属日志开关</tspan></text><path d="M 512 198 L 553.0 198.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 560 198 L 549.0 202.4 L 549.0 193.6 z" fill="#66717a"/><path d="M 278 220 L 278.0 239.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 246 L 273.6 235.0 L 282.4 235.0 z" fill="#30363d"/><rect class="rough" x="44" y="246" width="468" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="278" y="273.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="278" dy="0">worker_cls 是 type</tspan></text><rect class="rough" x="560" y="246" width="476" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="798" y="273.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">cloudpickle.dumps → 挺过 spawn</tspan></text><path d="M 512 268 L 553.0 268.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 560 268 L 549.0 272.4 L 549.0 263.6 z" fill="#66717a"/><path d="M 278 290 L 278.0 309.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 316 L 273.6 305.0 L 282.4 305.0 z" fill="#30363d"/><rect class="rough" x="44" y="316" width="468" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="278" y="343.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="278" dy="0">存在 swap_space</tspan></text><rect class="rough" x="560" y="316" width="476" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="798" y="343.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">pop + 弃用告警 · V0 遗留</tspan></text><path d="M 512 338 L 553.0 338.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 560 338 L 549.0 342.4 L 549.0 333.6 z" fill="#66717a"/><path d="M 278 360 L 278.0 379.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 386 L 273.6 375.0 L 282.4 375.0 z" fill="#30363d"/><rect class="rough" x="44" y="386" width="468" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="278" y="413.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="278" dy="0">kv_transfer_config 是 dict</tspan></text><rect class="rough" x="560" y="386" width="476" height="44" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="798" y="404.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">KVTransferConfig(**...) · ValidationError →</tspan><tspan x="798" dy="17.36">ValueError</tspan></text><path d="M 512 408 L 553.0 408.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 560 408 L 549.0 412.4 L 549.0 403.6 z" fill="#66717a"/><path d="M 278 430 L 278.0 449.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 456 L 273.6 445.0 L 282.4 445.0 z" fill="#30363d"/><rect class="rough" x="44" y="456" width="468" height="62" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="278" y="483.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="278" dy="0">_make_config：compilation / structured_outputs /</tspan><tspan x="278" dy="17.36">profiler / attention</tspan></text><rect class="rough" x="560" y="456" width="476" height="62" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="798" y="483.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">None→默认 · dict→is_init_field 过滤→展开</tspan><tspan x="798" dy="17.36">· 实例→透传 · 裸 int→CompilationMode(int)</tspan></text><path d="M 512 487 L 553.0 487.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 560 487 L 549.0 491.4 L 549.0 482.6 z" fill="#66717a"/><path d="M 278 518 L 278.0 539.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 546 L 273.6 535.0 L 282.4 535.0 z" fill="#30363d"/><rect class="rough" x="44" y="546" width="992" height="46" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="540" y="574.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">dp_size &gt; 1  且  not external_launcher  且  not TPU  →  raise ValueError</tspan></text><path d="M 540 592 L 540.0 613.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 620 L 535.6 609.0 L 544.4 609.0 z" fill="#30363d"/><rect class="rough" x="320" y="620" width="440" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="638.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">类型化的 EngineArgs(...) ·</tspan><tspan x="540" dy="17.36">每个值类型安全且可跨进程传输</tspan></text><text x="540" y="682.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">LLM.__init__ 中的 Stage-0 kwargs 整形应用五处就地强制转换，外加单进程 data-parallel guard，使每个值到达 EngineArgs</tspan><tspan x="540" dy="17.36">构造器时已经类型安全、可跨进程传输。</tspan></text>
</svg>
