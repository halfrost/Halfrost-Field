<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="710" viewBox="0 0 1080 710" role="img" aria-label="kwargs 整形：进入 EngineArgs 前的五处就地强制转换">
<defs>
  <filter id="roughen">
