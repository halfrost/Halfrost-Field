<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="606" viewBox="0 0 1080 606" role="img" aria-label="在克隆对象上最终化 params：token 预算">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="606" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">在克隆对象上最终化 params：token 预算</tspan></text>
<text x="80" y="113.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="80" dy="0">[ 0 .. max_model_len ]  token 预算</tspan></text><rect class="rough" x="80" y="128" width="382" height="48" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="271" y="148.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="271" dy="0">prompt seq_len（prompt_token_ids |</tspan><tspan x="271" dy="14.879999999999999">prompt_embeds）</tspan></text><rect class="rough" x="478" y="128" width="522" height="48" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="739" y="156.32" text-anchor="middle" font-size="12" font-weight="700" fill="#27323a"><tspan x="739" dy="0">max_tokens = max_model_len − seq_len</tspan></text><text x="80" y="196.32" text-anchor="start" font-size="12" font-weight="500" fill="#66717a"><tspan x="80" dy="0">0</tspan></text><text x="470" y="196.32" text-anchor="middle" font-size="12" font-weight="700" fill="#27323a"><tspan x="470" dy="0">seq_len</tspan></text><text x="1000" y="196.32" text-anchor="end" font-size="12" font-weight="700" fill="#27323a"><tspan x="1000" dy="0">max_model_len</tspan></text><text x="540" y="220.32" text-anchor="middle" font-size="12" font-weight="600" fill="#c07a1a"><tspan x="540" dy="0">decoder prompt 不能正好落在 max_model_len —— 连 1 个输出 token 的空间都没有</tspan></text><rect class="rough" x="90" y="250" width="220" height="58" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="200" y="284.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="200" dy="0">调用方 params</tspan></text><rect class="rough" x="430" y="250" width="220" height="58" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="540" y="284.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">每请求对象</tspan></text><text x="370" y="244.68" text-anchor="middle" font-size="13" font-weight="700" fill="#66717a"><tspan x="370" dy="0">clone()</tspan></text><path d="M 310 279 L 423.0 279.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 430 279 L 419.0 283.4 L 419.0 274.6 z" fill="#30363d"/><rect class="rough" x="720" y="228" width="310" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="875" y="247.14000000000001" text-anchor="middle" font-size="11" font-weight="600" fill="#27323a"><tspan x="875" dy="0">update_from_generation_config</tspan><tspan x="875" dy="13.64">generation_config 默认值 + EOS id</tspan></text><rect class="rough" x="720" y="286" width="310" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="875" y="311.96" text-anchor="middle" font-size="11" font-weight="600" fill="#27323a"><tspan x="875" dy="0">update_from_tokenizer  ·  停止 token</tspan></text><path d="M 720 250 L 660.8 266.2" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 654 268 L 663.5 260.9 L 665.8 269.4 z" fill="#66717a"/><path d="M 720 308 L 660.8 293.6" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 654 292 L 665.7 290.3 L 663.7 298.9 z" fill="#66717a"/><rect class="rough" x="390" y="356" width="300" height="40" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="540" y="381.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="540" dy="0">恰好一个非 None（XOR）</tspan></text><rect class="rough" x="90" y="430" width="440" height="54" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="310" y="453.75" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="310" dy="0">SamplingParams 分支 → sampling_params 有值  · </tspan><tspan x="310" dy="15.5">pooling_params 为 None</tspan></text><rect class="rough" x="560" y="430" width="440" height="54" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="780" y="461.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="780" dy="0">否则 → pooling_params 有值  ·  sampling_params 为 None</tspan></text><path d="M 500 396 L 326.9 428.7" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 320 430 L 330.0 423.6 L 331.6 432.3 z" fill="#66717a"/><path d="M 580 396 L 763.1 428.8" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 770 430 L 758.4 432.4 L 759.9 423.7 z" fill="#66717a"/><rect class="rough" x="56" y="502" width="968" height="38" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="525.68" text-anchor="middle" font-size="13" font-weight="600" fill="#27323a"><tspan x="540" dy="0">不变量：自有、完全填默认的 params —— engine core 永远不会看到 None 的 token 预算</tspan></text><text x="540" y="568.75" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">max_tokens 默认填为 max_model_len − seq_len（剩余额度），update_from_generation_config 与 update_from_tokenizer 折入模型默认值，且</tspan><tspan x="540" dy="15.5">sampling_params / pooling_params 恰好只有一个非 None —— 因此 engine core 永远不会看到 None 的 token 预算。</tspan></text>
</svg>
