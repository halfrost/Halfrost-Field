<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">supported-tasks 门：一次缓存答案塑形 route 与 state</tspan></text>
<rect class="rough" x="270" y="104" width="540" height="62" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="131.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">await engine_client.get_supported_tasks()</tspan><tspan x="540" dy="17.36">· 往返 EngineCore 一次 · memoized 于 self._supported_tasks</tspan></text><rect class="rough" x="90" y="186" width="380" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="280" y="204.67999999999998" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="280" dy="0">build_app(args, supported_tasks,</tspan><tspan x="280" dy="17.36">model_config)</tspan><tspan x="280" dy="17.36">· 挂载 router</tspan></text><rect class="rough" x="610" y="186" width="380" height="96" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="800" y="204.32" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="800" dy="0">init_app_state(engine_client, state,</tspan><tspan x="800" dy="17.36">args, supported_tasks)</tspan><tspan x="800" dy="17.36">· 安装 serving object</tspan><tspan x="800" dy="17.36">· state.engine_client = engine_client</tspan><tspan x="800" dy="17.36">(:391)</tspan></text><path d="M 540 166 L 287.0 185.5" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 280 186 L 290.6 180.8 L 291.3 189.5 z" fill="#30363d"/><path d="M 540 166 L 793.0 185.5" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 800 186 L 788.7 189.5 L 789.4 180.8 z" fill="#30363d"/><text x="540" y="221.04" text-anchor="middle" font-size="14" font-weight="800" fill="#66717a"><tspan x="540" dy="0">同一个 gate (I-5)</tspan></text><rect class="rough" x="44" y="296" width="204" height="32" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="317.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="146" dy="0">supported task</tspan></text><rect class="rough" x="262" y="296" width="480" height="32" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="502" y="317.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="502" dy="0">挂载的 route</tspan></text><rect class="rough" x="756" y="296" width="280" height="32" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="896" y="317.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="896" dy="0">serving object</tspan></text><rect class="rough" x="44" y="342" width="204" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="146" y="369.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="146" dy="0">&quot;generate&quot;</tspan></text><rect class="rough" x="262" y="342" width="480" height="44" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="502" y="360.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="502" dy="0">/v1/chat/completions · /v1/completions ·</tspan><tspan x="502" dy="17.36">/v1/responses</tspan></text><rect class="rough" x="756" y="342" width="280" height="44" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="896" y="369.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="896" dy="0">Chat / Completion / Responses</tspan></text><rect class="rough" x="44" y="400" width="204" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="146" y="427.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="146" dy="0">任意 pooling task</tspan></text><rect class="rough" x="262" y="400" width="480" height="44" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="502" y="427.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="502" dy="0">/v1/embeddings · /classify · /score</tspan></text><rect class="rough" x="756" y="400" width="280" height="44" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="896" y="427.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="896" dy="0">Embedding / Classify / Score</tspan></text><rect class="rough" x="44" y="458" width="204" height="44" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="146" y="476.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="146" dy="0">&quot;transcription&quot; /</tspan><tspan x="146" dy="17.36">&quot;realtime&quot;</tspan></text><rect class="rough" x="262" y="458" width="480" height="44" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="502" y="485.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="502" dy="0">/v1/audio/* · /v1/realtime</tspan></text><rect class="rough" x="756" y="458" width="280" height="44" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="896" y="485.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="896" dy="0">Transcription / Realtime</tspan></text><path d="M 280 248 L 280.0 289.0" fill="none" stroke="#66717a" stroke-width="1.5" stroke-dasharray="8 7"/><path d="M 280 296 L 275.6 285.0 L 284.4 285.0 z" fill="#66717a"/><path d="M 800 282 L 800.0 289.0" fill="none" stroke="#66717a" stroke-width="1.5" stroke-dasharray="8 7"/><path d="M 800 296 L 795.6 285.0 L 804.4 285.0 z" fill="#66717a"/><rect class="rough" x="44" y="516" width="992" height="40" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="540" y="541.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">无 supported_tasks（已弃用）→ 告警 + _FALLBACK_SUPPORTED_TASKS = (&quot;generate&quot;,)</tspan></text><rect class="rough" x="44" y="570" width="992" height="40" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="540" y="595.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">仅渲染 (init_render_app_state) → state.engine_client = None · /health 恒 200</tspan></text><rect class="rough" x="44" y="624" width="992" height="42" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="540" y="650.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">不受支持的能力 → 在路由阶段 404，而非请求时才失败的 handler</tspan></text><text x="540" y="691.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">route table 与 app.state serving object 都是一次性缓存的 get_supported_tasks() 结果的纯函数：build_app 挂载</tspan><tspan x="540" dy="17.36">router、init_app_state 在完全相同的 gate 下安装 serving object，因此不受支持的能力根本没有 route，而不是在请求时才失败的</tspan><tspan x="540" dy="17.36">handler。</tspan></text>
