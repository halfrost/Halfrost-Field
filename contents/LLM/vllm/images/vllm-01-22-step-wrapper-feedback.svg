<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="668" viewBox="0 0 1080 668" role="img" aria-label="LLMEngine.step() 包装核心循环并反馈">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="668" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">LLMEngine.step() 包装核心循环并反馈</tspan></text>
<rect x="56" y="100" width="550" height="392" rx="16" fill="#dfeeff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="74" y="129.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="74" dy="0">LLMEngine.step  ·  前端</tspan></text><rect class="rough" x="76" y="150" width="510" height="70" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="331" y="173.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="331" dy="0">1 · get_output()</tspan></text><text x="331" y="208.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="331" dy="0">多态衔接点：Inproc 内联跑 EngineCore.step；SyncMP 在队列上阻塞</tspan></text><rect class="rough" x="76" y="248" width="510" height="70" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="331" y="271.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="331" dy="0">2 · output_processor.process_outputs(outputs)</tspan></text><text x="331" y="306.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="331" dy="0">反分词 → processed_outputs（request_outputs + reqs_to_abort）</tspan></text><rect class="rough" x="76" y="346" width="510" height="44" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="331" y="372.86" text-anchor="middle" font-size="13.5" font-weight="700" fill="#27323a"><tspan x="331" dy="0">3 · engine_core.abort_requests(reqs_to_abort)</tspan></text><rect class="rough" x="76" y="418" width="510" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="331" y="444.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="331" dy="0">4 · record_stats  ·  + DP lockstep 的 dummy-batch 快路径</tspan></text><path d="M 331 220 L 331.0 241.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 331 248 L 326.6 237.0 L 335.4 237.0 z" fill="#30363d"/><path d="M 331 318 L 331.0 339.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 331 346 L 326.6 335.0 L 335.4 335.0 z" fill="#30363d"/><path d="M 331 390 L 331.0 411.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 331 418 L 326.6 407.0 L 335.4 407.0 z" fill="#30363d"/><rect x="650" y="100" width="374" height="300" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="668" y="129.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="668" dy="0">EngineCore.step</tspan></text><rect class="rough" x="672" y="146" width="330" height="58" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="837" y="179.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="837" dy="0">由 get_output() 驱动</tspan></text><path d="M 837 204 L 837.0 225.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 837 232 L 832.6 221.0 L 841.4 221.0 z" fill="#30363d"/><rect class="rough" x="672" y="232" width="330" height="58" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="837" y="265.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="837" dy="0">反馈的 reqs_to_abort 落入 aborts_queue</tspan></text><path d="M 837 290 L 837.0 311.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 837 318 L 832.6 307.0 L 841.4 307.0 z" fill="#30363d"/><rect class="rough" x="672" y="318" width="330" height="58" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="837" y="351.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="837" dy="0">在下一步的 abort window 抽干</tspan></text><path d="M 586 185 L 665.0 175.8" fill="none" stroke="#66717a" stroke-width="2"/><path d="M 672 175 L 661.6 180.6 L 660.6 171.9 z" fill="#66717a"/><path d="M 586 356 L 667.2 270.1" fill="none" stroke="#c0524a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 672 265 L 667.6 276.0 L 661.2 270.0 z" fill="#c0524a"/><text x="582" y="408.32" text-anchor="end" font-size="12" font-weight="700" fill="#c0524a"><tspan x="582" dy="0">reqs_to_abort  →  下一步</tspan></text><rect class="rough" x="56" y="530" width="968" height="56" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="540" y="554.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="540" dy="0">不一致：EngineCoreOutput.finished（长度 / EOS）与 processor finish（停止串）可在某一步不同</tspan><tspan x="540" dy="14.879999999999999">EngineCore 发 token id，OutputProcessor 拥有 API 语义 / 文本</tspan></text><text x="540" y="615" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">LLMEngine.step() 包装核心循环：get_output()（多态衔接点）→ process_outputs → abort_requests(reqs_to_abort)，把 stop-string</tspan><tspan x="540" dy="15.5">触发的完成反馈回去，使下一次 EngineCore.step() 在其 abort window 停止它们 —— 这就是为什么 EngineCoreOutput.finished 与 processor</tspan><tspan x="540" dy="15.5">的 finish reason 可以在某一步合法地不一致。</tspan></text>
</svg>
