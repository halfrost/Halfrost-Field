a"><tspan x="535" dy="0">注入 reasoning_ended 提示 ·</tspan><tspan x="535" dy="17.36">语法只作用于 &lt;think&gt; 之后</tspan></text><path d="M 535 278 L 535.0 293.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 535 300 L 530.6 289.0 L 539.4 289.0 z" fill="#30363d"/><path d="M 535 364 L 535.0 379.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 535 386 L 530.6 375.0 L 539.4 375.0 z" fill="#30363d"/><path d="M 380 460 L 409.0 252.9" fill="none" stroke="#66717a" stroke-width="1.7" stroke-dasharray="8 7"/><path d="M 410 246 L 412.8 257.5 L 404.1 256.3 z" fill="#66717a"/><rect class="rough" x="706" y="104" width="330" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="871" y="131.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">模型原始文本（流式）</tspan></text><rect class="rough" x="706" y="176" width="330" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="871" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">DelegatingParser.parse_delta</tspan></text><rect class="rough" x="706" y="248" width="330" height="44" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="871" y="275.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">推理阶段（直到 &lt;/think&gt;）</tspan></text><rect class="rough" x="706" y="320" width="330" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="871" y="338.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">工具调用阶段 · named / required /</tspan><tspan x="871" dy="17.36">auto</tspan></text><rect class="rough" x="706" y="392" width="330" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="871" y="419.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">推理 · 正文 · 工具调用 增量</tspan></text><rect class="rough" x=