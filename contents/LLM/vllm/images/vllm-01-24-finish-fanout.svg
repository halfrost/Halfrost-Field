<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700" role="img" aria-label="完成一个请求会在两个时钟上分发">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="700" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">完成一个请求会在两个时钟上分发</tspan></text>
<rect class="rough" x="360" y="96" width="360" height="48" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="540" y="125.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="540" dy="0">_free_request  填充两个集合</tspan></text><rect x="56" y="180" width="470" height="202" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="74" y="209.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="74" dy="0">通道 1 → worker</tspan></text><rect class="rough" x="80" y="226" width="300" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="230" y="251.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="230" dy="0">finished_req_ids</tspan></text><text x="80" y="294.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="80" dy="0">随下一个 SchedulerOutput 传给 worker → 从持久 / 差分</tspan><tspan x="80" dy="17.36">batch 中裁剪该请求</tspan></text><text x="80" y="344.36" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="80" dy="0">以重新赋值（= set()，非 clear()）重置，使刚发出的</tspan><tspan x="80" dy="17.36">SchedulerOutput 保留其引用</tspan></text><rect x="554" y="180" width="470" height="202" rx="16" fill="#dfeeff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="572" y="209.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="572" dy="0">通道 2 → client</tspan></text><rect class="rough" x="578" y="226" width="330" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="743" y="251.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="743" dy="0">finished_req_ids_dict[client_index]</tspan></text><text x="578" y="302.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="578" dy="0">附加到发出的 EngineCoreOutputs.finished_requests →</tspan><tspan x="578" dy="17.36">OutputProcessor 回收其 RequestState</tspan></text><path d="M 440 144 L 297.8 178.4" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 291 180 L 300.7 173.1 L 302.7 181.7 z" fill="#66717a"/><path d="M 640 144 L 782.2 178.4" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 789 180 L 777.3 181.7 L 779.3 173.1 z" fill="#66717a"/><rect class="rough" x="360" y="400" width="360" height="40" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="425.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="540" dy="0">_free_request_blocks  ·  决策</tspan></text><rect class="rough" x="56" y="472" width="470" height="86" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="291" y="502.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="291" dy="0">not defer_block_free or last_sched_seq &lt;=</tspan><tspan x="291" dy="17.36">processed_step_seq</tspan><tspan x="291" dy="17.36">→ 立即 kv_cache_manager.free(request)</tspan></text><rect class="rough" x="554" y="472" width="470" height="86" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="789" y="502.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="789" dy="0">否则 → 把 (sched_step_seq, blocks) 暂存进</tspan><tspan x="789" dy="17.36">deferred_frees</tspan><tspan x="789" dy="17.36">→ 待该 GPU step 完成后才归还 pool</tspan></text><path d="M 470 440 L 297.9 470.8" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 291 472 L 301.1 465.7 L 302.6 474.4 z" fill="#66717a"/><path d="M 610 440 L 782.1 470.8" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 789 472 L 777.4 474.4 L 778.9 465.7 z" fill="#66717a"/><rect class="rough" x="56" y="576" width="968" height="44" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="540" y="594.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">不变量：只要还有已入队的 GPU write 可能触及某 block，就绝不归还它；客户端在本 step 即可观察到完成——只有 worker</tspan><tspan x="540" dy="17.36">侧状态清理等下一步</tspan></text><text x="540" y="645.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">finished_req_ids 随下一个 SchedulerOutput 传给 worker 以裁剪请求，而 finished_req_ids_dict 随本 step 的</tspan><tspan x="540" dy="17.36">EngineCoreOutputs.finished_requests 传给 client 以回收 RequestState —— _free_request_blocks 要么立即释放，要么把</tspan><tspan x="540" dy="17.36">block 暂存进 deferred_frees 直到任何 in-flight GPU write 完成。</tspan></text>
</svg>
