<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="632" viewBox="0 0 1080 632" role="img" aria-label="完整入口追踪：两扇门，一个汇聚点">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="632" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">完整入口追踪：两扇门，一个汇聚点</tspan></text>
<rect class="rough" x="390" y="104" width="300" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="540" y="122.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">命令行 · vllm serve → run_server</tspan><tspan x="540" dy="17.36">→ build_app（启动服务器）</tspan></text><path d="M 690 126 L 729.0 129.4" fill="none" stroke="#66717a" stroke-width="1.7" stroke-dasharray="8 7"/><path d="M 736 130 L 724.7 133.4 L 725.4 124.7 z" fill="#66717a"/><rect class="rough" x="44" y="98" width="300" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="194" y="125.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="194" dy="0">离线 · LLM.generate</tspan></text><rect class="rough" x="44" y="161" width="300" height="54" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="194" y="180.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="194" dy="0">_run_completion → _add_request</tspan></text><text x="194" y="208.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="194" dy="0">FINAL_ONLY · 计数器 id</tspan></text><rect class="rough" x="44" y="230" width="300" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="194" y="257.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="194" dy="0">LLMEngine.add_request</tspan></text><path d="M 194 142 L 194.0 154.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 194 161 L 189.6 150.0 L 198.4 150.0 z" fill="#30363d"/><path d="M 194 215 L 194.0 223.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 194 230 L 189.6 219.0 L 198.4 219.0 z" fill="#30363d"/><rect class="rough" x="736" y="98" width="300" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="886" y="116.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="886" dy="0">在线 · HTTP 路由 →</tspan><tspan x="886" dy="17.36">handler.create_*</tspan></text><rect class="rough" x="736" y="161" width="300" height="54" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="886" y="180.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="886" dy="0">to_sampling_params</tspan></text><text x="886" y="208.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="886" dy="0">DELTA/FINAL ← stream · cmpl- id</tspan></text><rect class="rough" x="736" y="230" width="300" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="886" y="248.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="886" dy="0">engine_client.generate →</tspan><tspan x="886" dy="17.36">AsyncLLM.add_request</tspan></text><path d="M 886 142 L 886.0 154.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 886 161 L 881.6 150.0 L 890.4 150.0 z" fill="#30363d"/><path d="M 886 215 L 886.0 223.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 886 230 L 881.6 219.0 L 890.4 219.0 z" fill="#30363d"/><text x="540" y="293.04" text-anchor="middle" font-size="14" font-weight="800" fill="#66717a"><tspan x="540" dy="0">汇聚</tspan></text><path d="M 194 274 L 433.0 301.2" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 440 302 L 428.6 305.1 L 429.6 296.4 z" fill="#30363d"/><path d="M 886 274 L 647.0 301.2" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 640 302 L 650.4 296.4 L 651.4 305.1 z" fill="#30363d"/><rect class="rough" x="360" y="302" width="360" height="66" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="319.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">input_processor.process_inputs →</tspan><tspan x="540" dy="17.36">EngineCoreRequest</tspan></text><text x="540" y="354.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">engine_core.add_request · 唯一汇聚点</tspan></text><rect class="rough" x="440" y="390" width="200" height="46" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="418.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="540" dy="0">EngineCore</tspan></text><path d="M 540 368 L 540.0 383.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 390 L 535.6 379.0 L 544.4 379.0 z" fill="#30363d"/><rect class="rough" x="44" y="452" width="300" height="72" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="194" y="480.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="194" dy="0">同步抽干（本线程）</tspan></text><text x="194" y="499.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="194" dy="0">while step() · 按 id 排序 →</tspan><tspan x="194" dy="17.36">list[RequestOutput]</tspan></text><rect class="rough" x="736" y="452" width="300" height="72" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="886" y="480.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="886" dy="0">异步流式</tspan></text><text x="886" y="499.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="886" dy="0">RequestOutputCollector → 处理器</tspan><tspan x="886" dy="17.36">→ SSE [DONE]</tspan></text><path d="M 470 436 L 307.0 451.3" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 300 452 L 310.5 446.6 L 311.4 455.3 z" fill="#30363d"/><path d="M 610 436 L 773.0 451.3" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 780 452 L 768.6 455.3 L 769.5 446.6 z" fill="#30363d"/><text x="540" y="475.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="540" dy="0">同一个 request_id 原路返回 · 离线按顺序，在线按 id</tspan></text><text x="540" y="569.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">两扇门 —— 离线 LLM.generate 与一次 HTTP 请求（由 vllm serve 命令行启动的服务器承接）—— 都汇聚到唯一的</tspan><tspan x="540" dy="17.36">input_processor.process_inputs → EngineCoreRequest → engine_core.add_request</tspan><tspan x="540" dy="17.36">汇聚点；在它之下所有协议差异都被抹平，唯一真正的分流是抽干方式：离线阻塞并排序，在线返回队列并流式输出。</tspan></text>
</svg>
