<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" role="img" aria-label="输入处理：五种 prompt 形态 → 一个 EngineCoreRequest">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="600" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">输入处理：五种 prompt 形态 → 一个 EngineCoreRequest</tspan></text>
<text x="144" y="109.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="144" dy="0">5 种 prompt 形态</tspan></text><rect class="rough" x="44" y="122" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="149.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">str / TextPrompt</tspan></text><path d="M 244 144 L 266.0 298.1" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 261.1 294.7 L 269.8 293.5 z" fill="#66717a"/><rect class="rough" x="44" y="182" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="200.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">TokensPrompt（token</tspan><tspan x="144" dy="17.36">id）</tspan></text><path d="M 244 204 L 265.4 298.2" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 260.3 295.3 L 268.8 293.3 z" fill="#66717a"/><rect class="rough" x="44" y="242" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="269.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">EmbedsPrompt（嵌入）</tspan></text><path d="M 244 264 L 263.6 298.9" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 257.8 297.6 L 265.5 293.3 z" fill="#66717a"/><rect class="rough" x="44" y="302" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="329.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">编码器 / 解码器 对</tspan></text><path d="M 244 324 L 261.6 309.5" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 261.3 315.4 L 255.7 308.6 z" fill="#66717a"/><rect class="rough" x="44" y="362" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="380.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">多模态包 {image,</tspan><tspan x="144" dy="17.36">audio}</tspan></text><path d="M 244 384 L 265.0 311.7" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 268.1 316.8 L 259.7 314.3 z" fill="#66717a"/><rect x="267" y="104" width="372" height="404" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="285" y="133.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="285" dy="0">输入处理器 · process_inputs</tspan></text><rect class="rough" x="283" y="150" width="340" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="453" y="177.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">校验（任务 · 参数 · LoRA · DP rank）</tspan></text><path d="M 453 194 L 453.0 201.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 208 L 448.6 197.0 L 457.4 197.0 z" fill="#30363d"/><rect class="rough" x="283" y="208" width="340" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="453" y="235.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">分词 / 渲染  ·  或直接接收 token id</tspan></text><path d="M 453 252 L 453.0 259.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 266 L 448.6 255.0 L 457.4 255.0 z" fill="#30363d"/><rect class="rough" x="283" y="266" width="340" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="453" y="293.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">展平多模态 → mm_features + 双哈希</tspan></text><path d="M 453 310 L 453.0 317.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 324 L 448.6 313.0 L 457.4 313.0 z" fill="#30363d"/><rect class="rough" x="283" y="324" width="340" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="453" y="351.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">克隆 + 定型参数（max_tokens 具体化）</tspan></text><path d="M 453 368 L 453.0 375.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 382 L 448.6 371.0 L 457.4 371.0 z" fill="#30363d"/><rect class="rough" x="283" y="382" width="340" height="44" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="453" y="409.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">附加 LoRA · cache_salt · 播种块哈希键</tspan></text><path d="M 453 426 L 453.0 433.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 440 L 448.6 429.0 L 457.4 429.0 z" fill="#30363d"/><rect class="rough" x="283" y="440" width="340" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="453" y="467.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">assign_request_id（外部 id + 8 位随机）</tspan></text><rect x="662" y="120" width="374" height="404" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="849" y="148.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="849" dy="0">EngineCoreRequest</tspan></text><text x="849" y="162.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="849" dy="0">msgspec · array_like · gc=false ·</tspan><tspan x="849" dy="17.36">线上结构体</tspan></text><rect class="rough" x="678" y="188" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="208.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">request_id</tspan></text><rect class="rough" x="678" y="232" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="252.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">prompt_token_ids | prompt_embeds</tspan></text><rect class="rough" x="678" y="276" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="296.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">mm_features</tspan></text><rect class="rough" x="678" y="320" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="340.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">sampling_params | pooling_params</tspan></text><rect class="rough" x="678" y="364" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="384.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">lora_request</tspan></text><rect class="rough" x="678" y="408" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="428.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">cache_salt · arrival_time</tspan></text><rect class="rough" x="678" y="452" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="472.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">priority · data_parallel_rank</tspan></text><text x="849" y="501.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="849" dy="0">一个统一结构体 —— 异构性消失；下游只读 token</tspan><tspan x="849" dy="17.36">id 与参数</tspan></text><path d="M 639 305 L 655.2 301.5" fill="none" stroke="#30363d" stroke-width="2.4"/><path d="M 662 300 L 652.2 306.6 L 650.3 298.0 z" fill="#30363d"/><text x="540" y="562.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">一次 process_inputs 调用完成校验、分词、展平多模态、定型参数并铸造缓存键 —— 把五种异构 prompt 形态收敛成一个线上形态的</tspan><tspan x="540" dy="17.36">EngineCoreRequest，供整个引擎使用。</tspan></text>
</svg>
