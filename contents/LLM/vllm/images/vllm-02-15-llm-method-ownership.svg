<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="570" viewBox="0 0 1080 570" role="img" aria-label="LLM 的方法归属沿 MRO 分布">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="570" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">LLM 的方法归属沿 MRO 分布</tspan></text>
<rect class="rough" x="44" y="104" width="992" height="48" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="133.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">class LLM(BeamSearchOfflineMixin, PoolingOfflineMixin, OfflineInferenceMixin) · 构建 V1 LLMEngine (llm.py:66)</tspan></text><text x="540" y="177.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="540" dy="0">MRO 顺序 →</tspan></text><rect class="rough" x="44" y="184" width="228" height="228" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="60" y="213.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="60" dy="0">LLM（基类）</tspan></text><text x="60" y="278.64000000000004" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="60" dy="0">__init__</tspan><tspan x="60" dy="17.36">generate</tspan><tspan x="60" dy="17.36">chat</tspan><tspan x="60" dy="17.36">enqueue</tspan><tspan x="60" dy="17.36">wait_for_completion</tspan><tspan x="60" dy="17.36">引擎控制辅助方法</tspan></text><path d="M 272 200 L 283.0 200.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 290 200 L 279.0 204.4 L 279.0 195.6 z" fill="#66717a"/><rect class="rough" x="290" y="184" width="228" height="228" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="306" y="213.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="306" dy="0">OfflineInferenceMixin</tspan></text><text x="306" y="252.6" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="306" dy="0">_run_completion</tspan><tspan x="306" dy="17.36">_render_and_add_reques</tspan><tspan x="306" dy="17.36">ts</tspan><tspan x="306" dy="17.36">_add_request —— 汇聚点</tspan><tspan x="306" dy="17.36">强制 FINAL_ONLY + 计数器</tspan><tspan x="306" dy="17.36">id</tspan><tspan x="306" dy="17.36">_run_engine ——</tspan><tspan x="306" dy="17.36">阻塞抽干</tspan><tspan x="306" dy="17.36">按 id 排序</tspan></text><path d="M 518 200 L 529.0 200.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 536 200 L 525.0 204.4 L 525.0 195.6 z" fill="#66717a"/><rect class="rough" x="536" y="184" width="228" height="228" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="552" y="213.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="552" dy="0">PoolingOfflineMixin</tspan></text><text x="552" y="278.64000000000004" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="552" dy="0">encode</tspan><tspan x="552" dy="17.36">embed</tspan><tspan x="552" dy="17.36">classify</tspan><tspan x="552" dy="17.36">score</tspan><tspan x="552" dy="17.36">_verify_pooling_task</tspan><tspan x="552" dy="17.36">pooling_io_processors</tspan></text><path d="M 764 200 L 775.0 200.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 782 200 L 771.0 204.4 L 771.0 195.6 z" fill="#66717a"/><rect class="rough" x="782" y="184" width="228" height="228" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="798" y="213.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="798" dy="0">BeamSearchOfflineMixin</tspan></text><text x="798" y="304.68" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="798" dy="0">beam_search</tspan><tspan x="798" dy="17.36">Python 驱动</tspan><tspan x="798" dy="17.36">max_tokens=1</tspan></text><rect class="rough" x="44" y="426" width="474" height="62" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="281" y="453.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="281" dy="0">请求方法从不构造配置/引擎</tspan><tspan x="281" dy="17.36">—— 只对已建好的引擎分发</tspan></text><rect class="rough" x="536" y="426" width="514" height="62" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="793" y="453.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="793" dy="0">PoolingOfflineMixin.__init__(self) 被显式调用 (llm.py:381)</tspan><tspan x="793" dy="17.36">—— cooperative super() 链无法可靠到达它</tspan></text><text x="540" y="524.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">LLM 的方法面分布在其 MRO 上：基类 LLM 拥有请求入口，OfflineInferenceMixin 拥有 _add_request/_run_engine</tspan><tspan x="540" dy="17.36">主干，PoolingOfflineMixin 拥有 encode/embed/classify/score，BeamSearchOfflineMixin 拥有 beam_search。</tspan></text>
</svg>
