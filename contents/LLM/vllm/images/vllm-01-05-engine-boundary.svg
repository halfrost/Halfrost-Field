<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="736" viewBox="0 0 1080 736" role="img" aria-label="引擎边界：一次 add_request，两种落地">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="736" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">引擎边界：一次 add_request，两种落地</tspan></text>
<rect class="rough" x="330" y="96" width="420" height="46" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="124.76" text-anchor="middle" font-size="16" font-weight="700" fill="#27323a"><tspan x="540" dy="0">add_request  ·  step / get_output</tspan></text><text x="540" y="168.5" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">同一套 API —— 前端在两种模式下调用相同方法</tspan></text><rect x="56" y="186" width="452" height="406" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="74" y="215.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="74" dy="0">进程内  ·  单进程（需显式关闭多进程）</tspan></text><rect class="rough" x="92" y="250" width="380" height="48" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="282" y="279.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="282" dy="0">LLMEngine</tspan></text><path d="M 282 298 L 282.0 319.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 282 326 L 277.6 315.0 L 286.4 315.0 z" fill="#30363d"/><rect class="rough" x="92" y="326" width="380" height="48" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="282" y="355.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="282" dy="0">InprocClient（持有真实 EngineCore）</tspan></text><path d="M 282 374 L 282.0 395.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 282 402 L 277.6 391.0 L 286.4 391.0 z" fill="#30363d"/><rect class="rough" x="92" y="402" width="380" height="48" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="282" y="431.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="282" dy="0">EngineCore</tspan></text><text x="282" y="516.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="282" dy="0">直接方法调用 · 无序列化、无 socket · 准入与 step 串行</tspan></text><rect x="572" y="186" width="452" height="406" rx="16" fill="#dfeeff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="590" y="215.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="590" dy="0">多进程  ·  默认（环境变量 = 1）</tspan></text><rect x="590" y="240" width="416" height="156" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="608" y="269.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="608" dy="0">前端进程</tspan></text><rect class="rough" x="610" y="290" width="376" height="36" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="798" y="312.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="798" dy="0">LLMEngine / AsyncLLM</tspan></text><rect class="rough" x="610" y="344" width="376" height="36" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="798" y="366.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="798" dy="0">SyncMPClient / AsyncMPClient</tspan></text><rect class="rough" x="610" y="416" width="376" height="26" rx="13" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="798" y="433.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="798" dy="0">ZMQ  ROUTER ↔ DEALER  ·  ADD b'\x00' · msgpack</tspan></text><path d="M 798 380 L 798.0 409.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 798 416 L 793.6 405.0 L 802.4 405.0 z" fill="#30363d"/><rect x="590" y="462" width="416" height="110" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="608" y="491.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="608" dy="0">EngineCore 进程</tspan></text><rect class="rough" x="610" y="510" width="376" height="40" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="798" y="534.68" text-anchor="middle" font-size="13" font-weight="600" fill="#27323a"><tspan x="798" dy="0">EngineCore（忙循环）</tspan></text><path d="M 798 442 L 798.0 503.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 798 510 L 793.6 499.0 L 802.4 499.0 z" fill="#30363d"/><rect class="rough" x="150" y="614" width="780" height="40" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="638.86" text-anchor="middle" font-size="13.5" font-weight="700" fill="#27323a"><tspan x="540" dy="0">同一套生命周期 → preprocess_add_request → scheduler.add_request</tspan></text><path d="M 240 592 L 323.2 612.3" fill="none" stroke="#66717a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 330 614 L 318.3 615.7 L 320.4 607.1 z" fill="#66717a"/><path d="M 856 592 L 756.9 612.6" fill="none" stroke="#66717a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 750 614 L 759.9 607.5 L 761.7 616.1 z" fill="#66717a"/><text x="540" y="690.88" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">一个句柄，构造时一次选定：进程内把 add_request 收敛为一次方法调用；多进程把它序列化到一字节标签后经 ZMQ 送往后台 EngineCore —— 但两者都跑同一条</tspan><tspan x="540" dy="14.879999999999999">preprocess_add_request → scheduler.add_request 生命周期。</tspan></text>
</svg>
