<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="706" viewBox="0 0 1080 706" role="img" aria-label="统一计数器模型：调度就是缩小一个差距">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="706" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">统一计数器模型：调度就是缩小一个差距</tspan></text>
<text x="540" y="112.32" text-anchor="middle" font-size="12" font-weight="700" fill="#27323a"><tspan x="540" dy="0">0  →  num_tokens_with_spec = len(prompt_token_ids) + len(output_token_ids) + len(spec_token_ids)</tspan></text><rect x="260" y="126" width="18" height="18" rx="4" fill="#b8d8ff" stroke="#30363d" stroke-width="1.2"/><text x="286" y="139.32" text-anchor="start" font-size="12" font-weight="500" fill="#66717a"><tspan x="286" dy="0">num_computed_tokens（KV 已填充）</tspan></text><text x="620" y="139.32" text-anchor="start" font-size="12" font-weight="500" fill="#66717a"><tspan x="620" dy="0">本 step 授予的差距</tspan></text><rect class="rough" x="56" y="168" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="198.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">a · 全新 prompt</tspan></text><rect class="rough" x="260" y="180" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><path d="M 260 174 L 260 168 L 760 168 L 760 174" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 260 176 L 260 212" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="190.88" text-anchor="start" font-size="12" font-weight="500" fill="#27323a"><tspan x="776" dy="0">computed = 0，大差距 → 看起来 token</tspan><tspan x="776" dy="14.879999999999999">需求很大</tspan></text><rect class="rough" x="56" y="242" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="272.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">b · chunked prefill</tspan></text><rect class="rough" x="260" y="254" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="260" y="254" width="175" height="28" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="1.6"/><path d="M 435 248 L 435 242 L 760 242 L 760 248" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 435 250 L 435 286" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="264.88" text-anchor="start" font-size="12" font-weight="500" fill="#27323a"><tspan x="776" dy="0">授予 &lt; 差距 → computed</tspan><tspan x="776" dy="14.879999999999999">前进一部分（无特殊代码路径）</tspan></text><rect class="rough" x="56" y="316" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="346.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">c · decode</tspan></text><rect class="rough" x="260" y="328" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="260" y="328" width="450" height="28" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="1.6"/><path d="M 710 322 L 710 316 L 760 316 L 760 322" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 710 324 L 710 360" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="346.32" text-anchor="start" font-size="12" font-weight="500" fill="#27323a"><tspan x="776" dy="0">差距 = 1 → 授予 1</tspan></text><rect class="rough" x="56" y="390" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="420.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">d · prefix-cache 命中</tspan></text><rect class="rough" x="260" y="402" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="260" y="402" width="340" height="28" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="1.6"/><path d="M 600 396 L 600 390 L 760 390 L 760 396" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 600 398 L 600 434" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="412.88" text-anchor="start" font-size="12" font-weight="500" fill="#27323a"><tspan x="776" dy="0">computed 因复用 block 前跳 ——</tspan><tspan x="776" dy="14.879999999999999">有效差距缩小</tspan></text><rect class="rough" x="56" y="464" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="494.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">e · 投机</tspan></text><rect class="rough" x="260" y="476" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="260" y="476" width="250" height="28" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="650" y="476" width="109.99999999999999" height="28" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="1.6"/><path d="M 510 470 L 510 464 L 650 464 L 650 470" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 510 472 L 510 508" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="486.88" text-anchor="start" font-size="12" font-weight="500" fill="#27323a"><tspan x="776" dy="0">num_tokens_with_spec 因 draft token</tspan><tspan x="776" dy="14.879999999999999">抬高以待验证</tspan></text><rect class="rough" x="56" y="542" width="968" height="34" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="540" y="563.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="540" dy="0">调度优先级：RUNNING 的 decode 先对 token_budget 抽干，然后 waiting 的 prefill 填入剩余</tspan></text><rect class="rough" x="56" y="590" width="968" height="34" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="611.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#27323a"><tspan x="540" dy="0">不变量：请求路径只根据&quot;多少个 token&quot;分支，从不根据&quot;prefill vs decode&quot;</tspan></text><text x="540" y="660.75" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">调度就是缩小 num_computed_tokens（KV 已填充）与 num_tokens_with_spec 之间的差距 —— 全新 prompt、chunked prefill、单 token</tspan><tspan x="540" dy="15.5">decode、prefix-cache 跳跃、speculative draft token 都是同一种缩差操作，因此请求路径只根据多少个 token 分支。</tspan></text>
</svg>
