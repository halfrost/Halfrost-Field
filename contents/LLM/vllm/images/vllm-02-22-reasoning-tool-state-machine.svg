<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="592" viewBox="0 0 1080 592" role="img" aria-label="推理先于工具：两阶段的解析器状态机">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="592" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">推理先于工具：两阶段的解析器状态机</tspan></text>
<rect class="rough" x="200" y="104" width="680" height="62" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="122.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">首次 parse_delta 从 prompt token 预置 state.reasoning_ended</tspan><tspan x="540" dy="17.36">(abstract_parser.py:805-817)</tspan><tspan x="540" dy="17.36">· 与服务端 _create_chat_completion 的预置一致</tspan></text><path d="M 400 166 L 256.7 211.9" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 250 214 L 259.1 206.5 L 261.8 214.8 z" fill="#30363d"/><rect class="rough" x="70" y="214" width="360" height="170" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="86" y="243.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="86" dy="0">状态 1 · REASONING（推理）</tspan></text><text x="86" y="279.64000000000004" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="86" dy="0">guard _in_reasoning_phase =</tspan><tspan x="86" dy="17.36">(_reasoning_parser is not None)</tspan><tspan x="86" dy="17.36">and (not state.reasoning_ended)</tspan><tspan x="86" dy="17.36">———</tspan><tspan x="86" dy="17.36">动作：推理抽取 →</tspan><tspan x="86" dy="17.36">发射推理增量</tspan></text><rect class="rough" x="650" y="214" width="360" height="170" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="666" y="243.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="666" dy="0">状态 2 · TOOL_CALL（工具调用）</tspan></text><text x="666" y="270.96000000000004" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="666" dy="0">guard _in_tool_call_phase =</tspan><tspan x="666" dy="17.36">(_tool_parser is not None)</tspan><tspan x="666" dy="17.36">and state.reasoning_ended</tspan><tspan x="666" dy="17.36">———</tspan><tspan x="666" dy="17.36">动作：工具调用抽取 →</tspan><tspan x="666" dy="17.36">按 tool_choice 分派：</tspan><tspan x="666" dy="17.36">named / required / auto</tspan></text><path d="M 430 292 L 643.0 292.0" fill="none" stroke="#30363d" stroke-width="2.4"/><path d="M 650 292 L 639.0 296.4 L 639.0 287.6 z" fill="#30363d"/><text x="540" y="262.36" text-anchor="middle" font-size="14" font-weight="700" fill="#c07a1a"><tspan x="540" dy="0">&lt;/think&gt; 于 :842-844</tspan><tspan x="540" dy="17.36">翻转 reasoning_ended = True</tspan></text><rect class="rough" x="70" y="400" width="360" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="250" y="427.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="250" dy="0">parser 为 None → guard False → 直通正文</tspan></text><rect class="rough" x="650" y="400" width="360" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="830" y="427.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="830" dy="0">parser 为 None → guard False → 直通正文</tspan></text><rect class="rough" x="44" y="460" width="992" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="487.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">推理严格先于工具 —— 在两处强制：引擎 grammar 与面向客户端的 parser</tspan></text><text x="540" y="548.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">DelegatingParser.parse_delta 是两阶段状态机：reasoning 阶段严格先于 tool-call 阶段（在 &lt;/think&gt; 之类的推理结束标记翻转</tspan><tspan x="540" dy="17.36">reasoning_ended 之后），因此 tool 语法绝不会从 &lt;think&gt; token 中解析出来。</tspan></text>
</svg>
