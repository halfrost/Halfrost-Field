<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="616" viewBox="0 0 1080 616" role="img" aria-label="执行器边界：一次 RPC，一个权威回复">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="616" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">执行器边界：一次 RPC，一个权威回复</tspan></text>
<rect class="rough" x="44" y="160" width="206" height="92" rx="12" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="147" y="193.76" text-anchor="middle" font-size="16" font-weight="700" fill="#27323a"><tspan x="147" dy="0">EngineCore.step</tspan></text><text x="147" y="223.27" text-anchor="middle" font-size="10.5" font-weight="500" fill="#66717a"><tspan x="147" dy="0">execute_model →</tspan><tspan x="147" dy="13.02">sample_tokens</tspan></text><rect class="rough" x="288" y="160" width="214" height="92" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="395" y="193.76" text-anchor="middle" font-size="16" font-weight="700" fill="#27323a"><tspan x="395" dy="0">Executor</tspan></text><text x="395" y="223.27" text-anchor="middle" font-size="10.5" font-weight="500" fill="#66717a"><tspan x="395" dy="0">collective_rpc · uni |</tspan><tspan x="395" dy="13.02">multiproc</tspan></text><path d="M 250 206 L 281.0 206.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 288 206 L 277.0 210.4 L 277.0 201.6 z" fill="#30363d"/><rect x="556" y="108" width="368" height="152" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="574" y="137.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="574" dy="0">PP 阶段 0</tspan></text><rect x="556" y="274" width="368" height="152" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="574" y="303.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="574" dy="0">PP 阶段 1（最后）</tspan></text><rect class="rough" x="576" y="154" width="328" height="38" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="740" y="177.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="740" dy="0">rank 0 · TP0</tspan></text><path d="M 502 206 L 569.6 175.9" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 576 173 L 567.7 181.5 L 564.2 173.5 z" fill="#66717a"/><rect class="rough" x="576" y="206" width="328" height="38" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="740" y="229.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="740" dy="0">rank 1 · TP1</tspan></text><path d="M 502 206 L 569.2 223.3" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 576 225 L 564.3 226.5 L 566.4 218.0 z" fill="#66717a"/><rect class="rough" x="576" y="320" width="328" height="38" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="740" y="343.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="740" dy="0">rank 2 · TP0  ·  输出 rank</tspan></text><path d="M 502 206 L 572.6 332.9" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 576 339 L 566.8 331.5 L 574.5 327.2 z" fill="#66717a"/><rect class="rough" x="576" y="372" width="328" height="38" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="740" y="395.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="740" dy="0">rank 3 · TP1</tspan></text><path d="M 502 206 L 573.4 384.5" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 576 391 L 567.8 382.4 L 576.0 379.2 z" fill="#66717a"/><path d="M 576 322 L 507.9 219.8" fill="none" stroke="#c07a1a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 504 214 L 513.8 220.7 L 506.4 225.6 z" fill="#c07a1a"/><text x="742" y="452.14" text-anchor="middle" font-size="11.5" font-weight="700" fill="#c07a1a"><tspan x="742" dy="0">只有输出 rank 回复 → ModelRunnerOutput</tspan></text><text x="147" y="294.32" text-anchor="middle" font-size="12" font-weight="700" fill="#66717a"><tspan x="147" dy="0">每个 worker 内部</tspan></text><rect class="rough" x="44" y="306" width="184" height="74" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="136" y="334.68" text-anchor="middle" font-size="13" font-weight="700" fill="#27323a"><tspan x="136" dy="0">ModelRunner.forward</tspan></text><text x="136" y="361.42" text-anchor="middle" font-size="9.5" font-weight="500" fill="#66717a"><tspan x="136" dy="0">持久批次差分 · 展平前向</tspan></text><rect class="rough" x="242" y="306" width="116" height="74" rx="12" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="300" y="335.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="300" dy="0">logits</tspan></text><text x="300" y="361.42" text-anchor="middle" font-size="9.5" font-weight="500" fill="#66717a"><tspan x="300" dy="0">只投影末位位置</tspan></text><rect class="rough" x="388" y="306" width="150" height="74" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="463" y="339.75" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="463" dy="0">Sampler → token</tspan><tspan x="463" dy="15.5">id</tspan></text><path d="M 228 343 L 235.0 343.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 242 343 L 231.0 347.4 L 231.0 338.6 z" fill="#30363d"/><path d="M 358 343 L 381.0 343.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 388 343 L 377.0 347.4 L 377.0 338.6 z" fill="#30363d"/><rect class="rough" x="44" y="478" width="992" height="52" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="540" y="508.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="540" dy="0">output_rank = world_size − tp_size × prefill_context_parallel_size = 最后 PP 阶段的首个 TP worker  ·  仅纯 TP / 单卡时才等于全局 rank 0</tspan></text><text x="540" y="581.44" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">EngineCore.step 命名的是操作而非设备：collective_rpc 把 execute_model / sample_tokens 扇出到一个或 N 个 worker，每个都跑</tspan><tspan x="540" dy="14.879999999999999">ModelRunner.forward → logits → Sampler；采样得到的 ModelRunnerOutput 只从单一输出 rank 回来 —— 最后 PP 阶段的首个 TP worker，未必是</tspan><tspan x="540" dy="14.879999999999999">rank 0。</tspan></text>
</svg>
