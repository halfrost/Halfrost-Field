<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="870" viewBox="0 0 1080 870" role="img" aria-label="process_inputs 内部：有序流程">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="870" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">process_inputs 内部：有序流程</tspan></text>
<rect class="rough" x="56" y="100" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="134.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">1 · 校验 —— _validate_params / _validate_lora / DP-rank 边界</tspan></text><rect class="rough" x="712" y="100" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="134.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">在分词前就拒绝</tspan></text><path d="M 672 130 L 701.0 130.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 130 L 697.0 134.4 L 697.0 125.6 z" fill="#66717a"/><path d="M 362 160 L 362.0 179.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 186 L 357.6 175.0 L 366.4 175.0 z" fill="#30363d"/><rect class="rough" x="56" y="186" width="612" height="60" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="362" y="205.44" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">2 · 依 isinstance(prompt, dict) and &quot;type&quot; in prompt 分叉 ——</tspan><tspan x="362" dy="14.879999999999999">已渲染的 EngineInput 原样接收 | 否则弃用路径 InputPreprocessor.preprocess() →</tspan><tspan x="362" dy="14.879999999999999">renderer</tspan></text><rect class="rough" x="712" y="186" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="220.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">两条路都归一为 EngineInput</tspan></text><path d="M 672 216 L 701.0 216.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 216 L 697.0 220.4 L 697.0 211.6 z" fill="#66717a"/><path d="M 362 246 L 362.0 265.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 272 L 357.6 261.0 L 366.4 261.0 z" fill="#30363d"/><rect class="rough" x="56" y="272" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="306.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">3 · current_platform.validate_request</tspan></text><rect class="rough" x="712" y="272" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="306.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">平台合法的请求</tspan></text><path d="M 672 302 L 701.0 302.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 302 L 697.0 306.4 L 697.0 297.6 z" fill="#66717a"/><path d="M 362 332 L 362.0 351.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 358 L 357.6 347.0 L 366.4 347.0 z" fill="#30363d"/><rect class="rough" x="56" y="358" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="384.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">4 · 拆分 enc / dec —— 校验长度与词表（非空、≤ max_model_len、generate 时 ≠</tspan><tspan x="362" dy="14.879999999999999">max_model_len）</tspan></text><rect class="rough" x="712" y="358" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="392.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">长度与词表在范围内</tspan></text><path d="M 672 388 L 701.0 388.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 388 L 697.0 392.4 L 697.0 383.6 z" fill="#66717a"/><path d="M 362 418 L 362.0 437.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 444 L 357.6 433.0 L 366.4 433.0 z" fill="#30363d"/><rect class="rough" x="56" y="444" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="470.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">5 · params.clone() + 最终化 —— max_tokens · update_from_generation_config ·</tspan><tspan x="362" dy="14.879999999999999">update_from_tokenizer</tspan></text><rect class="rough" x="712" y="444" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="478.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">自有、完全填默认的 params</tspan></text><path d="M 672 474 L 701.0 474.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 474 L 697.0 478.4 L 697.0 469.6 z" fill="#66717a"/><path d="M 362 504 L 362.0 523.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 530 L 357.6 519.0 L 366.4 519.0 z" fill="#30363d"/><rect class="rough" x="56" y="530" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="564.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">6 · 多模态展平 —— argsort_mm_positions + 双哈希</tspan></text><rect class="rough" x="712" y="530" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="564.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">序列有序的 mm_features</tspan></text><path d="M 672 560 L 701.0 560.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 560 L 697.0 564.4 L 697.0 555.6 z" fill="#66717a"/><path d="M 362 590 L 362.0 609.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 616 L 357.6 605.0 L 366.4 605.0 z" fill="#30363d"/><rect class="rough" x="56" y="616" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="650.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">7 · 构建 EngineCoreRequest</tspan></text><rect class="rough" x="712" y="616" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="650.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">一个统一线上结构体</tspan></text><path d="M 672 646 L 701.0 646.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 646 L 697.0 650.4 L 697.0 641.6 z" fill="#66717a"/><path d="M 362 676 L 362.0 695.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 702 L 357.6 691.0 L 366.4 691.0 z" fill="#30363d"/><rect class="rough" x="56" y="702" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="736.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">8 · assign_request_id —— 外部 id + 8 位随机字符</tspan></text><rect class="rough" x="712" y="702" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="736.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">全局唯一 request_id</tspan></text><path d="M 672 732 L 701.0 732.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 732 L 697.0 736.4 L 697.0 727.6 z" fill="#66717a"/><rect class="rough" x="56" y="778" width="612" height="30" rx="15" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="362" y="797.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">InputProcessor 不持有 tokenizer —— 由上游的 Renderer 持有</tspan></text><text x="540" y="832.75" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">process_inputs 是一条有序流程：校验 → 依已渲染 vs 弃用的 prompt 形态分叉 → 拆分 enc/dec 并校验长度 → params.clone() + 最终化 → 多模态展平 →</tspan><tspan x="540" dy="15.5">构建 EngineCoreRequest → assign_request_id，每个阶段各加一个不变量。</tspan></text>
</svg>
