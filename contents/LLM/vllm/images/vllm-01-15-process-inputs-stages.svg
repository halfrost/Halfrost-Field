<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="892" viewBox="0 0 1080 892" role="img" aria-label="process_inputs 内部：有序流程">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="892" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">process_inputs 内部：有序流程</tspan></text>
<rect class="rough" x="56" y="100" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="136.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">1 · 校验 —— _validate_params / _validate_lora / DP-rank 边界</tspan></text><rect class="rough" x="712" y="100" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="136.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">在分词前就拒绝</tspan></text><path d="M 700 131 L 701.0 131.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 131 L 697.0 135.4 L 697.0 126.6 z" fill="#66717a"/><path d="M 376 162 L 376.0 179.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 186 L 371.6 175.0 L 380.4 175.0 z" fill="#30363d"/><rect class="rough" x="56" y="186" width="640" height="62" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="376" y="204.67999999999998" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">2 · 依 isinstance(prompt, dict) and &quot;type&quot; in prompt 分叉 ——</tspan><tspan x="376" dy="17.36">已渲染的 EngineInput 原样接收 | 否则弃用路径 InputPreprocessor.preprocess()</tspan><tspan x="376" dy="17.36">→ renderer</tspan></text><rect class="rough" x="712" y="186" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="222.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">两条路都归一为 EngineInput</tspan></text><path d="M 700 217 L 701.0 217.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 217 L 697.0 221.4 L 697.0 212.6 z" fill="#66717a"/><path d="M 376 248 L 376.0 265.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 272 L 371.6 261.0 L 380.4 261.0 z" fill="#30363d"/><rect class="rough" x="56" y="272" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="308.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">3 · current_platform.validate_request</tspan></text><rect class="rough" x="712" y="272" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="308.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">平台合法的请求</tspan></text><path d="M 700 303 L 701.0 303.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 303 L 697.0 307.4 L 697.0 298.6 z" fill="#66717a"/><path d="M 376 334 L 376.0 351.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 358 L 371.6 347.0 L 380.4 347.0 z" fill="#30363d"/><rect class="rough" x="56" y="358" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="385.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">4 · 拆分 enc / dec —— 校验长度与词表（非空、≤ max_model_len、generate 时</tspan><tspan x="376" dy="17.36">≠ max_model_len）</tspan></text><rect class="rough" x="712" y="358" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="394.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">长度与词表在范围内</tspan></text><path d="M 700 389 L 701.0 389.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 389 L 697.0 393.4 L 697.0 384.6 z" fill="#66717a"/><path d="M 376 420 L 376.0 437.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 444 L 371.6 433.0 L 380.4 433.0 z" fill="#30363d"/><rect class="rough" x="56" y="444" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="471.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">5 · params.clone() + 最终化 —— max_tokens ·</tspan><tspan x="376" dy="17.36">update_from_generation_config · update_from_tokenizer</tspan></text><rect class="rough" x="712" y="444" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="480.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">自有、完全填默认的 params</tspan></text><path d="M 700 475 L 701.0 475.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 475 L 697.0 479.4 L 697.0 470.6 z" fill="#66717a"/><path d="M 376 506 L 376.0 523.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 530 L 371.6 519.0 L 380.4 519.0 z" fill="#30363d"/><rect class="rough" x="56" y="530" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="566.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">6 · 多模态展平 —— argsort_mm_positions + 双哈希</tspan></text><rect class="rough" x="712" y="530" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="566.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">序列有序的 mm_features</tspan></text><path d="M 700 561 L 701.0 561.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 561 L 697.0 565.4 L 697.0 556.6 z" fill="#66717a"/><path d="M 376 592 L 376.0 609.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 616 L 371.6 605.0 L 380.4 605.0 z" fill="#30363d"/><rect class="rough" x="56" y="616" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="652.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">7 · 构建 EngineCoreRequest</tspan></text><rect class="rough" x="712" y="616" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="652.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">一个统一线上结构体</tspan></text><path d="M 700 647 L 701.0 647.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 647 L 697.0 651.4 L 697.0 642.6 z" fill="#66717a"/><path d="M 376 678 L 376.0 695.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 702 L 371.6 691.0 L 380.4 691.0 z" fill="#30363d"/><rect class="rough" x="56" y="702" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="738.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">8 · assign_request_id —— 外部 id + 8 位随机字符</tspan></text><rect class="rough" x="712" y="702" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="738.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">全局唯一 request_id</tspan></text><path d="M 700 733 L 701.0 733.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 733 L 697.0 737.4 L 697.0 728.6 z" fill="#66717a"/><rect class="rough" x="56" y="780" width="640" height="30" rx="15" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="376" y="800.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">InputProcessor 不持有 tokenizer —— 由上游的 Renderer 持有</tspan></text><text x="540" y="846.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">process_inputs 是一条有序流程：校验 → 依已渲染 vs 弃用的 prompt 形态分叉 → 拆分 enc/dec 并校验长度 → params.clone()</tspan><tspan x="540" dy="17.36">+ 最终化 → 多模态展平 → 构建 EngineCoreRequest → assign_request_id，每个阶段各加一个不变量。</tspan></text>
</svg>
