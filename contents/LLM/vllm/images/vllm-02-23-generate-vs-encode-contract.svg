<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="744" viewBox="0 0 1080 744" role="img" aria-label="generate vs encode：EngineClient 上的契约矩阵">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="744" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">generate vs encode：EngineClient 上的契约矩阵</tspan></text>
<text x="540" y="109.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="540" dy="0">在 EngineClient 上抽象 · 由 AsyncLLM 实现</tspan></text><rect class="rough" x="44" y="118" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="145.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="162" dy="0">契约</tspan></text><rect class="rough" x="294" y="118" width="360" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="474" y="136.35999999999999" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="474" dy="0">generate(SamplingParams) →</tspan><tspan x="474" dy="17.36">RequestOutput</tspan></text><rect class="rough" x="668" y="118" width="368" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="852" y="136.35999999999999" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="852" dy="0">encode(PoolingParams) →</tspan><tspan x="852" dy="17.36">PoolingRequestOutput</tspan></text><rect class="rough" x="44" y="176" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">参数对象</tspan></text><rect class="rough" x="294" y="176" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">SamplingParams (msgspec.Struct)</tspan></text><rect class="rough" x="668" y="176" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">PoolingParams (msgspec.Struct)</tspan></text><rect class="rough" x="44" y="234" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="261.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">输出</tspan></text><rect class="rough" x="294" y="234" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="261.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">RequestOutput</tspan></text><rect class="rough" x="668" y="234" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="261.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">PoolingRequestOutput</tspan></text><rect class="rough" x="44" y="292" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="319.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">output_kind</tspan></text><rect class="rough" x="294" y="292" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="319.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">DELTA if stream else FINAL_ONLY</tspan></text><rect class="rough" x="668" y="292" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="310.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">__post_init__ 强制 FINAL_ONLY（DELTA</tspan><tspan x="852" dy="17.36">则抛错）</tspan></text><rect class="rough" x="44" y="350" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="377.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">decode loop</tspan></text><rect class="rough" x="294" y="350" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="377.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">自回归 · 有</tspan></text><rect class="rough" x="668" y="350" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="377.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">无（generator 仅为形状约定）</tspan></text><rect class="rough" x="44" y="408" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="435.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">流式</tspan></text><rect class="rough" x="294" y="408" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="435.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">增量 delta</tspan></text><rect class="rough" x="668" y="408" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="435.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">单个最终向量</tspan></text><rect class="rough" x="44" y="466" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="493.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">额外参数</tspan></text><rect class="rough" x="294" y="466" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="484.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">data_parallel_rank ·</tspan><tspan x="474" dy="17.36">reasoning_parser_kwargs</tspan></text><rect class="rough" x="668" y="466" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="493.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">都没有</tspan></text><rect class="rough" x="44" y="524" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="551.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">汇集</tspan></text><rect class="rough" x="294" y="524" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="551.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">到达即流式输出</tspan></text><rect class="rough" x="668" y="524" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="551.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">保序 · 全有或全无 (final_res_batch[i])</tspan></text><rect class="rough" x="44" y="582" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="609.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">头部选择</tspan></text><rect class="rough" x="294" y="582" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="609.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">n / logprobs / stop</tspan></text><rect class="rough" x="668" y="582" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="600.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">PoolingParams.task（embed / classify /</tspan><tspan x="852" dy="17.36">score）</tspan></text><rect class="rough" x="44" y="642" width="992" height="42" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="540" y="668.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">pooling serving 类无法触达 generate —— 它们只调 encode，仅此而已</tspan></text><text x="540" y="699.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">sampling 与 pooling 分叉的契约矩阵：generate 带 decode loop 流式输出 token delta，而 encode 没有 decode loop，每个</tspan><tspan x="540" dy="17.36">prompt 恰好 yield 一次，并在 PoolingParams.__post_init__ 中强制 FINAL_ONLY —— 因此 pooling request</tspan><tspan x="540" dy="17.36">永远无法获得生成式行为。</tspan></text>
</svg>
