<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="756" viewBox="0 0 1080 756" role="img" aria-label="serve 拓扑分支：按优先级五路分流">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="756" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">serve 拓扑分支：按优先级五路分流</tspan></text>
<rect class="rough" x="90" y="104" width="360" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="270" y="130.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="270" dy="0">ServeSubcommand.cmd(args)</tspan></text><path d="M 270 146 L 270.0 163.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 270 170 L 265.6 159.0 L 274.4 159.0 z" fill="#30363d"/><rect class="rough" x="56" y="170" width="652" height="56" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="382" y="194.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="382" dy="0">(a) model_tag ≠ None → args.model = model_tag（位置参数优先）</tspan><tspan x="382" dy="17.36">(b) 依据 DP 负载均衡模式解析 api_server_count（None → int）</tspan></text><path d="M 270 226 L 270.0 243.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 270 250 L 265.6 239.0 L 274.4 239.0 z" fill="#30363d"/><rect class="rough" x="90" y="250" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="270" y="277.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="270" dy="0">getattr(args, &quot;grpc&quot;)</tspan></text><rect class="rough" x="600" y="242" width="436" height="66" rx="12" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="818" y="268.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="818" dy="0">uvloop.run(serve_grpc(args))</tspan></text><text x="818" y="294.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="818" dy="0">gRPC · 无 HTTP</tspan></text><path d="M 450 272 L 593.0 272.0" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 600 272 L 589.0 276.4 L 589.0 267.6 z" fill="#66717a"/><text x="520" y="265.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="520" dy="0">yes</tspan></text><path d="M 270 294 L 270.0 323.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 270 330 L 265.6 319.0 L 274.4 319.0 z" fill="#30363d"/><rect class="rough" x="90" y="330" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="270" y="357.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="270" dy="0">is_multi_port（DP LB）</tspan></text><rect class="rough" x="600" y="322" width="436" height="66" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="818" y="348.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="818" dy="0">run_dp_supervisor</tspan></text><text x="818" y="374.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="818" dy="0">supervisor spawn 服务器</tspan></text><path d="M 450 352 L 593.0 352.0" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 600 352 L 589.0 356.4 L 589.0 347.6 z" fill="#66717a"/><text x="520" y="345.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="520" dy="0">yes</tspan></text><path d="M 270 374 L 270.0 403.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 270 410 L 265.6 399.0 L 274.4 399.0 z" fill="#30363d"/><rect class="rough" x="90" y="410" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="270" y="437.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="270" dy="0">api_server_count &lt; 1</tspan></text><rect class="rough" x="600" y="402" width="436" height="66" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="818" y="428.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="818" dy="0">run_headless</tspan></text><text x="818" y="454.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="818" dy="0">仅引擎 · 无 uvicorn</tspan></text><path d="M 450 432 L 593.0 432.0" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 600 432 L 589.0 436.4 L 589.0 427.6 z" fill="#66717a"/><text x="520" y="425.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="520" dy="0">yes</tspan></text><path d="M 270 454 L 270.0 483.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 270 490 L 265.6 479.0 L 274.4 479.0 z" fill="#30363d"/><rect class="rough" x="90" y="490" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="270" y="517.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="270" dy="0">&gt; 1  或  VLLM_RUST_FRONTEND_PATH</tspan></text><rect class="rough" x="600" y="482" width="436" height="66" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="818" y="508.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="818" dy="0">run_multi_api_server</tspan></text><text x="818" y="525.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="818" dy="0">父进程绑 1 个 socket（reuse_port） · spawn N</tspan><tspan x="818" dy="17.36">个继承它的子进程</tspan></text><path d="M 450 512 L 593.0 512.0" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 600 512 L 589.0 516.4 L 589.0 507.6 z" fill="#66717a"/><text x="520" y="505.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="520" dy="0">yes</tspan></text><path d="M 270 534 L 270.0 563.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 270 570 L 265.6 559.0 L 274.4 559.0 z" fill="#30363d"/><rect class="rough" x="90" y="570" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="270" y="597.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="270" dy="0">else</tspan></text><rect class="rough" x="600" y="562" width="436" height="66" rx="12" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="818" y="579.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="818" dy="0">args.api_server_count=None →</tspan><tspan x="818" dy="17.36">uvloop.run(run_server(args))</tspan></text><text x="818" y="614.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="818" dy="0">单进程 · 进程内</tspan></text><path d="M 450 592 L 593.0 592.0" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 600 592 L 589.0 596.4 L 589.0 587.6 z" fill="#66717a"/><text x="520" y="585.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="520" dy="0">yes</tspan></text><rect class="rough" x="44" y="644" width="992" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="671.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">优先级：gRPC &gt; multi-port &gt; headless &gt; multi-server &gt; single · 仅最后两个启动 uvicorn</tspan></text><text x="540" y="718.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">ServeSubcommand.cmd 先把 model_tag → model 归一化，再依据 DP 负载均衡模式解析 api_server_count，然后按优先级五路分支</tspan><tspan x="540" dy="17.36">—— 仅最后两个启动 uvicorn，且 run_multi_api_server 在父进程绑定一个 socket 后再 spawn 继承该 socket 的子服务器。</tspan></text>
</svg>
