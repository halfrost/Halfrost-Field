<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="616" viewBox="0 0 1080 616" role="img" aria-label="预填充 vs 解码：为什么第一个 token 特殊">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="616" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">预填充 vs 解码：为什么第一个 token 特殊</tspan></text>
<path d="M 96 214 L 96 206 L 448 206 L 448 214" fill="none" stroke="#27323a" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/><text x="272" y="194.32" text-anchor="middle" font-size="12" font-weight="700" fill="#27323a"><tspan x="272" dy="0">TTFT · 首 token 时延</tspan></text><rect class="rough" x="118" y="224" width="146" height="58" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="191" y="249.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="191" dy="0">预填充 · 分块 1（无</tspan><tspan x="191" dy="14.879999999999999">token）</tspan></text><rect class="rough" x="278" y="224" width="166" height="58" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="361" y="249.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="361" dy="0">预填充 · 分块 2 → 第</tspan><tspan x="361" dy="14.879999999999999">1 个 token</tspan></text><rect class="rough" x="470" y="224" width="100" height="58" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="520" y="257.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="520" dy="0">解码 1</tspan></text><rect class="rough" x="584" y="224" width="100" height="58" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="634" y="257.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="634" dy="0">解码 2</tspan></text><rect class="rough" x="698" y="224" width="100" height="58" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="748" y="257.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="748" dy="0">解码 3</tspan></text><rect class="rough" x="812" y="224" width="140" height="58" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="882" y="257.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="882" dy="0">解码 N</tspan></text><path d="M 80 312 L 999.0 312.0" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 1006 312 L 995.0 316.4 L 995.0 307.6 z" fill="#30363d"/><text x="1000" y="300.32" text-anchor="end" font-size="12" font-weight="500" fill="#66717a"><tspan x="1000" dy="0">时间  ·  引擎步</tspan></text><path d="M 96 216 L 96 404" fill="none" stroke="#66717a" stroke-width="1.4" stroke-dasharray="7 7"/><text x="96" y="224.32" text-anchor="middle" font-size="12" font-weight="700" fill="#66717a"><tspan x="96" dy="0">准入</tspan></text><polygon class="rough" points="448,299 461,312 448,325 435,312" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="448" y="316.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="448" dy="0">1</tspan></text><text x="110" y="376.32" text-anchor="start" font-size="12" font-weight="700" fill="#66717a"><tspan x="110" dy="0">每步产出 →</tspan></text><rect class="rough" x="288" y="346" width="160" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="368" y="364.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="368" dy="0">RequestOutput ·</tspan><tspan x="368" dy="14.879999999999999">第一个 token</tspan></text><rect class="rough" x="470" y="346" width="100" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="520" y="372.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="520" dy="0">delta</tspan></text><rect class="rough" x="584" y="346" width="100" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="634" y="372.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="634" dy="0">delta</tspan></text><rect class="rough" x="698" y="346" width="100" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="748" y="372.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="748" dy="0">delta</tspan></text><rect class="rough" x="812" y="346" width="140" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="882" y="372.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="882" dy="0">delta</tspan></text><path d="M 360 282 L 367.1 339.1" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 368 346 L 362.3 335.6 L 371.0 334.5 z" fill="#66717a"/><path d="M 520 282 L 520.0 339.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 520 346 L 515.6 335.0 L 524.4 335.0 z" fill="#66717a"/><path d="M 634 282 L 634.0 339.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 634 346 L 629.6 335.0 L 638.4 335.0 z" fill="#66717a"/><path d="M 748 282 L 748.0 339.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 748 346 L 743.6 335.0 L 752.4 335.0 z" fill="#66717a"/><path d="M 882 282 L 882.0 339.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 882 346 L 877.6 335.0 L 886.4 335.0 z" fill="#66717a"/><rect class="rough" x="60" y="430" width="470" height="76" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="295" y="464.88" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="295" dy="0">预填充 —— 对整个 prompt 做一次前向 · 计算受限 · 有的步不产出</tspan><tspan x="295" dy="14.879999999999999">token · 只有末个预填充位置产生 logits → 第一个 token</tspan></text><rect class="rough" x="550" y="430" width="470" height="76" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="785" y="464.88" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="785" dy="0">解码 —— 只对最后一个 token 做前向 · 显存带宽受限 · 每步一个新</tspan><tspan x="785" dy="14.879999999999999">token、一个流式 delta</tspan></text><text x="540" y="566.88" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">一个请求的时间线：（可能分块的）预填充跑完整个 prompt，只有其末位位置产出第一个 token（TTFT）；此后每个解码步追加恰好一个 token 并产出一个</tspan><tspan x="540" dy="14.879999999999999">RequestOutput delta —— 预填充计算受限，解码显存带宽受限。</tspan></text>
</svg>
