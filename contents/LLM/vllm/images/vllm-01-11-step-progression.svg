ill="#27323a"><tspan x="762" dy="0">+1</tspan></text><rect class="rough" x="859" y="223" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="942" y="253.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="942" dy="0">+1</tspan></text><rect class="rough" x="56" y="289" width="68" height="52" rx="8" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="90" y="320.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="90" dy="0">R2</tspan></text><rect class="rough" x="139" y="289" width="166" height="52" rx="8" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="222" y="319.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="222" dy="0">decode +1</tspan></text><rect class="rough" x="319" y="289" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="402" y="319.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="402" dy="0">+1</tspan></text><rect class="rough" x="499" y="289" width="166" height="52" rx="8" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="582" y="319.86" text-anchor="middle" font-size="13.5" font-weight="800" fill="#27323a"><tspan x="582" dy="0">+1 ✓</tspan></text><rect class="rough" x="679" y="289" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="762" y="319.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#66717a"><tspan x="762" dy="0">—</tspan></text><rect class="rough" x="859" y="289" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="942" y="319.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#66717a"><tspan x="942" dy="0">—</tspan></text><rect class="rough" x="56" y="355" width="68" height="52" rx="8" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="90" y="386.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="90" dy="0">R3</tspan></text><rect class="rough" x="139" y="355" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="222" y="385.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#66717a"><tspan x="222" dy="0">—</tspan></text><rect class="rough" x="319" y="355" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="402" y="385.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#66717a"><tspan x="402" dy="0">—</tspan></text><rect class="rough" x="499" y="355" width="166" height="52" rx="8" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="582" y="385.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="582" dy="0">prefill +6</tspan></text><rect class="rough" x="679" y="355" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="762" y="385.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="762" dy="0">+1</tspan></text><rect class="rough" x="859" y="355" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="942" y="385.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="942" dy="0">+1</tspan></text><rect x="132" y="424" width="20" height="20" rx="5" fill="#f6c77c" stroke="#30363d" stroke-width="1.4"/><text x="160" y="438.5" text-anchor="start" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="160" dy="0">prefill / 分块</tspan></text><rect x="452" y="424" width="20" height="20" rx="5" fill="#e5f4e9" stroke="#30363d" stroke-width="1.4"/><text x="480" y="438.5" text-anchor="start" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="480" dy="0">+1 解码</tspan></text><rect x="760" y="424" width="20" height="20" rx="5" fill="#ffe3de" stroke="#30363d" stroke-width="1.4"/><text x="788" y="438.5" text-anchor="start" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="788" dy="0">完成（释放 KV）</tspan></text><text x="56" y="470.5" text-anchor="start" font-size="12.5" font-weight="500" fill="#27323a"><tspan x="56" dy="0">schedule() 每步授予 {request_id: num_tokens}</tspan></text><text x="56" y="492.5" text-anchor="start" font-size="12.5" font-weight="500" fill="#27323a"><tspan x="56" dy="0">batch 成员每步变化 —— R3 在 k+2 加入，R2 在 k+2 离开</tspan></text><text x="56" y="514.5" text-anchor="start" font-size="12.5" font-weight="700" fill="#c07a1a"><tspan x="56" dy="0">R2 先完成（k+2）再到 R0（k+3）—— 完成顺序 ≠ 提交顺序</tspan></text><rect class="rough" x="56" y="526" width="968" height="36" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="548.86" text-anchor="middle" font-size="13.5" font-weight="700" fill="#27323a"><tspan x="540" dy="0">input processing 只在最前面跑一次   ·   schedule → execute → commit 每步各跑一次</tspan></text><text x="540" y="600.75" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">每一次 EngineCore.step() 都把每个 in-flight 请求推进若干 token；请求在各 step 之间独立进入与完成（R2 先于 R0），完成的请求立即释放其</tspan><tspan x="540" dy="15.5">KV block，只有 input processing 在最前面跑一次，而 schedule/execute/commit 每步重复。</tspan></text>
</svg>
