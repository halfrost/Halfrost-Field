an x="762" dy="0">+1</tspan></text><rect class="rough" x="859" y="223" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="942" y="254.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="942" dy="0">+1</tspan></text><rect class="rough" x="56" y="289" width="68" height="52" rx="8" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="90" y="320.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="90" dy="0">R2</tspan></text><rect class="rough" x="139" y="289" width="166" height="52" rx="8" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="222" y="320.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="222" dy="0">decode +1</tspan></text><rect class="rough" x="319" y="289" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="402" y="320.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="402" dy="0">+1</tspan></text><rect class="rough" x="499" y="289" width="166" height="52" rx="8" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="582" y="320.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="582" dy="0">+1 ✓</tspan></text><rect class="rough" x="679" y="289" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="762" y="320.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="762" dy="0">—</tspan></text><rect class="rough" x="859" y="289" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="942" y="320.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="942" dy="0">—</tspan></text><rect class="rough" x="56" y="355" width="68" height="52" rx="8" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="90" y="386.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="90" dy="0">R3</tspan></text><rect class="rough" x="139" y="355" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="222" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="222" dy="0">—</tspan></text><rect class="rough" x="319" y="355" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="402" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="402" dy="0">—</tspan></text><rect class="rough" x="499" y="355" width="166" height="52" rx="8" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="582" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="582" dy="0">prefill +6</tspan></text><rect class="rough" x="679" y="355" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="762" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="762" dy="0">+1</tspan></text><rect class="rough" x="859" y="355" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="942" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="942" dy="0">+1</tspan></text><rect x="132" y="424" width="20" height="20" rx="5" fill="#f6c77c" stroke="#30363d" stroke-width="1.4"/><text x="160" y="439.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="160" dy="0">prefill / 分块</tspan></text><rect x="452" y="424" width="20" height="20" rx="5" fill="#e5f4e9" stroke="#30363d" stroke-width="1.4"/><text x="480" y="439.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="480" dy="0">+1 解码</tspan></text><rect x="760" y="424" width="20" height="20" rx="5" fill="#ffe3de" stroke="#30363d" stroke-width="1.4"/><text x="788" y="439.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="788" dy="0">完成 → 安全时释放，否则延迟</tspan></text><text x="56" y="471.04" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="56" dy="0">schedule() 每步授予 {request_id: num_tokens}</tspan></text><text x="56" y="493.04" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="56" dy="0">batch 成员每步变化 —— R3 在 k+2 加入，R2 在 k+2 离开</tspan></text><text x="56" y="515.04" text-anchor="start" font-size="14" font-weight="700" fill="#c07a1a"><tspan x="56" dy="0">R2 先完成（k+2）再到 R0（k+3）—— 完成顺序 ≠ 提交顺序</tspan></text><rect class="rough" x="56" y="526" width="968" height="36" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="549.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">input processing 只在最前面跑一次   ·   schedule → execute → commit 每步各跑一次</tspan></text><text x="540" y="600.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">每一次 EngineCore.step() 都推进本轮获得 token budget 的请求；请求在各 step 之间独立进入与完成（R2 先于</tspan><tspan x="540" dy="17.36">R0），完成请求的 KV block 会立即释放或延迟释放，只有 input processing 在最前面跑一次，而 schedule/execute/commit 每步重复。</tspan></text>
</svg>
