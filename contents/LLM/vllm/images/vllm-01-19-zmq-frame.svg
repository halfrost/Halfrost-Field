<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="638" viewBox="0 0 1080 638" role="img" aria-label="SyncMPClient 的线上帧">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="638" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">SyncMPClient 的线上帧</tspan></text>
<text x="56" y="113.04" text-anchor="start" font-size="14" font-weight="800" fill="#66717a"><tspan x="56" dy="0">前置条件</tspan></text><rect class="rough" x="56" y="122" width="360" height="44" rx="22" fill="#ffe3de" stroke="#30363d" stroke-width="1.8"/><text x="236" y="149.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="236" dy="0">ensure_alive()  ·  抛出 EngineDeadError</tspan></text><rect class="rough" x="432" y="122" width="300" height="44" rx="22" fill="#ffe3de" stroke="#30363d" stroke-width="1.8"/><text x="582" y="149.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="582" dy="0">free_pending_messages()</tspan></text><text x="540" y="189.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">有序多部分消息  ·  zmq.ROUTER（客户端）→ zmq.DEALER（引擎）</tspan></text><rect class="rough" x="56" y="202" width="210" height="92" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="161" y="237.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="161" dy="0">engine_identity</tspan></text><text x="161" y="271.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="161" dy="0">寻址某个特定的 engine</tspan></text><rect class="rough" x="280" y="202" width="150" height="92" rx="12" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="355" y="228.35999999999999" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="355" dy="0">类型标签 · 1</tspan><tspan x="355" dy="17.36">字节</tspan></text><text x="355" y="262.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="355" dy="0">如 ADD =</tspan><tspan x="355" dy="17.36">b'\x00'</tspan></text><rect class="rough" x="444" y="202" width="300" height="92" rx="12" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="594" y="237.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="594" dy="0">msgpack payload</tspan></text><text x="594" y="271.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="594" dy="0">encoder.encode(request)</tspan></text><rect class="rough" x="758" y="202" width="244" height="92" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="880" y="237.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="880" dy="0">带外 tensor buffer</tspan></text><text x="880" y="271.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="880" dy="0">可选</tspan></text><rect class="rough" x="430" y="330" width="220" height="40" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="540" y="355.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="540" dy="0">len(msg) &lt;= 3 ?</tspan></text><rect class="rough" x="56" y="408" width="468" height="92" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="290" y="443.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="290" dy="0">send_multipart(copy=False)  ·  返回</tspan></text><text x="290" y="477.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="290" dy="0">零拷贝 · 无 tensor buffer</tspan></text><rect class="rough" x="556" y="408" width="468" height="110" rx="12" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="790" y="439.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="790" dy="0">send_multipart(copy=False, track=True)</tspan><tspan x="790" dy="17.36">+ add_pending_message(tracker, request)</tspan></text><text x="790" y="481.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="790" dy="0">经 zmq.MessageTracker 保留 buffer，直到 ZMQ</tspan><tspan x="790" dy="17.36">发送完底层内存</tspan></text><path d="M 470 370 L 296.8 406.6" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 290 408 L 299.9 401.4 L 301.7 410.0 z" fill="#66717a"/><path d="M 610 370 L 783.2 406.6" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 790 408 L 778.3 410.0 L 780.1 401.4 z" fill="#66717a"/><text x="290" y="397.04" text-anchor="middle" font-size="14" font-weight="700" fill="#3a7d44"><tspan x="290" dy="0">yes</tspan></text><text x="790" y="397.04" text-anchor="middle" font-size="14" font-weight="700" fill="#c07a1a"><tspan x="790" dy="0">no</tspan></text><text x="540" y="553.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">add_request 是 fire-and-forget；输出在另一 socket 上异步返回；深层拓扑 → 文章 03</tspan></text><text x="540" y="583.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">有序多部分 (engine_identity, 单字节类型标签, *msgpack payload) 在 ROUTER→DEALER 上发送；len(msg) &lt;= 3 是普通零拷贝</tspan><tspan x="540" dy="17.36">send_multipart，否则带外 tensor buffer 会触发 track=True + add_pending_message 直到 ZMQ 发送完成 —— 整个过程前置</tspan><tspan x="540" dy="17.36">ensure_alive()。</tspan></text>
</svg>
