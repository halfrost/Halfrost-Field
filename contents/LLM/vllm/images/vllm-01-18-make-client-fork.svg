<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="678" viewBox="0 0 1080 678" role="img" aria-label="make_client：(multiprocess, asyncio) 的真值表">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="678" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">make_client：(multiprocess, asyncio) 的真值表</tspan></text>
<rect class="rough" x="284" y="116" width="364" height="48" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="466" y="145.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="466" dy="0">multiprocess_mode = False</tspan></text><rect class="rough" x="662" y="116" width="364" height="48" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="844" y="145.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="844" dy="0">multiprocess_mode = True</tspan></text><rect class="rough" x="56" y="180" width="210" height="160" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="161" y="265.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="161" dy="0">asyncio_mode = False</tspan></text><rect class="rough" x="56" y="356" width="210" height="160" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="161" y="441.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="161" dy="0">asyncio_mode = True</tspan></text><rect class="rough" x="284" y="180" width="364" height="160" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="466" y="243.2" text-anchor="middle" font-size="20" font-weight="700" fill="#27323a"><tspan x="466" dy="0">InprocClient</tspan></text><text x="466" y="282.88" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="466" dy="0">进程内 EngineCore · V0 风格 · add_request + step</tspan><tspan x="466" dy="14.879999999999999">内联</tspan></text><rect class="rough" x="662" y="180" width="364" height="160" rx="12" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="844" y="243.2" text-anchor="middle" font-size="20" font-weight="700" fill="#27323a"><tspan x="844" dy="0">SyncMPClient</tspan></text><text x="844" y="290.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="844" dy="0">ZMQ + 后台进程 · 离线 LLM 默认</tspan></text><rect class="rough" x="284" y="356" width="364" height="160" rx="12" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="466" y="420.12" text-anchor="middle" font-size="17" font-weight="700" fill="#27323a"><tspan x="466" dy="0">raise NotImplementedError</tspan></text><text x="466" y="464.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="466" dy="0">不支持无多进程的 asyncio</tspan></text><rect class="rough" x="662" y="356" width="364" height="160" rx="12" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="844" y="418.48" text-anchor="middle" font-size="18" font-weight="700" fill="#27323a"><tspan x="844" dy="0">make_async_mp_client</tspan></text><text x="844" y="466.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="844" dy="0">→ AsyncMPClient（及 DP 变体）· 在线 AsyncLLM</tspan></text><text x="540" y="540.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#c07a1a"><tspan x="540" dy="0">离线 LLM 落到 (mp=True, async=False)，因为 VLLM_ENABLE_V1_MULTIPROCESSING 默认 True</tspan></text><rect class="rough" x="56" y="556" width="974" height="40" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="543" y="580.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="543" dy="0">三者共享 EngineCoreClient ABC —— 基类方法体抛出 NotImplementedError；sync / async 命名镜像</tspan></text><text x="540" y="625" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">(F,F)→InprocClient，(T,F)→SyncMPClient（离线默认，因为 VLLM_ENABLE_V1_MULTIPROCESSING 为</tspan><tspan x="540" dy="15.5">True），(T,T)→make_async_mp_client（AsyncMPClient + DP 变体），而 (F,T) 被拒绝 —— 三者共享 EngineCoreClient</tspan><tspan x="540" dy="15.5">ABC，其基类方法体抛出 NotImplementedError。</tspan></text>
</svg>
