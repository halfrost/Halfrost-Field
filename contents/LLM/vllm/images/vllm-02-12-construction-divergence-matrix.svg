<rect class="rough" x="44" y="104" width="992" height="66" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="60" y="135.4" text-anchor="start" font-size="15" font-weight="800" fill="#27323a"><tspan x="60" dy="0">SHARED · engine_args.create_engine_config(usage_context) → VllmConfig</tspan></text><text x="60" y="157.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="60" dy="0">TP size · prefix caching · chunked prefill · attention backend · compilation mode —— 两扇门完全一致</tspan></text><path d="M 540 170 L 540.0 191.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 198 L 535.6 187.0 L 544.4 187.0 z" fill="#30363d"/><rect class="rough" x="44" y="198" width="200" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="144" y="224.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">构造旋钮</tspan></text><rect class="rough" x="258" y="198" width="382" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="449" y="224.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="449" dy="0">离线 LLM · llm.py</tspan></text><rect class="rough" x="654" y="198" width="382" height="42" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="845" y="224.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="845" dy="0">在线 server · api_server.py</tspan></text><rect class="rough" x="44" y="256" width="200" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="144" y="283.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">engine wrapper</tspan></text><rect class="rough" x="258" y="256" width="382" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="449" y="283.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="449" dy="0">LLMEngine.from_engine_args</tspan></text><rect class="rough" x="654" y="256" width="382" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="845" y="283.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="845" dy="0">AsyncLLM.from_vllm_config</tspan></text><rect class="rough" x="44" y="314" width="200" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="144" y="341.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">UsageContext</tspan></text><rect class="rough" x="258" y="314" width="382" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="449" y="341.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="449" dy="0">LLM_CLASS (llm.py:350)</tspan></text><rect class="rough" x="654" y="314" width="382" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="845" y="341.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="845" dy="0">OPENAI_API_SERVER (api_server.py:120)</tspan></text><rect class="rough" x="44" y="372" width="200" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="144" y="399.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">disable_log_stats</tspan></text><rect class="rough" x="258" y="372" width="382" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="449" y="399.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="449" dy="0">强制 True (llm.py:235-236)</tspan></text><rect class="rough" x="654" y="372" width="382" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="845" y="399.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="845" dy="0">False 透传 (arg_utils.py:537)</tspan></text><rect class="rough" x="44" y="430" width="200" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="144" y="457.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">asyncio_mode</tspan></text><rect class="rough" x="258" y="430" width="382" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="449" y="457.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="449" dy="0">False</tspan></text><rect class="rough" x="654" y="430" width="382" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="845" y="457.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="845" dy="0">True</tspan></text><rect class="rough" x="44" y="488" width="200" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="144" y="506.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">multiprocessing（多进</tspan><tspan x="144" dy="17.36">程）</tspan></text><rect class="rough" x="258" y="488" width="382" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="449" y="506.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="449" dy="0">默认多进程 · VLLM_ENABLE_V1_MULTIPROCESSING</tspan><tspan x="449" dy="17.36">（=0 时退回同进程）</tspan></text><rect class="rough" x="654" y="488" width="382" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="845" y="515.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="845" dy="0">始终拆分（见文章 03）</tspan></text><rect class="rough" x="44" y="546" width="200" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="144" y="573.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">drive loop（驱动循环）</tspan></text><rect class="rough" x="258" y="546" width="382" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="449" y="564.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="449" dy="0">阻塞 while has_unfinished_requests():</tspan><tspan x="449" dy="17.36">step()</tspan></text><rect class="rough" x="654" y="546" width="382" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="845" y="573.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="845" dy="0">后台输出处理器 + 每请求队列</tspan></text><rect class="rough" x="160" y="618" width="760" height="46" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="646.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">两者汇合 → input_processor.process_inputs → EngineCoreRequest</tspan></text><path d="M 448 590 L 493.8 614.7" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 500 618 L 488.2 616.7 L 492.4 608.9 z" fill="#30363d"/><path d="M 844 590 L 607.0 617.2" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 600 618 L 610.4 612.4 L 611.4 621.1 z" fill="#30363d"/><text x="540" y="679.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">离线 LLM 与在线 server 共享完全相同的 create_engine_config → VllmConfig</tspan><tspan x="540" dy="17.36">lowering，仅在六个有意的构造时刻旋钮上分歧；在最后一行之下，两条路径又汇回同一个 input_processor.process_inputs →</tspan><tspan x="540" dy="17.36">EngineCoreRequest 边界。</tspan></text>
</svg>
