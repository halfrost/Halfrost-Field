<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="654" viewBox="0 0 1080 654" role="img" aria-label="SSE 流式、中间件、鉴权与健康检查">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="654" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">SSE 流式、中间件、鉴权与健康检查</tspan></text>
<text x="540" y="113.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="540" dy="0">流式管线 · 每请求的内存缓冲 —— 并非客户端能看到的 socket</tspan></text><rect class="rough" x="44" y="138" width="166" height="96" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="127" y="182.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="127" dy="0">EngineCore</tspan><tspan x="127" dy="17.36">输出（token id）</tspan></text><path d="M 210 186 L 237.0 186.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 244 186 L 233.0 190.4 L 233.0 181.6 z" fill="#30363d"/><rect class="rough" x="244" y="138" width="166" height="96" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="327" y="173.67999999999998" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="327" dy="0">IPC socket</tspan><tspan x="327" dy="17.36">解码前</tspan><tspan x="327" dy="17.36">validate_alive</tspan></text><path d="M 410 186 L 437.0 186.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 444 186 L 433.0 190.4 L 433.0 181.6 z" fill="#30363d"/><rect class="rough" x="444" y="138" width="166" height="96" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="527" y="173.67999999999998" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="527" dy="0">后台输出处理器</tspan><tspan x="527" dy="17.36">抽干全部 · 分块 ·</tspan><tspan x="527" dy="17.36">sleep(0)</tspan></text><path d="M 610 186 L 637.0 186.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 644 186 L 633.0 190.4 L 633.0 181.6 z" fill="#30363d"/><rect class="rough" x="644" y="138" width="166" height="96" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="727" y="173.67999999999998" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="727" dy="0">RequestOutputColl</tspan><tspan x="727" dy="17.36">ector</tspan><tspan x="727" dy="17.36">单槽 · DELTA 合并</tspan></text><path d="M 810 186 L 837.0 186.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 844 186 L 833.0 190.4 L 833.0 181.6 z" fill="#30363d"/><rect class="rough" x="844" y="138" width="186" height="96" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="937" y="173.67999999999998" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="937" dy="0">AsyncLLM.generate</tspan><tspan x="937" dy="17.36">get_nowait / await</tspan><tspan x="937" dy="17.36">→ yield</tspan></text><rect class="rough" x="844" y="248" width="186" height="26" rx="4" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="937" y="266.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="937" dy="0">data: {delta}</tspan></text><rect class="rough" x="844" y="288" width="186" height="26" rx="4" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="937" y="306.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="937" dy="0">data: {delta}</tspan></text><rect class="rough" x="844" y="328" width="186" height="26" rx="4" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="937" y="346.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="937" dy="0">data: [DONE]</tspan></text><path d="M 937 234 L 937.0 241.0" fill="none" stroke="#66717a" stroke-width="1.5"/><path d="M 937 248 L 932.6 237.0 L 941.4 237.0 z" fill="#66717a"/><text x="937" y="373.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="937" dy="0">SSE 帧 · text/event-stream</tspan></text><rect class="rough" x="44" y="382" width="232" height="178" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="60" y="411.22" text-anchor="start" font-size="14.5" font-weight="800" fill="#27323a"><tspan x="60" dy="0">中间件 · 顺序即优先级</tspan></text><text x="60" y="460.32" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="60" dy="0">CORS（最内）</tspan><tspan x="60" dy="17.36">→ 鉴权 Auth</tspan><tspan x="60" dy="17.36">→ request-id</tspan><tspan x="60" dy="17.36">→ scaling</tspan><tspan x="60" dy="17.36">→ 用户（最外，最后添加）</tspan></text><rect class="rough" x="292" y="382" width="232" height="178" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="308" y="411.22" text-anchor="start" font-size="14.5" font-weight="800" fill="#27323a"><tspan x="308" dy="0">鉴权 Auth</tspan></text><text x="308" y="469" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="308" dy="0">只守卫 /v1 /v2</tspan><tspan x="308" dy="17.36">/inference</tspan><tspan x="308" dy="17.36">SHA-256 · 恒定时间</tspan><tspan x="308" dy="17.36">OPTIONS + /health 放行</tspan></text><rect class="rough" x="540" y="382" width="232" height="178" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="556" y="411.22" text-anchor="start" font-size="14.5" font-weight="800" fill="#27323a"><tspan x="556" dy="0">异常映射</tspan></text><text x="556" y="460.32" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="556" dy="0">已知 4xx 仍是 4xx</tspan><tspan x="556" dy="17.36">ExceptionMiddleware</tspan><tspan x="556" dy="17.36">内置于</tspan><tspan x="556" dy="17.36">Prometheus 之内（不计</tspan><tspan x="556" dy="17.36">5xx）</tspan></text><rect class="rough" x="788" y="382" width="232" height="178" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="804" y="411.22" text-anchor="start" font-size="14.5" font-weight="800" fill="#27323a"><tspan x="804" dy="0">健康检查 + 看门狗</tspan></text><text x="804" y="477.68" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="804" dy="0">/health → 200 | 503</tspan><tspan x="804" dy="17.36">看门狗 ≤ 5 秒</tspan><tspan x="804" dy="17.36">引擎死亡即快速停机</tspan></text><text x="540" y="602.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">流式是一条内存管线：单个后台处理器经 IPC 抽干 EngineCore，把输出扇入每请求的合并收集器，再由 AsyncLLM.generate 消费成以</tspan><tspan x="540" dy="17.36">[DONE] 结尾的 SSE 帧；周围环绕着有序中间件、按前缀守卫的鉴权、保持 4xx 的异常映射，以及在引擎死亡时快速停机的看门狗。</tspan></text>
</svg>
