<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" role="img" aria-label="服务器生命周期：先绑再建，shutdown 恰好一次">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="660" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">服务器生命周期：先绑再建，shutdown 恰好一次</tspan></text>
<rect class="rough" x="44" y="104" width="180" height="30" rx="15" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="134" y="124.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="134" dy="0">run_server</tspan></text><rect class="rough" x="240" y="104" width="180" height="30" rx="15" fill="#fff0d8" stroke="#30363d" stroke-width="1.8"/><text x="330" y="124.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="330" dy="0">socket</tspan></text><rect class="rough" x="436" y="104" width="180" height="30" rx="15" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="526" y="124.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="526" dy="0">engine</tspan></text><rect class="rough" x="632" y="104" width="180" height="30" rx="15" fill="#b9dfc3" stroke="#30363d" stroke-width="1.8"/><text x="722" y="124.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="722" dy="0">uvicorn</tspan></text><path d="M 96 150 L 96 578" fill="none" stroke="#66717a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><path d="M 96 574 L 96.0 579.0" fill="none" stroke="#66717a" stroke-width="2"/><path d="M 96 586 L 91.6 575.0 L 100.4 575.0 z" fill="#66717a"/><text x="96" y="605.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="96" dy="0">时间 ↓</tspan></text><circle cx="96" cy="178" r="6" fill="#30363d"/><rect class="rough" x="124" y="156" width="672" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="460" y="174.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="460" dy="0">run_server · 安装临时 SIGTERM → KeyboardInterrupt 守卫（uvicorn handler</tspan><tspan x="460" dy="17.36">之前的窗口）</tspan></text><circle cx="96" cy="236" r="6" fill="#30363d"/><rect class="rough" x="124" y="214" width="672" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="460" y="232.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="460" dy="0">socket · setup_server → create_server_socket(reuse_port=False) —— 已</tspan><tspan x="460" dy="17.36">BOUND，未 served</tspan></text><circle cx="96" cy="308" r="6" fill="#30363d"/><rect class="rough" x="124" y="272" width="672" height="72" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="460" y="295.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="460" dy="0">engine · async with build_async_engine_client →</tspan><tspan x="460" dy="17.36">create_engine_config → AsyncLLM.from_vllm_config（构造中，数分钟）</tspan><tspan x="460" dy="17.36">→ reset_mm_cache() → yield</tspan></text><circle cx="96" cy="380" r="6" fill="#30363d"/><rect class="rough" x="124" y="358" width="672" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="460" y="376.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="460" dy="0">uvicorn · build_and_serve → serve_http(server.serve(sockets=[sock])) ——</tspan><tspan x="460" dy="17.36">SERVING → 返回 shutdown_task</tspan></text><circle cx="96" cy="438" r="6" fill="#30363d"/><rect class="rough" x="124" y="416" width="672" height="44" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="460" y="443.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="460" dy="0">engine · async with 退出 → CM finally：async_llm.shutdown(timeout)</tspan></text><circle cx="96" cy="496" r="6" fill="#30363d"/><rect class="rough" x="124" y="474" width="672" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="460" y="501.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="460" dy="0">run_server · 在 with 之外 await shutdown_task → HTTP teardown</tspan></text><circle cx="96" cy="554" r="6" fill="#30363d"/><rect class="rough" x="124" y="532" width="672" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="460" y="559.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="460" dy="0">socket · finally：sock.close()</tspan></text><rect class="rough" x="816" y="200" width="220" height="78" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="926" y="218" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="926" dy="0">I-1 · 先绑 socket 再建</tspan><tspan x="926" dy="17.36">engine</tspan><tspan x="926" dy="17.36">—— 避免 ray 竞态</tspan><tspan x="926" dy="17.36">(vllm#8204)</tspan></text><path d="M 796 239 L 809.0 239.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 816 239 L 805.0 243.4 L 805.0 234.6 z" fill="#66717a"/><rect class="rough" x="816" y="388" width="220" height="70" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="926" y="419.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="926" dy="0">I-2 · engine shutdown()</tspan><tspan x="926" dy="17.36">在 finally 中恰好执行一次</tspan></text><path d="M 796 422 L 809.0 422.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 816 422 L 805.0 426.4 L 805.0 417.6 z" fill="#66717a"/><rect class="rough" x="816" y="474" width="220" height="130" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="926" y="509.32" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="926" dy="0">I-3 · 在 with 之外 await</tspan><tspan x="926" dy="17.36">shutdown_task</tspan><tspan x="926" dy="17.36">→ engine teardown 先于</tspan><tspan x="926" dy="17.36">最终 HTTP teardown +</tspan><tspan x="926" dy="17.36">sock.close()</tspan></text><path d="M 796 512 L 811.7 532.5" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 816 538 L 805.8 532.0 L 812.8 526.6 z" fill="#66717a"/><text x="540" y="613.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">先绑 socket 再建 engine（I-1，vllm#8204），把 engine 作用域限定在 async with build_async_engine_client 内使</tspan><tspan x="540" dy="17.36">shutdown() 在 finally 中恰好执行一次（I-2），并在该块外 await HTTP shutdown_task，从而 engine 先于最终 HTTP teardown</tspan><tspan x="540" dy="17.36">和 sock.close() 关闭（I-3）。</tspan></text>
</svg>
