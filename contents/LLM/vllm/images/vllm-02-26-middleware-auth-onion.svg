<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="696" viewBox="0 0 1080 696" role="img" aria-label="中间件洋葱：add_middleware 前置插入，最后添加者在最外">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="696" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">中间件洋葱：add_middleware 前置插入，最后添加者在最外</tspan></text>
<text x="324" y="105.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="324" dy="0">Starlette add_middleware 前置插入 → 最后添加的层在最外</tspan></text><rect class="rough" x="44" y="122" width="560" height="430" rx="20" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="324" y="142.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">用户自备中间件（点路径导入, :336-346）</tspan></text><rect class="rough" x="55" y="152" width="538" height="370" rx="18" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="324" y="172.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">ScalingMiddleware</tspan></text><rect class="rough" x="66" y="182" width="516" height="310" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.8"/><text x="324" y="202.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">XRequestIdMiddleware（若 --enable-request-id-headers）</tspan></text><rect class="rough" x="77" y="212" width="494" height="250" rx="14" fill="#fff0d8" stroke="#30363d" stroke-width="1.8"/><text x="324" y="232.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">AuthenticationMiddleware（仅当 token 列表非空）</tspan></text><rect class="rough" x="88" y="242" width="472" height="190" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="324" y="262.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">CORSMiddleware (:279-285)</tspan></text><rect class="rough" x="99" y="272" width="450" height="130" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="1.8"/><text x="324" y="292.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">Prometheus / ExceptionMiddleware 嵌套</tspan></text><rect class="rough" x="110" y="302" width="428" height="70" rx="8" fill="#b9dfc3" stroke="#30363d" stroke-width="1.8"/><text x="324" y="342.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="324" dy="0">FastAPI routes</tspan></text><rect class="rough" x="636" y="122" width="400" height="230" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="652" y="151.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="652" dy="0">AuthenticationMiddleware.__call__</tspan></text><text x="652" y="200.28" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="652" dy="0">若 scope[&quot;type&quot;] 不在 (http, websocket) 或</tspan><tspan x="652" dy="17.36">method == OPTIONS 则放行</tspan><tspan x="652" dy="17.36">再 url_path.startswith(GUARDED_PREFIX =</tspan><tspan x="652" dy="17.36">(&quot;/v1&quot;,&quot;/v2&quot;,&quot;/inference&quot;)) 且 not</tspan><tspan x="652" dy="17.36">verify_token → 401 JSON</tspan><tspan x="652" dy="17.36">verify_token：SHA-256 配置 token（一次）+</tspan><tspan x="652" dy="17.36">出示的 Bearer · OR 累积</tspan><tspan x="652" dy="17.36">secrets.compare_digest（恒定时间）</tspan></text><rect class="rough" x="636" y="366" width="400" height="104" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="652" y="395.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="652" dy="0">按设计开放（无 guarded 前缀）</tspan></text><text x="652" y="433.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="652" dy="0">/health · /metrics · /load · /version ·</tspan><tspan x="652" dy="17.36">/tokenize · /ping —— 但 /v1/models 受守卫</tspan></text><rect class="rough" x="636" y="484" width="400" height="146" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="652" y="513.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="652" dy="0">4xx 仍是 4xx</tspan></text><text x="652" y="555" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="652" dy="0">对 VLLMValidationError / ValueError /</tspan><tspan x="652" dy="17.36">NotImplementedError 的显式 handler 使 4xx</tspan><tspan x="652" dy="17.36">留在 ExceptionMiddleware（嵌套于</tspan><tspan x="652" dy="17.36">Prometheus）内 —— 避免 5xx 误计</tspan></text><path d="M 636 220 L 517.0 231.3" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 510 232 L 520.5 226.6 L 521.4 235.3 z" fill="#66717a"/><text x="540" y="649.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">ASGI 中间件洋葱 —— Starlette 的 add_middleware 前置插入，故最后添加的层在最外层。AuthenticationMiddleware 仅用</tspan><tspan x="540" dy="17.36">SHA-256 哈希、secrets.compare_digest 恒定时间比较守护 GUARDED_PREFIX（/v1、/v2、/inference），而</tspan><tspan x="540" dy="17.36">/health、/metrics、/load 按设计保持开放。</tspan></text>
</svg>
