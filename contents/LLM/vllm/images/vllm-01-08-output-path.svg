<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="614" viewBox="0 0 1080 614" role="img" aria-label="输出处理：EngineCoreOutput → RequestOutput">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="614" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">输出处理：EngineCoreOutput → RequestOutput</tspan></text>
<rect class="rough" x="44" y="190" width="224" height="128" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="156" y="219.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="156" dy="0">EngineCoreOutput</tspan></text><text x="156" y="239.44" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="156" dy="0">request_id</tspan><tspan x="156" dy="14.879999999999999">new_token_ids [ 列表 ]</tspan><tspan x="156" dy="14.879999999999999">finish_reason</tspan></text><text x="156" y="304.32" text-anchor="middle" font-size="12" font-weight="700" fill="#66717a"><tspan x="156" dy="0">只有 token id —— 无文本</tspan></text><rect x="308" y="120" width="384" height="384" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="326" y="139.84" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="326" dy="0">OutputProcessor · process_outputs</tspan><tspan x="326" dy="19.84">（唯一一处遍历整批）</tspan></text><rect class="rough" x="324" y="180" width="352" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="500" y="206.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="500" dy="0">查 RequestState  ·  缺失 → 丢弃</tspan></text><path d="M 500 224 L 500.0 235.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 500 242 L 495.6 231.0 L 504.4 231.0 z" fill="#30363d"/><rect class="rough" x="324" y="242" width="352" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="500" y="268.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="500" dy="0">增量反分词器  ·  id → 文本</tspan></text><path d="M 500 286 L 500.0 297.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 500 304 L 495.6 293.0 L 504.4 293.0 z" fill="#30363d"/><rect class="rough" x="324" y="304" width="352" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="500" y="330.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="500" dy="0">停止串检查  ·  min_tokens 门控</tspan></text><path d="M 500 348 L 500.0 359.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 500 366 L 495.6 355.0 L 504.4 355.0 z" fill="#30363d"/><rect class="rough" x="324" y="366" width="352" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="500" y="392.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="500" dy="0">输出类型门控：FINAL_ONLY / DELTA / CUMULATIVE</tspan></text><path d="M 500 410 L 500.0 421.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 500 428 L 495.6 417.0 L 504.4 417.0 z" fill="#30363d"/><rect class="rough" x="324" y="428" width="352" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="500" y="454.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="500" dy="0">物化 RequestOutput  ·  外部 id</tspan></text><path d="M 268 254 L 303.4 294.7" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 308 300 L 297.5 294.6 L 304.1 288.8 z" fill="#30363d"/><text x="883" y="154.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#66717a"><tspan x="883" dy="0">queue 非 None ?</tspan></text><rect class="rough" x="730" y="196" width="306" height="92" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="883" y="229.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="883" dy="0">异步信箱 → generate()</tspan></text><text x="883" y="266.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="883" dy="0">流式 · 每步 DELTA</tspan></text><rect class="rough" x="730" y="320" width="306" height="92" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="883" y="353.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="883" dy="0">同步列表 → 抽干 + 排序</tspan></text><text x="883" y="390.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="883" dy="0">离线 · FINAL_ONLY，仅一次</tspan></text><path d="M 692 300 L 726.2 247.9" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 730 242 L 727.7 253.6 L 720.3 248.8 z" fill="#30363d"/><path d="M 692 340 L 724.2 362.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 730 366 L 718.4 363.4 L 723.4 356.2 z" fill="#30363d"/><rect class="rough" x="44" y="420" width="250" height="74" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="169" y="446.68" text-anchor="middle" font-size="13" font-weight="800" fill="#27323a"><tspan x="169" dy="0">reqs_to_abort</tspan></text><text x="169" y="466.88" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="169" dy="0">提升为完成 · 下一次 EngineCore.step</tspan><tspan x="169" dy="14.879999999999999">中止</tspan></text><path d="M 324 318 L 244.4 414.6" fill="none" stroke="#c0524a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 240 420 L 243.6 408.7 L 250.4 414.3 z" fill="#c0524a"/><text x="540" y="564.88" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">一个 process_outputs 循环把每个 EngineCoreOutput 的 token id 变回文本 —— 反分词、停止串检查、输出类型门控 —— 并以外部 id 物化</tspan><tspan x="540" dy="14.879999999999999">RequestOutput；单个 queue 是否为 None 的分叉决定送往流式信箱还是离线列表，停止串则经 reqs_to_abort 回流。</tspan></text>
</svg>
