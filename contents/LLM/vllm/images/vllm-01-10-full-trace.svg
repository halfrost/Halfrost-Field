<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="616" viewBox="0 0 1080 616" role="img" aria-label="完整请求路径，端到端">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="616" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">完整请求路径，端到端</tspan></text>
<rect class="rough" x="44" y="104" width="214" height="66" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="151" y="127.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="151" dy="0">generate()</tspan></text><text x="151" y="158.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="151" dy="0">校验 · 默认 · 生成 id</tspan></text><path d="M 258 137 L 285.0 137.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 292 137 L 281.0 141.4 L 281.0 132.6 z" fill="#30363d"/><rect class="rough" x="292" y="104" width="214" height="66" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="399" y="127.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="399" dy="0">process_inputs</tspan></text><text x="399" y="158.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="399" dy="0">→ EngineCoreRequest</tspan></text><path d="M 506 137 L 533.0 137.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 137 L 529.0 141.4 L 529.0 132.6 z" fill="#30363d"/><rect class="rough" x="540" y="104" width="214" height="66" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="647" y="127.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="647" dy="0">EngineCoreClient</tspan></text><text x="647" y="158.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="647" dy="0">进程内  |  MPClient · ZMQ</tspan></text><path d="M 754 137 L 781.0 137.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 788 137 L 777.0 141.4 L 777.0 132.6 z" fill="#30363d"/><rect class="rough" x="788" y="104" width="214" height="66" rx="12" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="895" y="127.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="895" dy="0">EngineCore.step</tspan></text><text x="895" y="158.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="895" dy="0">调度 → 执行 → 提交</tspan></text><path d="M 904 170 L 884.4 194.5" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 880 200 L 883.4 188.7 L 890.3 194.2 z" fill="#30363d"/><rect x="240" y="200" width="760" height="178" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="258" y="229.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="258" dy="0">EngineCore.step  ·  一次事务</tspan></text><rect class="rough" x="260" y="252" width="150" height="46" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="335" y="280.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="335" dy="0">调度</tspan></text><path d="M 410 275 L 433.0 275.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 440 275 L 429.0 279.4 L 429.0 270.6 z" fill="#30363d"/><rect class="rough" x="440" y="252" width="150" height="46" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="515" y="280.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="515" dy="0">执行</tspan></text><path d="M 590 275 L 613.0 275.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 620 275 L 609.0 279.4 L 609.0 270.6 z" fill="#30363d"/><rect class="rough" x="620" y="252" width="150" height="46" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="695" y="280.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="695" dy="0">采样</tspan></text><path d="M 770 275 L 793.0 275.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 800 275 L 789.0 279.4 L 789.0 270.6 z" fill="#30363d"/><rect class="rough" x="800" y="252" width="150" height="46" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="875" y="280.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="875" dy="0">提交</tspan></text><rect class="rough" x="260" y="320" width="710" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="615" y="345.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="615" dy="0">Executor · collective_rpc → Worker · ModelRunner.forward → logits → Sampler</tspan></text><path d="M 525 298 L 525.0 313.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 525 320 L 520.6 309.0 L 529.4 309.0 z" fill="#30363d"/><rect class="rough" x="724" y="430" width="250" height="66" rx="12" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="849" y="453.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="849" dy="0">EngineCoreOutput</tspan></text><text x="849" y="484.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="849" dy="0">token id + 完成原因</tspan></text><rect class="rough" x="415" y="430" width="250" height="66" rx="12" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="540" y="453.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="540" dy="0">OutputProcessor</tspan></text><text x="540" y="484.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">反分词 · 停止串检查</tspan></text><rect class="rough" x="106" y="430" width="250" height="66" rx="12" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="231" y="453.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="231" dy="0">RequestOutput</tspan></text><text x="231" y="484.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="231" dy="0">外部 id · delta | 最终</tspan></text><path d="M 849 378 L 849.0 423.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 849 430 L 844.6 419.0 L 853.4 419.0 z" fill="#30363d"/><path d="M 724 463 L 672.0 463.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 665 463 L 676.0 458.6 L 676.0 467.4 z" fill="#30363d"/><path d="M 415 463 L 363.0 463.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 356 463 L 367.0 458.6 L 367.0 467.4 z" fill="#30363d"/><path d="M 112 430 L 112.0 177.0" fill="none" stroke="#66717a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 112 170 L 116.4 181.0 L 107.6 181.0 z" fill="#66717a"/><text x="124" y="289.44" text-anchor="start" font-size="12" font-weight="700" fill="#66717a"><tspan x="124" dy="0">同一个外部</tspan><tspan x="124" dy="14.879999999999999">request_id</tspan><tspan x="124" dy="14.879999999999999">原路返回</tspan></text><text x="540" y="559.44" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">generate() → process_inputs → EngineCoreRequest → 客户端 → EngineCore.step（调度 → 执行 → 采样 → 提交）经</tspan><tspan x="540" dy="14.879999999999999">Executor/Worker/ModelRunner/Sampler → EngineCoreOutput → OutputProcessor → RequestOutput ——</tspan><tspan x="540" dy="14.879999999999999">一条线程，每一跳改变所有权、表示或进程，而调用方的 id 全程不变。</tspan></text>
</svg>
