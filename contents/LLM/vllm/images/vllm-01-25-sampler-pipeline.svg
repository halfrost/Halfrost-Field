<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="836" viewBox="0 0 1080 836" role="img" aria-label="从 hidden states 到 token id：采样流水线">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="836" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">从 hidden states 到 token id：采样流水线</tspan></text>
<rect class="rough" x="56" y="104" width="456" height="54" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="284" y="136.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="284" dy="0">hidden_states  [num_scheduled_tokens, hidden]</tspan></text><rect class="rough" x="56" y="186" width="456" height="64" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="284" y="205.67999999999998" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="284" dy="0">hidden_states[input_batch.logits_indices] →</tspan><tspan x="284" dy="17.36">只取需要 logits 的位置</tspan><tspan x="284" dy="17.36">（+ draft-verify 行） → sample_hidden_states</tspan></text><path d="M 284 158 L 284.0 179.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 186 L 279.6 175.0 L 288.4 175.0 z" fill="#30363d"/><rect class="rough" x="56" y="278" width="456" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="284" y="296.68" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="284" dy="0">compute_logits · LM head 矩阵乘（hidden_dim ×</tspan><tspan x="284" dy="17.36">vocab_size）</tspan><tspan x="284" dy="17.36">TP 汇聚分片词表</tspan></text><path d="M 284 250 L 284.0 271.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 278 L 279.6 267.0 L 288.4 267.0 z" fill="#30363d"/><rect class="rough" x="56" y="364" width="456" height="46" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="284" y="392.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="284" dy="0">logits  [num_sampled, vocab]</tspan></text><path d="M 284 340 L 284.0 357.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 364 L 279.6 353.0 L 288.4 353.0 z" fill="#30363d"/><rect class="rough" x="56" y="438" width="456" height="62" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="284" y="465.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="284" dy="0">if grammar_output: apply_grammar_bitmask 原地应用</tspan><tspan x="284" dy="17.36">scheduler 拥有，先于 sampler 看到 logits</tspan></text><path d="M 284 410 L 284.0 431.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 438 L 279.6 427.0 L 288.4 427.0 z" fill="#30363d"/><path d="M 284 500 L 284.0 525.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 532 L 279.6 521.0 L 288.4 521.0 z" fill="#30363d"/><rect class="rough" x="134" y="532" width="300" height="40" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="284" y="557.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="284" dy="0">input_batch.num_draft_tokens</tspan></text><rect class="rough" x="56" y="600" width="150" height="56" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="131" y="633.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="131" dy="0">0 → Sampler</tspan></text><rect class="rough" x="220" y="600" width="326" height="56" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="383" y="624.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="383" dy="0">&gt; 0 →</tspan><tspan x="383" dy="17.36">rejection_sampler（投机解码，文章 12）</tspan></text><path d="M 140 572 L 140.0 593.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 140 600 L 135.6 589.0 L 144.4 589.0 z" fill="#66717a"/><path d="M 383 572 L 383.0 593.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 383 600 L 378.6 589.0 L 387.4 589.0 z" fill="#66717a"/><rect class="rough" x="560" y="104" width="464" height="76" rx="12" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="792" y="118.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="792" dy="0">apply_sampling_params  ·  在新的 fp32</tspan><tspan x="792" dy="17.36">副本上按顺序运行算子</tspan></text><text x="792" y="169.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="792" dy="0">torch.empty_like(..., float32).copy_(logits)</tspan></text><rect class="rough" x="560" y="196" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="223.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="792" dy="0">logit bias / allowed_token_ids / min_tokens</tspan></text><rect class="rough" x="560" y="254" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="281.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="792" dy="0">penalties（presence / frequency / repetition）</tspan></text><rect class="rough" x="560" y="312" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="339.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="792" dy="0">bad-words</tspan></text><rect class="rough" x="560" y="370" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="397.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="792" dy="0">temperature</tspan></text><rect class="rough" x="560" y="428" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="455.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="792" dy="0">min-p</tspan></text><rect class="rough" x="560" y="486" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="513.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="792" dy="0">[ top-k / top-p 暂缓 · skip_top_k_top_p=True ]</tspan></text><rect class="rough" x="560" y="544" width="464" height="44" rx="7" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="792" y="571.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="792" dy="0">抽取 · FlashInfer 融合 | gumbel_sample</tspan></text><path d="M 792 180 L 792.0 189.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 792 196 L 787.6 185.0 L 796.4 185.0 z" fill="#30363d"/><rect class="rough" x="560" y="610" width="464" height="46" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="792" y="638.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="792" dy="0">sampled_token_ids  reshape 为 [num_requests, 1]</tspan></text><path d="M 792 588 L 792.0 603.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 792 610 L 787.6 599.0 L 796.4 599.0 z" fill="#30363d"/><path d="M 140 656 L 555.6 139.5" fill="none" stroke="#66717a" stroke-width="1.8" stroke-dasharray="8 7"/><path d="M 560 134 L 556.5 145.3 L 549.7 139.8 z" fill="#66717a"/><rect class="rough" x="56" y="700" width="968" height="54" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="723.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">不变量：只投影所需位置（成本 ∝ logits 行数；普通 decode 约每请求一行）；保留原始 logits</tspan><tspan x="540" dy="17.36">供 logprobs；无操作默认 temp=1.0 / top_p=1.0 / top_k=0 / min_p=0.0</tspan></text><text x="540" y="790.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">hidden_states[logits_indices] 只选出需要 logits 的位置，compute_logits 投影到词表，scheduler 拥有的 grammar bitmask</tspan><tspan x="540" dy="17.36">原地应用，然后 apply_sampling_params 在私有 fp32 副本上按顺序运行算子再抽取 —— 因此更一般的成本尺度是被选中的 logits 行数。</tspan></text>
</svg>
