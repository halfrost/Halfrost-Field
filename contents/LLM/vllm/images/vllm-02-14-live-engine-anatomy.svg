<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="706" viewBox="0 0 1080 706" role="img" aria-label="活引擎解剖：LLMEngine.__init__ 装配了什么">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="706" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">活引擎解剖：LLMEngine.__init__ 装配了什么</tspan></text>
<rect class="rough" x="390" y="104" width="300" height="52" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="135.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="540" dy="0">LLMEngine · 持有 VllmConfig</tspan></text><rect class="rough" x="44" y="194" width="228" height="92" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="158" y="230.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="158" dy="0">renderer</tspan></text><text x="158" y="244.67999999999998" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="158" dy="0">renderer_from_config(con</tspan><tspan x="158" dy="17.36">fig)</tspan><tspan x="158" dy="17.36">分词器 + 对话渲染</tspan></text><path d="M 540 156 L 165.0 193.3" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 158 194 L 168.5 188.5 L 169.4 197.3 z" fill="#66717a"/><rect class="rough" x="290" y="194" width="228" height="92" rx="12" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="404" y="230.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="404" dy="0">input_processor</tspan></text><text x="404" y="244.67999999999998" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="404" dy="0">InputProcessor(config,</tspan><tspan x="404" dy="17.36">renderer)</tspan><tspan x="404" dy="17.36">正向转换器</tspan></text><path d="M 540 156 L 410.7 192.1" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 404 194 L 413.4 186.8 L 415.8 195.3 z" fill="#66717a"/><rect class="rough" x="536" y="194" width="228" height="92" rx="12" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="650" y="230.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="650" dy="0">output_processor</tspan></text><text x="650" y="244.67999999999998" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="650" dy="0">OutputProcessor(tokenizer,</tspan><tspan x="650" dy="17.36">…)</tspan><tspan x="650" dy="17.36">反向转换器</tspan></text><path d="M 540 156 L 643.4 191.7" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 650 194 L 638.2 194.6 L 641.0 186.2 z" fill="#66717a"/><rect class="rough" x="782" y="194" width="228" height="92" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="896" y="230.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="896" dy="0">engine_core</tspan></text><text x="896" y="244.67999999999998" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="896" dy="0">EngineCoreClient.make_cl</tspan><tspan x="896" dy="17.36">ient</tspan><tspan x="896" dy="17.36">asyncio_mode=False</tspan></text><path d="M 540 156 L 889.0 193.3" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 896 194 L 884.6 197.2 L 885.5 188.5 z" fill="#66717a"/><rect class="rough" x="44" y="300" width="992" height="28" rx="14" fill="#b9dfc3" stroke="#30363d" stroke-width="1.8"/><text x="540" y="319.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">make_client 返回 ⇒ 模型已加载 · KV 缓存已 profiling+分配 · scheduler 已存在（文章 04/05/06）</tspan></text><rect x="44" y="342" width="992" height="108" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="62" y="371.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="62" dy="0">请求路径</tspan></text><rect class="rough" x="64" y="396" width="230" height="40" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="179" y="421.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="179" dy="0">EngineInput</tspan></text><rect class="rough" x="430" y="396" width="230" height="40" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="545" y="421.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="545" dy="0">EngineCoreRequest</tspan></text><rect class="rough" x="796" y="396" width="220" height="40" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="906" y="421.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="906" dy="0">engine_core</tspan></text><path d="M 294 416 L 423.0 416.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 430 416 L 419.0 420.4 L 419.0 411.6 z" fill="#30363d"/><path d="M 660 416 L 789.0 416.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 796 416 L 785.0 420.4 L 785.0 411.6 z" fill="#30363d"/><text x="362" y="393.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="362" dy="0">input_processor</tspan></text><rect x="44" y="464" width="992" height="108" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="62" y="493.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="62" dy="0">响应路径</tspan></text><rect class="rough" x="64" y="518" width="220" height="40" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="174" y="543.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="174" dy="0">engine_core</tspan></text><rect class="rough" x="420" y="518" width="240" height="40" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="540" y="543.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">EngineCoreOutputs</tspan></text><rect class="rough" x="796" y="518" width="220" height="40" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="906" y="543.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="906" dy="0">RequestOutput</tspan></text><path d="M 284 538 L 413.0 538.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 420 538 L 409.0 542.4 L 409.0 533.6 z" fill="#30363d"/><path d="M 660 538 L 789.0 538.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 796 538 L 785.0 542.4 L 785.0 533.6 z" fill="#30363d"/><text x="728" y="515.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="728" dy="0">output_processor</tspan></text><rect class="rough" x="44" y="586" width="992" height="42" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="612.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">__init__ 返回 == 一个完全初始化的引擎 · 下一行的 generate 不会与构造发生竞态</tspan></text><text x="540" y="664.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">LLMEngine.__init__ 把 renderer、input_processor、output_processor 与 EngineCoreClient 装配成活引擎；当</tspan><tspan x="540" dy="17.36">make_client 返回时，模型已加载、KV 缓存已 profiling 并分配、scheduler 已存在。</tspan></text>
</svg>
