<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="740" viewBox="0 0 1080 740" role="img" aria-label="采样回退：请求 → 模型默认 → 中性常量">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="740" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">采样回退：请求 → 模型默认 → 中性常量</tspan></text>
<rect class="rough" x="44" y="104" width="188" height="46" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="138" y="132.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="138" dy="0">旋钮</tspan></text><rect class="rough" x="246" y="104" width="220" height="46" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="356" y="123.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="356" dy="0">第 1 层 · 请求</tspan><tspan x="356" dy="17.36">（若非 None）</tspan></text><rect class="rough" x="480" y="104" width="294" height="46" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="627" y="123.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="627" dy="0">第 2 层 · generation_config.json</tspan><tspan x="627" dy="17.36">get_diff_sampling_param()</tspan></text><rect class="rough" x="788" y="104" width="248" height="46" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="912" y="123.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="912" dy="0">第 3 层 · 中性</tspan><tspan x="912" dy="17.36">_DEFAULT_SAMPLING_PARAMS</tspan></text><path d="M 466 127 L 473.0 127.0" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 480 127 L 469.0 131.4 L 469.0 122.6 z" fill="#30363d"/><path d="M 774 127 L 781.0 127.0" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 788 127 L 777.0 131.4 L 777.0 122.6 z" fill="#30363d"/><text x="473" y="97.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="473" dy="0">若 None →</tspan></text><text x="781" y="97.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="781" dy="0">若 None →</tspan></text><rect class="rough" x="44" y="164" width="188" height="38" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="138" y="188.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="138" dy="0">repetition_penalty</tspan></text><rect class="rough" x="246" y="164" width="220" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="356" y="188.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="356" dy="0">self.repetition_penalty</tspan></text><rect class="rough" x="480" y="164" width="294" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="627" y="188.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="627" dy="0">…get(&quot;repetition_penalty&quot;)</tspan></text><rect class="rough" x="788" y="164" width="248" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="912" y="188.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="912" dy="0">1.0</tspan></text><rect class="rough" x="44" y="216" width="188" height="38" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="138" y="240.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="138" dy="0">temperature</tspan></text><rect class="rough" x="246" y="216" width="220" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="356" y="240.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="356" dy="0">self.temperature</tspan></text><rect class="rough" x="480" y="216" width="294" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="627" y="240.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="627" dy="0">…get(&quot;temperature&quot;)</tspan></text><rect class="rough" x="788" y="216" width="248" height="38" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="912" y="240.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="912" dy="0">1.0</tspan></text><rect class="rough" x="44" y="268" width="188" height="38" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="138" y="292.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="138" dy="0">top_p</tspan></text><rect class="rough" x="246" y="268" width="220" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="356" y="292.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="356" dy="0">self.top_p</tspan></text><rect class="rough" x="480" y="268" width="294" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="627" y="292.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="627" dy="0">…get(&quot;top_p&quot;)</tspan></text><rect class="rough" x="788" y="268" width="248" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="912" y="292.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="912" dy="0">1.0</tspan></text><rect class="rough" x="44" y="320" width="188" height="38" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="138" y="344.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="138" dy="0">top_k</tspan></text><rect class="rough" x="246" y="320" width="220" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="356" y="344.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="356" dy="0">self.top_k</tspan></text><rect class="rough" x="480" y="320" width="294" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="627" y="344.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="627" dy="0">…get(&quot;top_k&quot;)</tspan></text><rect class="rough" x="788" y="320" width="248" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="912" y="344.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="912" dy="0">0</tspan></text><rect class="rough" x="44" y="372" width="188" height="38" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="138" y="396.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="138" dy="0">min_p</tspan></text><rect class="rough" x="246" y="372" width="220" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="356" y="396.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="356" dy="0">self.min_p</tspan></text><rect class="rough" x="480" y="372" width="294" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="627" y="396.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="627" dy="0">…get(&quot;min_p&quot;)</tspan></text><rect class="rough" x="788" y="372" width="248" height="38" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="912" y="396.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="912" dy="0">0.0</tspan></text><rect class="rough" x="44" y="424" width="992" height="42" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="540" y="450.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">示例 · Qwen 自带 temperature=0.7 · 调用方省略 → 解析为 0.7（而非中性 1.0）</tspan></text><rect class="rough" x="44" y="480" width="490" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="289" y="507.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="289" dy="0">stop-token id 与模型默认求并、保序</tspan><tspan x="289" dy="17.36">(protocol.py:295-305) —— 如 gpt-oss &lt;/call&gt;</tspan></text><rect class="rough" x="560" y="480" width="476" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="798" y="507.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">echo_without_generation = echo 且</tspan><tspan x="798" dy="17.36">max_tokens==0，在此检测</tspan></text><path d="M 540 542 L 540.0 549.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 540 556 L 535.6 545.0 L 544.4 545.0 z" fill="#66717a"/><rect class="rough" x="44" y="556" width="992" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="540" y="574.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">→ SamplingParams.from_optional(…) · output_kind = DELTA if stream else FINAL_ONLY · echo_without_generation 时</tspan><tspan x="540" dy="17.36">max_tokens = 1</tspan></text><rect class="rough" x="44" y="614" width="992" height="42" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="640.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">模式只记录意图（None = 未设） · 数值域门在引擎侧 _verify_args</tspan></text><text x="540" y="683.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">to_sampling_params 通过三层优先级解析每个未设（None）旋钮 —— 请求值 → 模型自带 generation_config.json 默认 → 中性</tspan><tspan x="540" dy="17.36">_DEFAULT_SAMPLING_PARAMS —— 因此发布 temperature=0.7 的 Qwen 模型会压过库中性值 1.0，而数值域校验仍留在引擎侧的</tspan><tspan x="540" dy="17.36">_verify_args。</tspan></text>
</svg>
