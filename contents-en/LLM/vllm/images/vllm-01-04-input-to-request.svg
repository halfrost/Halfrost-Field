<rect width="1080" height="600" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Five Prompt Shapes → One EngineCoreRequest</tspan></text>
<text x="144" y="109.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="144" dy="0">5 prompt shapes</tspan></text><rect class="rough" x="44" y="122" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="149.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">str / TextPrompt</tspan></text><path d="M 244 144 L 266.0 298.1" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 261.1 294.7 L 269.8 293.5 z" fill="#66717a"/><rect class="rough" x="44" y="182" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="200.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">TokensPrompt (token</tspan><tspan x="144" dy="17.36">ids)</tspan></text><path d="M 244 204 L 265.4 298.2" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 260.3 295.3 L 268.8 293.3 z" fill="#66717a"/><rect class="rough" x="44" y="242" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="260.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">EmbedsPrompt</tspan><tspan x="144" dy="17.36">(embeddings)</tspan></text><path d="M 244 264 L 263.6 298.9" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 257.8 297.6 L 265.5 293.3 z" fill="#66717a"/><rect class="rough" x="44" y="302" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="320.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">encoder / decoder</tspan><tspan x="144" dy="17.36">pair</tspan></text><path d="M 244 324 L 261.6 309.5" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 261.3 315.4 L 255.7 308.6 z" fill="#66717a"/><rect class="rough" x="44" y="362" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="380.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="144" dy="0">multimodal {image,</tspan><tspan x="144" dy="17.36">audio}</tspan></text><path d="M 244 384 L 265.0 311.7" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 267 305 L 268.1 316.8 L 259.7 314.3 z" fill="#66717a"/><rect x="267" y="104" width="372" height="404" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="285" y="133.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="285" dy="0">Processor · process_inputs</tspan></text><rect class="rough" x="283" y="150" width="340" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="453" y="168.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">validate (task · params · LoRA · DP</tspan><tspan x="453" dy="17.36">rank)</tspan></text><path d="M 453 194 L 453.0 201.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 208 L 448.6 197.0 L 457.4 197.0 z" fill="#30363d"/><rect class="rough" x="283" y="208" width="340" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="453" y="226.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">tokenize / render  ·  or accept token</tspan><tspan x="453" dy="17.36">ids</tspan></text><path d="M 453 252 L 453.0 259.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 266 L 448.6 255.0 L 457.4 255.0 z" fill="#30363d"/><rect class="rough" x="283" y="266" width="340" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="453" y="284.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">flatten multimodal → mm_features +</tspan><tspan x="453" dy="17.36">dual hash</tspan></text><path d="M 453 310 L 453.0 317.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 324 L 448.6 313.0 L 457.4 313.0 z" fill="#30363d"/><rect class="rough" x="283" y="324" width="340" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="453" y="342.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">clone + finalize params (max_tokens</tspan><tspan x="453" dy="17.36">concrete)</tspan></text><path d="M 453 368 L 453.0 375.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 382 L 448.6 371.0 L 457.4 371.0 z" fill="#30363d"/><rect class="rough" x="283" y="382" width="340" height="44" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="453" y="400.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">attach LoRA · cache_salt · seed</tspan><tspan x="453" dy="17.36">block-hash keys</tspan></text><path d="M 453 426 L 453.0 433.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 453 440 L 448.6 429.0 L 457.4 429.0 z" fill="#30363d"/><rect class="rough" x="283" y="440" width="340" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="453" y="458.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="453" dy="0">assign_request_id (external + 8</tspan><tspan x="453" dy="17.36">random)</tspan></text><rect x="662" y="120" width="374" height="404" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="849" y="148.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="849" dy="0">EngineCoreRequest</tspan></text><text x="849" y="162.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="849" dy="0">msgspec · array_like · gc=false · wire</tspan><tspan x="849" dy="17.36">struct</tspan></text><rect class="rough" x="678" y="188" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="208.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">request_id</tspan></text><rect class="rough" x="678" y="232" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="252.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">prompt_token_ids | prompt_embeds</tspan></text><rect class="rough" x="678" y="276" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="296.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">mm_features</tspan></text><rect class="rough" x="678" y="320" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="340.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">sampling_params | pooling_params</tspan></text><rect class="rough" x="678" y="364" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="384.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">lora_request</tspan></text><rect class="rough" x="678" y="408" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="428.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">cache_salt · arrival_time</tspan></text><rect class="rough" x="678" y="452" width="342" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="849" y="472.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="849" dy="0">priority · data_parallel_rank</tspan></text><text x="849" y="501.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="849" dy="0">one uniform struct — heterogeneity gone;</tspan><tspan x="849" dy="17.36">downstream reads token ids + params only</tspan></text><path d="M 639 305 L 655.2 301.5" fill="none" stroke="#30363d" stroke-width="2.4"/><path d="M 662 300 L 652.2 306.6 L 650.3 298.0 z" fill="#30363d"/><text x="540" y="553.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">One process_inputs call validates, tokenizes, flattens multimodal, finalizes params, and mints cache keys —</tspan><tspan x="540" dy="17.36">collapsing five heterogeneous prompt shapes into a single wire-shaped EngineCoreRequest the whole engine</tspan><tspan x="540" dy="17.36">speaks.</tspan></text>
</svg>
