<rect width="1080" height="600" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Five Prompt Shapes → One EngineCoreRequest</tspan></text>
<text x="144" y="109.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="144" dy="0">5 prompt shapes</tspan></text><rect class="rough" x="44" y="122" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="148.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="144" dy="0">str / TextPrompt</tspan></text><path d="M 244 144 L 284.2 298.2" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 286 305 L 279.0 295.5 L 287.5 293.2 z" fill="#66717a"/><rect class="rough" x="44" y="182" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="200.75" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="144" dy="0">TokensPrompt (token</tspan><tspan x="144" dy="15.5">ids)</tspan></text><path d="M 244 204 L 283.3 298.5" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 286 305 L 277.7 296.5 L 285.8 293.2 z" fill="#66717a"/><rect class="rough" x="44" y="242" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="260.75" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="144" dy="0">EmbedsPrompt</tspan><tspan x="144" dy="15.5">(embeddings)</tspan></text><path d="M 244 264 L 281.0 300.1" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 286 305 L 275.1 300.5 L 281.2 294.2 z" fill="#66717a"/><rect class="rough" x="44" y="302" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="328.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="144" dy="0">encoder / decoder pair</tspan></text><path d="M 244 324 L 279.6 307.9" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 286 305 L 277.8 313.5 L 274.2 305.5 z" fill="#66717a"/><rect class="rough" x="44" y="362" width="200" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="144" y="380.75" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="144" dy="0">multimodal {image,</tspan><tspan x="144" dy="15.5">audio}</tspan></text><path d="M 244 384 L 282.7 311.2" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 286 305 L 284.7 316.8 L 277.0 312.6 z" fill="#66717a"/><rect x="286" y="104" width="360" height="404" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="304" y="133.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="304" dy="0">Processor · process_inputs</tspan></text><rect class="rough" x="302" y="150" width="328" height="28" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="466" y="168.14" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="466" dy="0">validate (task · params · LoRA · DP rank)</tspan></text><path d="M 466 178 L 466.0 199.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 466 206 L 461.6 195.0 L 470.4 195.0 z" fill="#30363d"/><rect class="rough" x="302" y="206" width="328" height="28" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="466" y="224.14" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="466" dy="0">tokenize / render  ·  or accept token ids</tspan></text><path d="M 466 234 L 466.0 255.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 466 262 L 461.6 251.0 L 470.4 251.0 z" fill="#30363d"/><rect class="rough" x="302" y="262" width="328" height="28" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="466" y="279.96" text-anchor="middle" font-size="11" font-weight="600" fill="#27323a"><tspan x="466" dy="0">flatten multimodal → mm_features + dual hash</tspan></text><path d="M 466 290 L 466.0 311.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 466 318 L 461.6 307.0 L 470.4 307.0 z" fill="#30363d"/><rect class="rough" x="302" y="318" width="328" height="28" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="466" y="335.96" text-anchor="middle" font-size="11" font-weight="600" fill="#27323a"><tspan x="466" dy="0">clone + finalize params (max_tokens concrete)</tspan></text><path d="M 466 346 L 466.0 367.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 466 374 L 461.6 363.0 L 470.4 363.0 z" fill="#30363d"/><rect class="rough" x="302" y="374" width="328" height="28" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="466" y="391.78" text-anchor="middle" font-size="10.5" font-weight="600" fill="#27323a"><tspan x="466" dy="0">attach LoRA · cache_salt · seed block-hash keys</tspan></text><path d="M 466 402 L 466.0 423.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 466 430 L 461.6 419.0 L 470.4 419.0 z" fill="#30363d"/><rect class="rough" x="302" y="430" width="328" height="28" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="466" y="448.14" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="466" dy="0">assign_request_id (external + 8 random)</tspan></text><rect x="690" y="120" width="346" height="388" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="863" y="152.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="863" dy="0">EngineCoreRequest</tspan></text><text x="863" y="172.96" text-anchor="middle" font-size="11" font-weight="500" fill="#66717a"><tspan x="863" dy="0">msgspec · array_like · gc=false · wire struct</tspan></text><rect class="rough" x="706" y="188" width="314" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="863" y="207.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="863" dy="0">request_id</tspan></text><rect class="rough" x="706" y="232" width="314" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="863" y="251.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="863" dy="0">prompt_token_ids | prompt_embeds</tspan></text><rect class="rough" x="706" y="276" width="314" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="863" y="295.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="863" dy="0">mm_features</tspan></text><rect class="rough" x="706" y="320" width="314" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="863" y="339.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="863" dy="0">sampling_params | pooling_params</tspan></text><rect class="rough" x="706" y="364" width="314" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="863" y="383.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="863" dy="0">lora_request</tspan></text><rect class="rough" x="706" y="408" width="314" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="863" y="427.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="863" dy="0">cache_salt · arrival_time</tspan></text><rect class="rough" x="706" y="452" width="314" height="30" rx="6" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="863" y="471.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="863" dy="0">priority · data_parallel_rank</tspan></text><text x="863" y="501.96" text-anchor="middle" font-size="11" font-weight="500" fill="#66717a"><tspan x="863" dy="0">one uniform struct — heterogeneity gone; downstream reads token ids + params only</tspan></text><path d="M 646 305 L 683.0 300.8" fill="none" stroke="#30363d" stroke-width="2.4"/><path d="M 690 300 L 679.6 305.6 L 678.6 296.9 z" fill="#30363d"/><text x="540" y="562.75" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">One process_inputs call validates, tokenizes, flattens multimodal, finalizes params, and mints cache keys — collapsing</tspan><tspan x="540" dy="15.5">five heterogeneous prompt shapes into a single wire-shaped EngineCoreRequest the whole engine speaks.</tspan></text>
</svg>
