<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="748" viewBox="0 0 1080 748" role="img" aria-label="/v1/responses: One HTTP Call, N Sequential Engine Requests">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="748" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">/v1/responses: One HTTP Call, N Sequential Engine Requests</tspan></text>
<rect x="44" y="96" width="610" height="494" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="62" y="125.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="62" dy="0">while True:   (responses/serving.py:672-700)</tspan></text><rect class="rough" x="60" y="150" width="578" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="349" y="168.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="349" dy="0">1 · sub_request_id = f&quot;{request_id}_{sub_request}&quot; — fresh id</tspan><tspan x="349" dy="17.36">per turn (distinct to scheduler)</tspan></text><rect class="rough" x="60" y="208" width="578" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="349" y="226.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="349" dy="0">2 · engine_client.generate(engine_input, sampling_params,</tspan><tspan x="349" dy="17.36">sub_request_id, reasoning_parser_kwargs=…)</tspan></text><rect class="rough" x="60" y="266" width="578" height="40" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="349" y="291.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="349" dy="0">3 · async for res: context.append_output(res); yield context</tspan></text><rect class="rough" x="60" y="320" width="578" height="52" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="349" y="342.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="349" dy="0">4 · context.need_builtin_tool_call()?      YES ↓ continue     </tspan><tspan x="349" dy="17.36">NO → break</tspan></text><rect class="rough" x="60" y="386" width="578" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="349" y="404.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="349" dy="0">5 · tool_output = await context.call_tool();</tspan><tspan x="349" dy="17.36">context.append_tool_output(…)</tspan></text><rect class="rough" x="60" y="444" width="578" height="78" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="349" y="462" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="349" dy="0">6 · re-render next prompt ·</tspan><tspan x="349" dy="17.36">Harmony render_for_completion() +</tspan><tspan x="349" dy="17.36">max_tokens=max_model_len−len(token_ids)</tspan><tspan x="349" dy="17.36">/ Parsable _render_next_turn + get_max_tokens</tspan></text><rect class="rough" x="60" y="536" width="578" height="40" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="349" y="561.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="349" dy="0">7 · priority = orig_priority − 1 · sub_request += 1</tspan></text><path d="M 60 556 L 32 556 L 32 170" fill="none" stroke="#66717a" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="9 6"/><path d="M 32 170 L 53.0 170.0" fill="none" stroke="#66717a" stroke-width="1.8" stroke-dasharray="8 7"/><path d="M 60 170 L 49.0 174.4 L 49.0 165.6 z" fill="#66717a"/><path d="M 638 346 L 662 346 L 662 596" fill="none" stroke="#b3402f" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="9 6"/><path d="M 662 596 L 616.8 608.2" fill="none" stroke="#b3402f" stroke-width="1.8" stroke-dasharray="8 7"/><path d="M 610 610 L 619.5 602.9 L 621.8 611.4 z" fill="#b3402f"/><text x="671" y="343.04" text-anchor="middle" font-size="14" font-weight="700" fill="#b3402f"><tspan x="671" dy="0">NO</tspan></text><rect class="rough" x="680" y="96" width="356" height="494" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="696" y="125.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="696" dy="0">ConversationContext (ABC)</tspan></text><text x="696" y="262.88000000000005" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="696" dy="0">hooks:</tspan><tspan x="696" dy="17.36">· append_output</tspan><tspan x="696" dy="17.36">· append_tool_output</tspan><tspan x="696" dy="17.36">· call_tool</tspan><tspan x="696" dy="17.36">· need_builtin_tool_call</tspan><tspan x="696" dy="17.36">———</tspan><tspan x="696" dy="17.36">impls:</tspan><tspan x="696" dy="17.36">· SimpleContext — runs once</tspan><tspan x="696" dy="17.36">· ParsableContext —</tspan><tspan x="696" dy="17.36">VLLM_USE_EXPERIMENTAL_PARSER_CONTEXT</tspan><tspan x="696" dy="17.36">· HarmonyContext — gpt_oss;</tspan><tspan x="696" dy="17.36">routes by recipient prefix</tspan><tspan x="696" dy="17.36">browser. / python / container.</tspan></text><rect class="rough" x="44" y="604" width="610" height="44" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="349" y="631.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="349" dy="0">NO → break · assemble final /v1/responses payload</tspan></text><rect class="rough" x="680" y="604" width="356" height="78" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="858" y="622" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="858" dy="0">sampling_params built once · MUTATED</tspan><tspan x="858" dy="17.36">in place</tspan><tspan x="858" dy="17.36">output_kind = DELTA if stream else</tspan><tspan x="858" dy="17.36">FINAL_ONLY</tspan></text><text x="540" y="701.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">_generate_with_builtin_tools is a while True loop where one HTTP call drives N sequential engine requests:</tspan><tspan x="540" dy="17.36">generate → append_output → need_builtin_tool_call()? → call_tool → re-render → shrink max_tokens and</tspan><tspan x="540" dy="17.36">decrement priority — all dispatched through a ConversationContext ABC sharing one mutated SamplingParams.</tspan></text>
</svg>
