="#27323a"><tspan x="795" dy="0">engine_core.add_request  (client)</tspan></text><path d="M 795 222 L 795.0 245.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 795 252 L 790.6 241.0 L 799.4 241.0 z" fill="#30363d"/><rect class="rough" x="560" y="252" width="470" height="32" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="795" y="272.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="795" dy="0">serialize → ZMQ frame ADD  ·  if multiprocess</tspan></text><path d="M 795 284 L 795.0 307.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 795 314 L 790.6 303.0 L 799.4 303.0 z" fill="#30363d"/><rect class="rough" x="560" y="314" width="470" height="32" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="795" y="334.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="795" dy="0">preprocess_add_request  ·  EngineCoreRequest → Request</tspan></text><path d="M 795 346 L 795.0 369.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 795 376 L 790.6 365.0 L 799.4 365.0 z" fill="#30363d"/><rect class="rough" x="560" y="376" width="470" height="32" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="795" y="396.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="795" dy="0">EngineCore.add_request  ·  validate · delegate</tspan></text><path d="M 795 408 L 795.0 431.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 795 438 L 790.6 427.0 L 799.4 427.0 z" fill="#30363d"/><rect class="rough" x="560" y="438" width="470" height="32" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="795" y="458.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="795" dy="0">scheduler.add_request → Waiting queue</tspan></text><text x="795" y="503.78" text-anchor="middle" font-size="10.5" font-weight="500" fill="#66717a"><tspan x="795" dy="0">wire struct becomes a scheduler-owned Request — block-hashed, grammar-initialized</tspan></text><text x="540" y="555.44" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">add_request registers on two sides — OutputProcessor (return) before EngineCore→Scheduler (forward) — serializing over ZMQ</tspan><tspan x="540" dy="14.879999999999999">only in multiprocess mode; the EngineCoreRequest→Request conversion marks the crossing into scheduler ownership, and n&gt;1 fans</tspan><tspan x="540" dy="14.879999999999999">into children under one ParentRequest.</tspan></text>
