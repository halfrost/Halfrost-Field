<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="682" viewBox="0 0 1080 682" role="img" aria-label="make_client: A Truth Table over (multiprocess, asyncio)">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="682" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">make_client: A Truth Table over (multiprocess, asyncio)</tspan></text>
<rect class="rough" x="284" y="116" width="364" height="48" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="466" y="145.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="466" dy="0">multiprocess_mode = False</tspan></text><rect class="rough" x="662" y="116" width="364" height="48" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="844" y="145.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="844" dy="0">multiprocess_mode = True</tspan></text><rect class="rough" x="56" y="180" width="210" height="160" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="161" y="265.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="161" dy="0">asyncio_mode = False</tspan></text><rect class="rough" x="56" y="356" width="210" height="160" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="161" y="441.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="161" dy="0">asyncio_mode = True</tspan></text><rect class="rough" x="284" y="180" width="364" height="160" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="466" y="243.2" text-anchor="middle" font-size="20" font-weight="700" fill="#27323a"><tspan x="466" dy="0">InprocClient</tspan></text><text x="466" y="282.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="466" dy="0">in-process EngineCore · V0-style ·</tspan><tspan x="466" dy="17.36">add_request + step inline</tspan></text><rect class="rough" x="662" y="180" width="364" height="160" rx="12" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="844" y="243.2" text-anchor="middle" font-size="20" font-weight="700" fill="#27323a"><tspan x="844" dy="0">SyncMPClient</tspan></text><text x="844" y="282.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="844" dy="0">ZMQ + background proc · offline LLM</tspan><tspan x="844" dy="17.36">default</tspan></text><rect class="rough" x="284" y="356" width="364" height="160" rx="12" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="466" y="420.12" text-anchor="middle" font-size="17" font-weight="700" fill="#27323a"><tspan x="466" dy="0">raise NotImplementedError</tspan></text><text x="466" y="456.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="466" dy="0">asyncio without multiprocessing</tspan><tspan x="466" dy="17.36">unsupported</tspan></text><rect class="rough" x="662" y="356" width="364" height="160" rx="12" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="844" y="418.48" text-anchor="middle" font-size="18" font-weight="700" fill="#27323a"><tspan x="844" dy="0">make_async_mp_client</tspan></text><text x="844" y="458.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="844" dy="0">→ AsyncMPClient (+ DP variants) ·</tspan><tspan x="844" dy="17.36">online AsyncLLM</tspan></text><text x="540" y="541.04" text-anchor="middle" font-size="14" font-weight="600" fill="#c07a1a"><tspan x="540" dy="0">offline LLM reaches (mp=True, async=False) because VLLM_ENABLE_V1_MULTIPROCESSING defaults True</tspan></text><rect class="rough" x="56" y="556" width="974" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="543" y="574.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="543" dy="0">all three share the EngineCoreClient ABC — base bodies raise NotImplementedError; sync / async are</tspan><tspan x="543" dy="17.36">name-mirrored</tspan></text><text x="540" y="627.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">(F,F)→InprocClient, (T,F)→SyncMPClient (the offline default, since VLLM_ENABLE_V1_MULTIPROCESSING is True),</tspan><tspan x="540" dy="17.36">(T,T)→make_async_mp_client (AsyncMPClient + DP variants), and (F,T) is rejected — all sharing the</tspan><tspan x="540" dy="17.36">EngineCoreClient ABC whose base bodies raise NotImplementedError.</tspan></text>
</svg>
