<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="706" viewBox="0 0 1080 706" role="img" aria-label="The Unified Counter Model: Scheduling Closes One Gap">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="706" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">The Unified Counter Model: Scheduling Closes One Gap</tspan></text>
<text x="540" y="113.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">0  →  num_tokens_with_spec = len(prompt_token_ids) + len(output_token_ids) + len(spec_token_ids)</tspan></text><rect x="260" y="126" width="18" height="18" rx="4" fill="#b8d8ff" stroke="#30363d" stroke-width="1.2"/><text x="286" y="140.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="286" dy="0">num_computed_tokens (KV filled)</tspan></text><text x="620" y="140.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="620" dy="0">gap this step grants</tspan></text><rect class="rough" x="56" y="168" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="199.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">a · fresh prompt</tspan></text><rect class="rough" x="260" y="180" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><path d="M 260 174 L 260 168 L 760 168 L 760 174" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 260 176 L 260 212" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="190.35999999999999" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="776" dy="0">computed = 0, big gap → looks</tspan><tspan x="776" dy="17.36">like large token demand</tspan></text><rect class="rough" x="56" y="242" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="273.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">b · chunked prefill</tspan></text><rect class="rough" x="260" y="254" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="260" y="254" width="175" height="28" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="1.6"/><path d="M 435 248 L 435 242 L 760 242 L 760 248" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 435 250 L 435 286" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="264.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="776" dy="0">grant &lt; gap → computed advances</tspan><tspan x="776" dy="17.36">partway (no special code path)</tspan></text><rect class="rough" x="56" y="316" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="347.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">c · decode</tspan></text><rect class="rough" x="260" y="328" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="260" y="328" width="450" height="28" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="1.6"/><path d="M 710 322 L 710 316 L 760 316 L 760 322" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 710 324 L 710 360" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="347.04" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="776" dy="0">gap = 1 → grant 1</tspan></text><rect class="rough" x="56" y="390" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="412.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">d · prefix-cache</tspan><tspan x="148.5" dy="17.36">hit</tspan></text><rect class="rough" x="260" y="402" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="260" y="402" width="340" height="28" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="1.6"/><path d="M 600 396 L 600 390 L 760 390 L 760 396" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 600 398 L 600 434" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="412.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="776" dy="0">computed jumps forward by reused</tspan><tspan x="776" dy="17.36">blocks — effective gap shrinks</tspan></text><rect class="rough" x="56" y="464" width="185" height="52" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="148.5" y="495.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="148.5" dy="0">e · speculation</tspan></text><rect class="rough" x="260" y="476" width="500" height="28" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="260" y="476" width="250" height="28" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="650" y="476" width="109.99999999999999" height="28" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="1.6"/><path d="M 510 470 L 510 464 L 650 464 L 650 470" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M 510 472 L 510 508" fill="none" stroke="#30363d" stroke-width="1.6"/><text x="776" y="486.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="776" dy="0">num_tokens_with_spec raised by</tspan><tspan x="776" dy="17.36">draft tokens to verify</tspan></text><rect class="rough" x="56" y="542" width="968" height="34" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="540" y="564.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">scheduling priority: RUNNING decodes drained first against token_budget, then waiting prefills into leftover</tspan></text><rect class="rough" x="56" y="590" width="968" height="34" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="612.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">invariant: the request path branches on &quot;how many tokens,&quot; never &quot;prefill vs decode&quot;</tspan></text><text x="540" y="651.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">Scheduling closes the gap between num_computed_tokens (KV filled) and num_tokens_with_spec by granting some</tspan><tspan x="540" dy="17.36">tokens this step — fresh prompt, chunked prefill, one-token decode, prefix-cache jump, and speculative draft</tspan><tspan x="540" dy="17.36">tokens are all the same gap-closing operation, so the request path branches only on how many tokens.</tspan></text>
</svg>
