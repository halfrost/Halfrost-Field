</defs>
<rect width="1080" height="600" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">LLM.generate() Just Drives add_request / step</tspan></text>
<rect class="rough" x="44" y="108" width="552" height="112" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="66" y="142.12" text-anchor="start" font-size="17" font-weight="800" fill="#27323a"><tspan x="66" dy="0">LLM façade  ·  entrypoints/llm.py</tspan></text><text x="66" y="159.75" text-anchor="start" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="66" dy="0">public generate / chat / enqueue — validate · fill defaults ·</tspan><tspan x="66" dy="15.5">orchestrate</tspan></text><rect class="rough" x="66" y="180" width="508" height="26" rx="13" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="320" y="197.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="320" dy="0">invariant: no scheduling / memory / execution logic</tspan></text><path d="M 134 220 L 134.0 229.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 134 236 L 129.6 225.0 L 138.4 225.0 z" fill="#30363d"/><rect class="rough" x="44" y="236" width="552" height="112" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="66" y="270.12" text-anchor="start" font-size="17" font-weight="800" fill="#27323a"><tspan x="66" dy="0">OfflineInferenceMixin  ·  offline_utils.py</tspan></text><text x="66" y="295.5" text-anchor="start" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="66" dy="0">the render → add → drain spine</tspan></text><rect class="rough" x="66" y="308" width="508" height="26" rx="13" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="320" y="325.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="320" dy="0">invariant: FINAL_ONLY · batch-atomic admit · order-restoring sort</tspan></text><path d="M 134 348 L 134.0 357.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 134 364 L 129.6 353.0 L 138.4 353.0 z" fill="#30363d"/><rect class="rough" x="44" y="364" width="552" height="112" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="66" y="398.12" text-anchor="start" font-size="17" font-weight="800" fill="#27323a"><tspan x="66" dy="0">single LLMEngine handle</tspan></text><text x="66" y="423.5" text-anchor="start" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="66" dy="0">one polymorphic EngineCoreClient</tspan></text><rect class="rough" x="66" y="436" width="508" height="26" rx="13" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="320" y="453.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="320" dy="0">invariant: transport fixed once at construction</tspan></text><text x="836" y="109.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="836" dy="0">orchestrates only the add_request / step API</tspan></text><rect class="rough" x="636" y="124" width="400" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="836" y="149.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="836" dy="0">validate · default params · mint request_id</tspan></text><path d="M 836 166 L 836.0 181.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 188 L 831.6 177.0 L 840.4 177.0 z" fill="#30363d"/><rect class="rough" x="636" y="188" width="400" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="836" y="213.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="836" dy="0">render inputs → build EngineCoreRequest</tspan></text><path d="M 836 230 L 836.0 245.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 252 L 831.6 241.0 L 840.4 241.0 z" fill="#30363d"/><rect class="rough" x="636" y="252" width="400" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="836" y="277.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="836" dy="0">add_request(s) → engine</tspan></text><path d="M 836 294 L 836.0 309.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 316 L 831.6 305.0 L 840.4 305.0 z" fill="#30363d"/><rect class="rough" x="636" y="316" width="400" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="836" y="341.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="836" dy="0">_run_engine: step() until all done</tspan></text><path d="M 836 358 L 836.0 373.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 380 L 831.6 369.0 L 840.4 369.0 z" fill="#30363d"/><rect class="rough" x="636" y="380" width="400" height="42" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="836" y="405.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="836" dy="0">collect finished RequestOutputs</tspan></text><path d="M 836 422 L 836.0 437.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 444 L 831.6 433.0 L 840.4 433.0 z" fill="#30363d"/><rect class="rough" x="636" y="444" width="400" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="836" y="469.86" text-anchor="middle" font-size="13.5" font-weight="600" fill="#27323a"><tspan x="836" dy="0">restore input order (sort by id)</tspan></text><path d="M 600 288 L 625.7 276.0" fill="none" stroke="#66717a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 632 273 L 623.9 281.7 L 620.2 273.7 z" fill="#66717a"/><text x="836" y="512.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#66717a"><tspan x="836" dy="0">the same add_request / step the engine already exposes — the stack just drives it</tspan></text><text x="540" y="562.62" text-anchor="middle" font-size="13" font-weight="500" fill="#66717a"><tspan x="540" dy="0">generate() validates, defaults, and mints ids, then drives the engine's own add_request / step loop and restores input</tspan><tspan x="540" dy="16.12">order — every layer protects one invariant, and none of them schedule, allocate, or run a kernel.</tspan></text>
</svg>
