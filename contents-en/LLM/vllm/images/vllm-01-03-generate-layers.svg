<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">LLM.generate() Just Drives add_request / step</tspan></text>
<rect class="rough" x="44" y="108" width="552" height="132" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="66" y="144.12" text-anchor="start" font-size="17" font-weight="800" fill="#27323a"><tspan x="66" dy="0">LLM façade  ·  entrypoints/llm.py</tspan></text><text x="66" y="162.35999999999999" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="66" dy="0">public generate / chat / enqueue — validate · fill</tspan><tspan x="66" dy="17.36">defaults · orchestrate</tspan></text><rect class="rough" x="66" y="190" width="508" height="44" rx="22" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="320" y="217.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="320" dy="0">invariant: no scheduling / memory / execution logic</tspan></text><path d="M 134 240 L 134.0 249.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 134 256 L 129.6 245.0 L 138.4 245.0 z" fill="#30363d"/><rect class="rough" x="44" y="256" width="552" height="132" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="66" y="292.12" text-anchor="start" font-size="17" font-weight="800" fill="#27323a"><tspan x="66" dy="0">OfflineInferenceMixin  ·  offline_utils.py</tspan></text><text x="66" y="319.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="66" dy="0">the render → add → drain spine</tspan></text><rect class="rough" x="66" y="338" width="508" height="44" rx="22" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="320" y="356.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="320" dy="0">invariant: FINAL_ONLY · batch-atomic admit ·</tspan><tspan x="320" dy="17.36">order-restoring sort</tspan></text><path d="M 134 388 L 134.0 397.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 134 404 L 129.6 393.0 L 138.4 393.0 z" fill="#30363d"/><rect class="rough" x="44" y="404" width="552" height="132" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="66" y="440.12" text-anchor="start" font-size="17" font-weight="800" fill="#27323a"><tspan x="66" dy="0">single LLMEngine handle</tspan></text><text x="66" y="467.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="66" dy="0">one polymorphic EngineCoreClient</tspan></text><rect class="rough" x="66" y="486" width="508" height="44" rx="22" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="320" y="513.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="320" dy="0">invariant: transport fixed once at construction</tspan></text><text x="836" y="109.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="836" dy="0">orchestrates only the add_request / step API</tspan></text><rect class="rough" x="636" y="124" width="400" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="836" y="150.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">validate · default params · mint request_id</tspan></text><path d="M 836 166 L 836.0 181.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 188 L 831.6 177.0 L 840.4 177.0 z" fill="#30363d"/><rect class="rough" x="636" y="188" width="400" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="836" y="214.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">render inputs → build EngineCoreRequest</tspan></text><path d="M 836 230 L 836.0 245.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 252 L 831.6 241.0 L 840.4 241.0 z" fill="#30363d"/><rect class="rough" x="636" y="252" width="400" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="836" y="278.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">add_request(s) → engine</tspan></text><path d="M 836 294 L 836.0 309.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 316 L 831.6 305.0 L 840.4 305.0 z" fill="#30363d"/><rect class="rough" x="636" y="316" width="400" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="836" y="342.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">_run_engine: step() until all done</tspan></text><path d="M 836 358 L 836.0 373.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 380 L 831.6 369.0 L 840.4 369.0 z" fill="#30363d"/><rect class="rough" x="636" y="380" width="400" height="42" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="836" y="406.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">collect finished RequestOutputs</tspan></text><path d="M 836 422 L 836.0 437.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 836 444 L 831.6 433.0 L 840.4 433.0 z" fill="#30363d"/><rect class="rough" x="636" y="444" width="400" height="42" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="836" y="470.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="836" dy="0">restore input order (sort by id)</tspan></text><path d="M 600 312 L 627.6 278.4" fill="none" stroke="#66717a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 632 273 L 628.4 284.3 L 621.6 278.7 z" fill="#66717a"/><text x="836" y="504.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="836" dy="0">the same add_request / step the engine already</tspan><tspan x="836" dy="17.36">exposes — the stack just drives it</tspan></text><text x="540" y="553.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">generate() validates, defaults, and mints ids, then drives the engine's own add_request / step loop and</tspan><tspan x="540" dy="17.36">restores input order — every layer protects one invariant, and none of them schedule, allocate, or run a</tspan><tspan x="540" dy="17.36">kernel.</tspan></text>
</svg>
