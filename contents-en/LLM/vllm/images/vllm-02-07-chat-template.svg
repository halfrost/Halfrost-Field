<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Serving Chat: Template In, Tool Calls Out</tspan></text>
<rect class="rough" x="44" y="104" width="336" height="52" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="212" y="126.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">ChatCompletionRequest</tspan><tspan x="212" dy="17.36">messages[] · tools · tool_choice</tspan></text><rect class="rough" x="44" y="184" width="336" height="46" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="212" y="203.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">tool-choice legality</tspan><tspan x="212" dy="17.36">tool_parsing_unavailable → 400</tspan></text><rect class="rough" x="44" y="258" width="336" height="46" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="212" y="277.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">untrusted template gate</tspan><tspan x="212" dy="17.36">--trust-request-chat-template</tspan></text><rect class="rough" x="44" y="332" width="336" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="212" y="350.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">chat template → (conversation,</tspan><tspan x="212" dy="17.36">prompt) → token ids</tspan></text><rect class="rough" x="44" y="392" width="100" height="26" rx="13" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="94" y="410.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="94" dy="0">HF Jinja</tspan></text><rect class="rough" x="162" y="392" width="100" height="26" rx="13" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="212" y="410.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">Harmony</tspan></text><rect class="rough" x="280" y="392" width="100" height="26" rx="13" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="330" y="410.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="330" dy="0">Mistral</tspan></text><rect class="rough" x="44" y="438" width="336" height="80" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="212" y="457" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">adjust_request · install tool</tspan><tspan x="212" dy="17.36">grammar</tspan><tspan x="212" dy="17.36">skip if tool_choice=none ·</tspan><tspan x="212" dy="17.36">reasoning_ended primed</tspan></text><path d="M 212 156 L 212.0 177.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 212 184 L 207.6 173.0 L 216.4 173.0 z" fill="#30363d"/><path d="M 212 230 L 212.0 251.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 212 258 L 207.6 247.0 L 216.4 247.0 z" fill="#30363d"/><path d="M 212 304 L 212.0 325.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 212 332 L 207.6 321.0 L 216.4 321.0 z" fill="#30363d"/><path d="M 212 418 L 212.0 431.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 212 438 L 207.6 427.0 L 216.4 427.0 z" fill="#30363d"/><rect class="rough" x="410" y="214" width="250" height="64" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="535" y="233.67999999999998" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="535" dy="0">engine_client.generate</tspan><tspan x="535" dy="17.36">assert 1 generator · n →</tspan><tspan x="535" dy="17.36">output.index</tspan></text><rect class="rough" x="410" y="300" width="250" height="64" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="535" y="319.68" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="535" dy="0">one engine request</tspan><tspan x="535" dy="17.36">EngineCoreRequest →</tspan><tspan x="535" dy="17.36">EngineCore</tspan></text><rect class="rough" x="410" y="386" width="250" height="66" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="535" y="406.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="535" dy="0">reasoning_ended hint</tspan><tspan x="535" dy="17.36">injected · grammar applies</tspan><tspan x="535" dy="17.36">only post-&lt;think&gt;</tspan></text><path d="M 535 278 L 535.0 293.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 535 300 L 530.6 289.0 L 539.4 289.0 z" fill="#30363d"/><path d="M 535 364 L 535.0 379.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 535 386 L 530.6 375.0 L 539.4 375.0 z" fill="#30363d"/><path d="M 380 460 L 409.0 252.9" fill="none" stroke="#66717a" stroke-width="1.7" stroke-dasharray="8 7"/><path d="M 410 246 L 412.8 257.5 L 404.1 256.3 z" fill="#66717a"/><rect class="rough" x="706" y="104" width="330" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="871" y="131.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">model raw text (streamed)</tspan></text><rect class="rough" x="706" y="176" width="330" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="871" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">DelegatingParser.parse_delta</tspan></text><rect class="rough" x="706" y="248" width="330" height="44" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="871" y="275.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">reasoning phase (until &lt;/think&gt;)</tspan></text><rect class="rough" x="706" y="320" width="330" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="871" y="338.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">tool-call phase · named / required</tspan><tspan x="871" dy="17.36">/ auto</tspan></text><rect class="rough" x="706" y="392" width="330" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="871" y="410.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">reasoning · content · tool_calls</tspan><tspan x="871" dy="17.36">deltas</tspan></text><rect class="rough" x="706" y="456" width="330" height="62" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="871" y="483.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="871" dy="0">finish_reason = tool_calls</tspan><tspan x="871" dy="17.36">(auto/required) · stop (named)</tspan></text><path d="M 871 148 L 871.0 169.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 871 176 L 866.6 165.0 L 875.4 165.0 z" fill="#30363d"/><path d="M 871 220 L 871.0 241.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 871 248 L 866.6 237.0 L 875.4 237.0 z" fill="#30363d"/><path d="M 871 292 L 871.0 313.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 871 320 L 866.6 309.0 L 875.4 309.0 z" fill="#30363d"/><path d="M 871 364 L 871.0 385.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 871 392 L 866.6 381.0 L 875.4 381.0 z" fill="#30363d"/><path d="M 871 436 L 871.0 449.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 871 456 L 866.6 445.0 L 875.4 445.0 z" fill="#30363d"/><path d="M 660 320 L 704.4 132.8" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 706 126 L 707.7 137.7 L 699.2 135.7 z" fill="#30363d"/><text x="871" y="541.04" text-anchor="middle" font-size="14" font-weight="700" fill="#c07a1a"><tspan x="871" dy="0">reasoning strictly precedes tools</tspan></text><text x="540" y="553.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">Chat is one engine request: the renderer runs the chat template (HF Jinja / Harmony / Mistral) behind two</tspan><tspan x="540" dy="17.36">gates — tool-choice legality and template trust — installs a tool grammar, and primes a reasoning boundary;</tspan><tspan x="540" dy="17.36">on the way out the parser re-segments raw text into reasoning, content, and tool-call deltas.</tspan></text>
</svg>
