<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="686" viewBox="0 0 1080 686" role="img" aria-label="The Online Return Path: Two Asyncio-Decoupled Boundaries">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="686" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">The Online Return Path: Two Asyncio-Decoupled Boundaries</tspan></text>
<rect x="56" y="104" width="316" height="260" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="74" y="133.4" text-anchor="start" font-size="15" font-weight="700" fill="#66717a"><tspan x="74" dy="0">Boundary A  ·  background task</tspan></text><text x="72" y="167.04" text-anchor="start" font-size="14" font-weight="700" fill="#27323a"><tspan x="72" dy="0">owns the ZMQ output socket</tspan></text><text x="72" y="193" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="72" dy="0">decodes each frame →</tspan><tspan x="72" dy="17.36">EngineCoreOutputs batch (one per</tspan><tspan x="72" dy="17.36">engine step; requests that</tspan><tspan x="72" dy="17.36">produced output that step)</tspan></text><text x="72" y="279.68" text-anchor="start" font-size="14" font-weight="700" fill="#3a7d44"><tspan x="72" dy="0">pushes onto</tspan><tspan x="72" dy="17.36">AsyncMPClient.outputs_queue </tspan><tspan x="72" dy="17.36">(asyncio.Queue)</tspan></text><rect x="388" y="104" width="316" height="260" rx="16" fill="#dfeeff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="406" y="133.04" text-anchor="start" font-size="14" font-weight="700" fill="#66717a"><tspan x="406" dy="0">Boundary B · output_handler task</tspan></text><text x="404" y="167.04" text-anchor="start" font-size="14" font-weight="700" fill="#27323a"><tspan x="404" dy="0">awaits outputs_queue</tspan></text><text x="404" y="201.67999999999998" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="404" dy="0">runs</tspan><tspan x="404" dy="17.36">OutputProcessor.process_outputs </tspan><tspan x="404" dy="17.36">(the one batch loop)</tspan></text><text x="404" y="288.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="404" dy="0">dispatches each RequestOutput</tspan><tspan x="404" dy="17.36">via req_state.queue.put(...)</tspan></text><rect x="720" y="104" width="316" height="260" rx="16" fill="#fff0d8" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="738" y="133.04" text-anchor="start" font-size="14" font-weight="700" fill="#66717a"><tspan x="738" dy="0">RequestOutputCollector (per req)</tspan></text><rect class="rough" x="736" y="152" width="284" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="878" y="177.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="878" dy="0">single slot + asyncio.Event</tspan></text><text x="736" y="216.35999999999999" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="736" dy="0">put() installs if empty</tspan><tspan x="736" dy="17.36">(Exception always wins the slot)</tspan></text><text x="736" y="275" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="736" dy="0">else self.output.add(output,</tspan><tspan x="736" dy="17.36">aggregate=self.aggregate) —</tspan><tspan x="736" dy="17.36">DELTA concatenates, else</tspan><tspan x="736" dy="17.36">replace; OR-fold finished</tspan></text><path d="M 372 234 L 381.0 234.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 388 234 L 377.0 238.4 L 377.0 229.6 z" fill="#30363d"/><path d="M 704 234 L 713.0 234.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 720 234 L 709.0 238.4 L 709.0 229.6 z" fill="#30363d"/><rect class="rough" x="240" y="404" width="600" height="44" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="431.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="540" dy="0">generate() consumer</tspan></text><rect class="rough" x="56" y="464" width="468" height="56" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="290" y="497.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="290" dy="0">out = q.get_nowait() or await q.get()</tspan></text><rect class="rough" x="556" y="464" width="468" height="56" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="790" y="488.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="790" dy="0">finished = out.finished; filter STREAM_FINISHED;</tspan><tspan x="790" dy="17.36">yield out</tspan></text><path d="M 880 364 L 706.8 402.5" fill="none" stroke="#66717a" stroke-width="1.8" stroke-dasharray="8 7"/><path d="M 700 404 L 709.8 397.3 L 711.7 405.9 z" fill="#66717a"/><rect class="rough" x="56" y="540" width="968" height="62" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="558.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">invariant: ≤ 1 pending output per request (O(1) memory under a slow client); coalescing preserves logical</tspan><tspan x="540" dy="17.36">content, merging event boundaries (DELTA gets every token once, in order)</tspan><tspan x="540" dy="17.36">terminates on a finished output; cancel → abort(internal=True) both sides + q.close()</tspan></text><text x="540" y="623" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">Boundary A decodes ZMQ frames into EngineCoreOutputs onto outputs_queue; Boundary B runs one output_handler</tspan><tspan x="540" dy="17.36">that dispatches each result into a per-request single-slot coalescing RequestOutputCollector, which</tspan><tspan x="540" dy="17.36">generate() drains with q.get_nowait() or await q.get() — at most one pending output per request; coalescing</tspan><tspan x="540" dy="17.36">preserves logical content while merging event boundaries.</tspan></text>
</svg>
