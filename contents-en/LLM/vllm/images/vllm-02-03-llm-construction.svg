<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="704" viewBox="0 0 1080 704" role="img" aria-label="Constructing LLM: kwargs → EngineArgs → VllmConfig → Live Engine">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="704" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="52.64" text-anchor="start" font-size="24" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Constructing LLM: kwargs → EngineArgs → VllmConfig → Live Engine</tspan></text>
<rect class="rough" x="44" y="104" width="214" height="68" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="151" y="130.76" text-anchor="middle" font-size="16" font-weight="700" fill="#27323a"><tspan x="151" dy="0">kwargs</tspan></text><text x="151" y="158.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="151" dy="0">massaged in place</tspan></text><path d="M 258 138 L 285.0 138.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 292 138 L 281.0 142.4 L 281.0 133.6 z" fill="#30363d"/><rect class="rough" x="292" y="104" width="214" height="68" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="399" y="130.76" text-anchor="middle" font-size="16" font-weight="700" fill="#27323a"><tspan x="399" dy="0">EngineArgs</tspan></text><text x="399" y="158.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="399" dy="0">one dataclass</tspan></text><path d="M 506 138 L 533.0 138.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 138 L 529.0 142.4 L 529.0 133.6 z" fill="#30363d"/><rect class="rough" x="540" y="104" width="214" height="68" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="647" y="130.76" text-anchor="middle" font-size="16" font-weight="700" fill="#27323a"><tspan x="647" dy="0">VllmConfig</tspan></text><text x="647" y="149.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="647" dy="0">create_engine_config ·</tspan><tspan x="647" dy="17.36">validated</tspan></text><path d="M 754 138 L 781.0 138.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 788 138 L 777.0 142.4 L 777.0 133.6 z" fill="#30363d"/><rect class="rough" x="788" y="104" width="214" height="68" rx="12" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="895" y="130.76" text-anchor="middle" font-size="16" font-weight="700" fill="#27323a"><tspan x="895" dy="0">LLMEngine</tspan></text><text x="895" y="158.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="895" dy="0">from_engine_args</tspan></text><path d="M 895 172 L 895.0 185.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 895 192 L 890.6 181.0 L 899.4 181.0 z" fill="#30363d"/><rect x="400" y="192" width="654" height="262" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="418" y="221.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="418" dy="0">a live engine handle · LLMEngine.__init__ (sync construction)</tspan></text><rect class="rough" x="416" y="240" width="622" height="28" rx="14" fill="#b9dfc3" stroke="#30363d" stroke-width="1.8"/><text x="727" y="259.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="727" dy="0">returns only when model loaded · KV cache allocated · scheduler ready</tspan></text><rect class="rough" x="416" y="284" width="304" height="70" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="568" y="310.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="568" dy="0">renderer</tspan></text><text x="568" y="340.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="568" dy="0">tokenizer + prompt/chat render</tspan></text><rect class="rough" x="734" y="284" width="304" height="70" rx="12" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="886" y="310.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="886" dy="0">input_processor</tspan></text><text x="886" y="340.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="886" dy="0">→ EngineCoreRequest</tspan></text><rect class="rough" x="416" y="368" width="304" height="70" rx="12" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="568" y="394.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="568" dy="0">output_processor</tspan></text><text x="568" y="424.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="568" dy="0">→ RequestOutput</tspan></text><rect class="rough" x="734" y="368" width="304" height="70" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="886" y="394.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="886" dy="0">EngineCore client</tspan></text><text x="886" y="415.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="886" dy="0">asyncio_mode=False · default</tspan><tspan x="886" dy="17.36">multiprocess SyncMPClient</tspan></text><rect x="44" y="192" width="336" height="256" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="62" y="221.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="62" dy="0">cached handles (Stage 3)</tspan></text><rect class="rough" x="60" y="248" width="304" height="26" rx="13" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="212" y="266.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">request_counter (seq ids)</tspan></text><rect class="rough" x="60" y="288" width="304" height="26" rx="13" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="212" y="306.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">supported_tasks</tspan></text><rect class="rough" x="60" y="328" width="304" height="26" rx="13" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="212" y="346.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">renderer · input_processor</tspan></text><rect class="rough" x="60" y="368" width="304" height="26" rx="13" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="212" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">chat_template</tspan></text><rect class="rough" x="60" y="408" width="304" height="26" rx="13" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="212" y="426.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="212" dy="0">default_sampling_params (lazy)</tspan></text><path d="M 400 312 L 387.0 312.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 380 312 L 391.0 307.6 L 391.0 316.4 z" fill="#66717a"/><rect x="44" y="468" width="992" height="122" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="62" y="497.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="62" dy="0">offline request surface · pure dispatch (never builds config or engine)</tspan></text><rect class="rough" x="60" y="518" width="120" height="30" rx="15" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="120" y="538.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="120" dy="0">generate</tspan></text><rect class="rough" x="198" y="518" width="120" height="30" rx="15" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="258" y="538.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="258" dy="0">chat</tspan></text><rect class="rough" x="336" y="518" width="120" height="30" rx="15" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="396" y="538.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="396" dy="0">encode</tspan></text><rect class="rough" x="474" y="518" width="120" height="30" rx="15" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="534" y="538.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="534" dy="0">embed</tspan></text><rect class="rough" x="612" y="518" width="120" height="30" rx="15" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="672" y="538.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="672" dy="0">classify</tspan></text><rect class="rough" x="750" y="518" width="120" height="30" rx="15" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="810" y="538.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="810" dy="0">score</tspan></text><rect class="rough" x="888" y="518" width="120" height="30" rx="15" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="948" y="538.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="948" dy="0">beam_search</tspan></text><text x="540" y="573.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">request methods enqueue against a fully-built engine — lowering + validation already done</tspan></text><path d="M 212 454 L 212.0 461.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 212 468 L 207.6 457.0 L 216.4 457.0 z" fill="#66717a"/><text x="540" y="629.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">LLM.__init__ is a config-lowering funnel: it massages kwargs into EngineArgs, lowers them to a validated</tspan><tspan x="540" dy="17.36">VllmConfig, stands up a live LLMEngine whose default EngineCore client is a multiprocess SyncMPClient, then</tspan><tspan x="540" dy="17.36">caches the fixed handles every request method assumes.</tspan></text>
</svg>
