<rect class="rough" x="44" y="190" width="224" height="128" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="156" y="219.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="156" dy="0">EngineCoreOutput</tspan></text><text x="156" y="239.88" text-anchor="middle" font-size="11.5" font-weight="500" fill="#27323a"><tspan x="156" dy="0">request_id</tspan><tspan x="156" dy="14.26">new_token_ids [ list ]</tspan><tspan x="156" dy="14.26">finish_reason</tspan></text><text x="156" y="303.96" text-anchor="middle" font-size="11" font-weight="700" fill="#66717a"><tspan x="156" dy="0">token IDs — no text</tspan></text><rect x="308" y="120" width="384" height="384" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="326" y="139.84" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="326" dy="0">OutputProcessor · process_outputs</tspan><tspan x="326" dy="19.84">(the one loop over the batch)</tspan></text><rect class="rough" x="324" y="180" width="352" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="500" y="206.14" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="500" dy="0">lookup RequestState  ·  missing → drop</tspan></text><path d="M 500 224 L 500.0 235.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 500 242 L 495.6 231.0 L 504.4 231.0 z" fill="#30363d"/><rect class="rough" x="324" y="242" width="352" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="500" y="268.14" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="500" dy="0">incremental detokenizer  ·  IDs → text</tspan></text><path d="M 500 286 L 500.0 297.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 500 304 L 495.6 293.0 L 504.4 293.0 z" fill="#30363d"/><rect class="rough" x="324" y="304" width="352" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="500" y="330.14" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="500" dy="0">stop-string check  ·  min_tokens gate</tspan></text><path d="M 500 348 L 500.0 359.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 500 366 L 495.6 355.0 L 504.4 355.0 z" fill="#30363d"/><rect class="rough" x="324" y="366" width="352" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="500" y="385.01" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="500" dy="0">output-kind gate: FINAL_ONLY / DELTA /</tspan><tspan x="500" dy="14.26">CUMULATIVE</tspan></text><path d="M 500 410 L 500.0 421.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 500 428 L 495.6 417.0 L 504.4 417.0 z" fill="#30363d"/><rect class="rough" x="324" y="428" width="352" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="500" y="454.14" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="500" dy="0">materialize RequestOutput  ·  external id</tspan></text><path d="M 268 254 L 303.4 294.7" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 308 300 L 297.5 294.6 L 304.1 288.8 z" fill="#30363d"/><text x="883" y="154.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#66717a"><tspan x="883" dy="0">queue is not None ?</tspan></text><rect class="rough" x="730" y="196" width="306" height="92" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="883" y="229.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="883" dy="0">async mailbox → generate()</tspan></text><text x="883" y="265.96" text-anchor="middle" font-size="11" font-weight="500" fill="#66717a"><tspan x="883" dy="0">streaming · DELTA per step</tspan></text><rect class="rough" x="730" y="320" width="306" height="92" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="883" y="353.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="883" dy="0">sync list → drain + sort</tspan></text><text x="883" y="389.96" text-anchor="middle" font-size="11" font-weight="500" fill="#66717a"><tspan x="883" dy="0">offline · FINAL_ONLY, once</tspan></text><path d="M 692 300 L 726.2 247.9" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 730 242 L 727.7 253.6 L 720.3 248.8 z" fill="#30363d"/><path d="M 692 340 L 724.2 362.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 730 366 L 718.4 363.4 L 723.4 356.2 z" fill="#30363d"/><rect class="rough" x="44" y="420" width="250" height="74" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="169" y="446.68" text-anchor="middle" font-size="13" font-weight="800" fill="#27323a"><tspan x="169" dy="0">reqs_to_abort</tspan></text><text x="169" y="467.27" text-anchor="middle" font-size="10.5" font-weight="500" fill="#66717a"><tspan x="169" dy="0">promotes finish · aborts on the</tspan><tspan x="169" dy="13.02">next step</tspan></text><path d="M 324 318 L 244.4 414.6" fill="none" stroke="#c0524a" stroke-width="2.2" stroke-dasharray="8 7"/><path d="M 240 420 L 243.6 408.7 L 250.4 414.3 z" fill="#c0524a"/><text x="540" y="555.44" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">One process_outputs loop turns each EngineCoreOutput's token ids into text — detokenize, stop-check, output-kind gate — and</tspan><tspan x="540" dy="14.879999999999999">materializes a RequestOutput under the external id; a single queue-is-not-None fork routes it to the streaming mailbox or the</tspan><tspan x="540" dy="14.879999999999999">offline list, and stop strings flow back via reqs_to_abort.</tspan></text>
</svg>
