<rect class="rough" x="44" y="104" width="186" height="66" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="137" y="130.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="137" dy="0">generate</tspan></text><text x="137" y="147.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="137" dy="0">runner guard →</tspan><tspan x="137" dy="17.36">renderer</tspan></text><rect class="rough" x="244" y="104" width="186" height="66" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="337" y="130.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="337" dy="0">chat</tspan></text><text x="337" y="147.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="337" dy="0">chat template →</tspan><tspan x="337" dy="17.36">renderer</tspan></text><rect class="rough" x="444" y="104" width="186" height="66" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="537" y="130.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="537" dy="0">encode · embed</tspan></text><text x="537" y="147.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="537" dy="0">pooling IO</tspan><tspan x="537" dy="17.36">processor</tspan></text><rect class="rough" x="644" y="104" width="186" height="66" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="737" y="130.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="737" dy="0">classify · score</tspan></text><text x="737" y="156.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="737" dy="0">cross-encoder IO</tspan></text><rect class="rough" x="844" y="104" width="186" height="66" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="937" y="130.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="937" dy="0">beam_search</tspan></text><text x="937" y="147.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="937" dy="0">Python driver · 1</tspan><tspan x="937" dy="17.36">tok/step</tspan></text><path d="M 137 170 L 174.0 192.4" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 180 196 L 168.3 194.1 L 172.9 186.5 z" fill="#66717a"/><path d="M 337 170 L 337.0 189.0" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 337 196 L 332.6 185.0 L 341.4 185.0 z" fill="#66717a"/><path d="M 537 170 L 537.0 189.0" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 537 196 L 532.6 185.0 L 541.4 185.0 z" fill="#66717a"/><path d="M 737 170 L 737.0 189.0" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 737 196 L 732.6 185.0 L 741.4 185.0 z" fill="#66717a"/><path d="M 937 170 L 905.7 192.0" fill="none" stroke="#66717a" stroke-width="1.7"/><path d="M 900 196 L 906.5 186.1 L 911.5 193.3 z" fill="#66717a"/><rect class="rough" x="160" y="196" width="760" height="40" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="540" y="221.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">_render_and_add_requests · lazy prompts · atomic abort-on-error</tspan></text><rect class="rough" x="160" y="264" width="760" height="56" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="540" y="288.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">_add_request — the single choke point</tspan><tspan x="540" dy="17.36">FINAL_ONLY (sampling) · request_id = str(next(counter))</tspan></text><rect class="rough" x="160" y="348" width="760" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="366.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">llm_engine.add_request → input_processor.process_inputs → EngineCoreRequest →</tspan><tspan x="540" dy="17.36">EngineCore</tspan></text><rect class="rough" x="220" y="420" width="640" height="48" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="449.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">_run_engine · blocking  while has_unfinished_requests(): step()</tspan></text><rect class="rough" x="260" y="496" width="560" height="40" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="540" y="521.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">sorted(outputs, key=request_id) → input order restored</tspan></text><path d="M 540 236 L 540.0 257.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 264 L 535.6 253.0 L 544.4 253.0 z" fill="#30363d"/><path d="M 540 320 L 540.0 341.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 348 L 535.6 337.0 L 544.4 337.0 z" fill="#30363d"/><path d="M 540 392 L 540.0 413.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 420 L 535.6 409.0 L 544.4 409.0 z" fill="#30363d"/><path d="M 540 468 L 540.0 489.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 496 L 535.6 485.0 L 544.4 485.0 z" fill="#30363d"/><text x="540" y="562.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">Four request surfaces plus a beam driver differ only in preprocessing and output type; all funnel through the</tspan><tspan x="540" dy="17.36">one _add_request choke point, then the shared blocking _run_engine drain and an order-restoring sort.</tspan></text>
