<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="696" viewBox="0 0 1080 696" role="img" aria-label="The Middleware Onion: add_middleware Prepends, Last Added Is Outermost">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="696" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="52.1" text-anchor="start" font-size="22.5" font-weight="800" fill="#27323a"><tspan x="54" dy="0">The Middleware Onion: add_middleware Prepends, Last Added Is Outermost</tspan></text>
<text x="324" y="105.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="324" dy="0">Starlette add_middleware prepends → the last-added layer is the outermost</tspan></text><rect class="rough" x="44" y="122" width="560" height="430" rx="20" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="324" y="142.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">user-supplied middleware (dotted-path import, :336-346)</tspan></text><rect class="rough" x="55" y="152" width="538" height="370" rx="18" fill="#dfeeff" stroke="#30363d" stroke-width="1.8"/><text x="324" y="172.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">ScalingMiddleware</tspan></text><rect class="rough" x="66" y="182" width="516" height="310" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.8"/><text x="324" y="202.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">XRequestIdMiddleware (if --enable-request-id-headers)</tspan></text><rect class="rough" x="77" y="212" width="494" height="250" rx="14" fill="#fff0d8" stroke="#30363d" stroke-width="1.8"/><text x="324" y="232.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">AuthenticationMiddleware (only if token list non-empty)</tspan></text><rect class="rough" x="88" y="242" width="472" height="190" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="324" y="262.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">CORSMiddleware (:279-285)</tspan></text><rect class="rough" x="99" y="272" width="450" height="130" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="1.8"/><text x="324" y="292.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="324" dy="0">Prometheus / ExceptionMiddleware</tspan></text><rect class="rough" x="110" y="302" width="428" height="70" rx="8" fill="#b9dfc3" stroke="#30363d" stroke-width="1.8"/><text x="324" y="342.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="324" dy="0">FastAPI routes</tspan></text><rect class="rough" x="636" y="122" width="400" height="230" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="652" y="151.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="652" dy="0">AuthenticationMiddleware.__call__</tspan></text><text x="652" y="182.92" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="652" dy="0">bypass if scope[&quot;type&quot;] not in (http,</tspan><tspan x="652" dy="17.36">websocket)</tspan><tspan x="652" dy="17.36">or method == OPTIONS</tspan><tspan x="652" dy="17.36">then url_path.startswith(GUARDED_PREFIX =</tspan><tspan x="652" dy="17.36">(&quot;/v1&quot;,&quot;/v2&quot;,&quot;/inference&quot;)) and not</tspan><tspan x="652" dy="17.36">verify_token → 401 JSON</tspan><tspan x="652" dy="17.36">verify_token: SHA-256 configured tokens</tspan><tspan x="652" dy="17.36">(once)</tspan><tspan x="652" dy="17.36">+ presented Bearer · OR-accumulate</tspan><tspan x="652" dy="17.36">secrets.compare_digest (constant-time)</tspan></text><rect class="rough" x="636" y="366" width="400" height="104" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="652" y="395.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="652" dy="0">open by design (no guarded prefix)</tspan></text><text x="652" y="424.68" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="652" dy="0">/health · /metrics · /load · /version ·</tspan><tspan x="652" dy="17.36">/tokenize · /ping</tspan><tspan x="652" dy="17.36">— but /v1/models IS guarded</tspan></text><rect class="rough" x="636" y="484" width="400" height="146" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="652" y="513.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="652" dy="0">4xx stays 4xx</tspan></text><text x="652" y="537.64" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="652" dy="0">explicit handlers for VLLMValidationError</tspan><tspan x="652" dy="17.36">/</tspan><tspan x="652" dy="17.36">ValueError / NotImplementedError keep 4xx</tspan><tspan x="652" dy="17.36">inside</tspan><tspan x="652" dy="17.36">ExceptionMiddleware (nested in Prometheus)</tspan><tspan x="652" dy="17.36">— avoids 5xx miscount</tspan></text><path d="M 636 220 L 517.0 231.3" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 510 232 L 520.5 226.6 L 521.4 235.3 z" fill="#66717a"/><text x="540" y="649.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">The ASGI middleware onion — Starlette add_middleware prepends, so the last-added layer is outermost.</tspan><tspan x="540" dy="17.36">AuthenticationMiddleware guards only GUARDED_PREFIX (/v1, /v2, /inference) with SHA-256 hashed,</tspan><tspan x="540" dy="17.36">secrets.compare_digest constant-time token checks, leaving /health, /metrics, /load open by design.</tspan></text>
</svg>
