<rect width="1080" height="600" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">vllm serve: From Console Script to uvicorn</tspan></text>
<rect class="rough" x="120" y="104" width="260" height="70" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="250" y="130.22" text-anchor="middle" font-size="14.5" font-weight="700" fill="#27323a"><tspan x="250" dy="0">vllm serve &lt;model&gt;</tspan></text><text x="250" y="160.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="250" dy="0">console script → main:main</tspan></text><path d="M 380 139 L 403.0 139.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 410 139 L 399.0 143.4 L 399.0 134.6 z" fill="#30363d"/><rect class="rough" x="410" y="104" width="260" height="70" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="540" y="130.22" text-anchor="middle" font-size="14.5" font-weight="700" fill="#27323a"><tspan x="540" dy="0">main.py registry</tspan></text><text x="540" y="151.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">argparse dispatch →</tspan><tspan x="540" dy="17.36">ServeSubcommand</tspan></text><path d="M 670 139 L 693.0 139.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 700 139 L 689.0 143.4 L 689.0 134.6 z" fill="#30363d"/><rect class="rough" x="700" y="104" width="260" height="70" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="830" y="130.22" text-anchor="middle" font-size="14.5" font-weight="700" fill="#27323a"><tspan x="830" dy="0">make_arg_parser + validate</tspan></text><text x="830" y="160.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="830" dy="0">3 tiers · cross-flag checks</tspan></text><text x="684" y="195.04" text-anchor="end" font-size="14" font-weight="500" fill="#66717a"><tspan x="684" dy="0">tiers: serve-only · FrontendArgs (HTTP/SSL/CORS) · AsyncEngineArgs (engine)</tspan></text><rect class="rough" x="700" y="204" width="260" height="66" rx="12" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="830" y="230.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="830" dy="0">ServeSubcommand.cmd</tspan></text><text x="830" y="247.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="830" dy="0">resolve api_server_count ·</tspan><tspan x="830" dy="17.36">5-way branch</tspan></text><path d="M 830 174 L 830.0 197.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 830 204 L 825.6 193.0 L 834.4 193.0 z" fill="#30363d"/><rect class="rough" x="44" y="298" width="186" height="46" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="137" y="317.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="137" dy="0">run_server · single</tspan><tspan x="137" dy="17.36">(this process)</tspan></text><path d="M 830 270 L 144.0 297.7" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 137 298 L 147.8 293.2 L 148.2 302.0 z" fill="#66717a"/><rect class="rough" x="246" y="298" width="186" height="46" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="339" y="317.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="339" dy="0">run_headless · no</tspan><tspan x="339" dy="17.36">uvicorn</tspan></text><path d="M 830 270 L 346.0 297.6" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 339 298 L 349.7 293.0 L 350.2 301.8 z" fill="#66717a"/><rect class="rough" x="448" y="298" width="186" height="46" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="541" y="317.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="541" dy="0">run_multi_api_serve</tspan><tspan x="541" dy="17.36">r</tspan></text><path d="M 830 270 L 548.0 297.3" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 541 298 L 551.5 292.6 L 552.4 301.3 z" fill="#66717a"/><rect class="rough" x="650" y="298" width="186" height="46" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="743" y="326.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="743" dy="0">run_dp_supervisor</tspan></text><path d="M 830 270 L 749.7 295.9" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 743 298 L 752.1 290.4 L 754.8 298.8 z" fill="#66717a"/><rect class="rough" x="852" y="298" width="186" height="46" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="945" y="326.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="945" dy="0">serve_grpc</tspan></text><path d="M 830 270 L 938.2 296.3" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 945 298 L 933.3 299.7 L 935.4 291.1 z" fill="#66717a"/><path d="M 137 344 L 137.0 393.0" fill="none" stroke="#30363d" stroke-width="2.6"/><path d="M 137 400 L 132.6 389.0 L 141.4 389.0 z" fill="#30363d"/><rect class="rough" x="44" y="400" width="214" height="72" rx="12" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="151" y="428.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="151" dy="0">setup_server</tspan></text><text x="151" y="447.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="151" dy="0">bind socket before</tspan><tspan x="151" dy="17.36">engine · #8204</tspan></text><path d="M 258 436 L 285.0 436.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 292 436 L 281.0 440.4 L 281.0 431.6 z" fill="#30363d"/><rect class="rough" x="292" y="400" width="214" height="72" rx="12" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="399" y="419.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="399" dy="0">build_async_engine_cli</tspan><tspan x="399" dy="17.36">ent</tspan></text><text x="399" y="447.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="399" dy="0">from_cli_args →</tspan><tspan x="399" dy="17.36">VllmConfig → AsyncLLM</tspan></text><path d="M 506 436 L 533.0 436.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 436 L 529.0 440.4 L 529.0 431.6 z" fill="#30363d"/><rect class="rough" x="540" y="400" width="214" height="72" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="647" y="428.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="647" dy="0">build_and_serve</tspan></text><text x="647" y="447.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="647" dy="0">get_supported_tasks →</tspan><tspan x="647" dy="17.36">build_app</tspan></text><path d="M 754 436 L 781.0 436.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 788 436 L 777.0 440.4 L 777.0 431.6 z" fill="#30363d"/><rect class="rough" x="788" y="400" width="214" height="72" rx="12" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="895" y="428.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="895" dy="0">serve_http</tspan></text><text x="895" y="447.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="895" dy="0">uvicorn on pre-bound</tspan><tspan x="895" dy="17.36">socket</tspan></text><text x="540" y="511.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="540" dy="0">args is the single source of truth · CLI ≡ python -m …api_server · one run_server path</tspan></text><text x="540" y="553.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">The CLI is a launch tier: a console script feeds an argparse registry, three flag tiers assemble one args</tspan><tspan x="540" dy="17.36">Namespace, cmd resolves the process topology and branches, and the common path binds the socket before</tspan><tspan x="540" dy="17.36">standing up AsyncLLM behind uvicorn.</tspan></text>
</svg>
