<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="684" viewBox="0 0 1080 684" role="img" aria-label="Why the Terminal sorted(...) Exists">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="684" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Why the Terminal sorted(...) Exists</tspan></text>
<text x="60" y="152.35999999999999" text-anchor="start" font-size="14" font-weight="700" fill="#27323a"><tspan x="60" dy="0">submission order  ·  ids minted from</tspan><tspan x="60" dy="17.36">Counter()</tspan></text><text x="60" y="202.35999999999999" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="60" dy="0">monotonic decimal ids assigned at</tspan><tspan x="60" dy="17.36">submission</tspan></text><text x="60" y="303.68" text-anchor="start" font-size="14" font-weight="700" fill="#27323a"><tspan x="60" dy="0">finish order  ·  as EngineCore drains</tspan><tspan x="60" dy="17.36">(scheduler interleaves prefill /</tspan><tspan x="60" dy="17.36">decode)</tspan></text><text x="60" y="468.36" text-anchor="start" font-size="14" font-weight="700" fill="#27323a"><tspan x="60" dy="0">returned after sorted(key=lambda o:</tspan><tspan x="60" dy="17.36">int(o.request_id))</tspan></text><text x="60" y="520.36" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="60" dy="0">order restoration lives in the convenience</tspan><tspan x="60" dy="17.36">layer — off the scheduler's hot path</tspan></text><rect class="rough" x="320" y="140" width="150" height="54" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="395" y="165.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="395" dy="0">R0</tspan></text><text x="395" y="185.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="395" dy="0">id 0</tspan></text><rect class="rough" x="500" y="140" width="150" height="54" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="575" y="165.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="575" dy="0">R1</tspan></text><text x="575" y="185.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="575" dy="0">id 1</tspan></text><rect class="rough" x="680" y="140" width="150" height="54" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="755" y="165.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="755" dy="0">R2</tspan></text><text x="755" y="185.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="755" dy="0">id 2</tspan></text><rect class="rough" x="860" y="140" width="150" height="54" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="935" y="165.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="935" dy="0">R3</tspan></text><text x="935" y="185.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="935" dy="0">id 3</tspan></text><rect class="rough" x="320" y="300" width="150" height="54" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="395" y="325.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="395" dy="0">R2</tspan></text><text x="395" y="345.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="395" dy="0">id 2</tspan></text><rect class="rough" x="500" y="300" width="150" height="54" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="575" y="325.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="575" dy="0">R0</tspan></text><text x="575" y="345.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="575" dy="0">id 0</tspan></text><rect class="rough" x="680" y="300" width="150" height="54" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="755" y="325.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="755" dy="0">R3</tspan></text><text x="755" y="345.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="755" dy="0">id 3</tspan></text><rect class="rough" x="860" y="300" width="150" height="54" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="935" y="325.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="935" dy="0">R1</tspan></text><text x="935" y="345.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="935" dy="0">id 1</tspan></text><rect class="rough" x="320" y="460" width="150" height="54" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="395" y="493.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="395" dy="0">R0</tspan></text><rect class="rough" x="500" y="460" width="150" height="54" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="575" y="493.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="575" dy="0">R1</tspan></text><rect class="rough" x="680" y="460" width="150" height="54" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="755" y="493.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="755" dy="0">R2</tspan></text><rect class="rough" x="860" y="460" width="150" height="54" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="935" y="493.12" text-anchor="middle" font-size="17" font-weight="800" fill="#27323a"><tspan x="935" dy="0">R3</tspan></text><path d="M 395 194 L 569.0 296.4" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 575 300 L 563.3 298.2 L 567.8 290.6 z" fill="#66717a"/><path d="M 575 194 L 928.3 298.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 935 300 L 923.2 301.1 L 925.7 292.7 z" fill="#66717a"/><path d="M 755 194 L 401.7 298.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 395 300 L 404.3 292.7 L 406.8 301.1 z" fill="#66717a"/><path d="M 935 194 L 761.0 296.4" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 755 300 L 762.2 290.6 L 766.7 298.2 z" fill="#66717a"/><path d="M 395 354 L 748.3 458.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 755 460 L 743.2 461.1 L 745.7 452.7 z" fill="#66717a"/><path d="M 575 354 L 401.0 456.4" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 395 460 L 402.2 450.6 L 406.7 458.2 z" fill="#66717a"/><path d="M 755 354 L 929.0 456.4" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 935 460 L 923.3 458.2 L 927.8 450.6 z" fill="#66717a"/><path d="M 935 354 L 581.7 458.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 575 460 L 584.3 452.7 L 586.8 461.1 z" fill="#66717a"/><text x="540" y="557.04" text-anchor="middle" font-size="14" font-weight="700" fill="#c07a1a"><tspan x="540" dy="0">continuous batching lets requests finish out of submission order</tspan></text><rect class="rough" x="260" y="572" width="560" height="30" rx="15" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="540" y="592.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">call blocks until has_unfinished_requests() is False</tspan></text><text x="540" y="629.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">Continuous batching lets requests finish out of submission order (the scheduler freely interleaves prefill</tspan><tspan x="540" dy="17.36">and decode), so monotonic decimal ids minted from Counter() let the wrapper layer restore input order —</tspan><tspan x="540" dy="17.36">keeping preserve-submission-order off the scheduler's hot path.</tspan></text>
</svg>
