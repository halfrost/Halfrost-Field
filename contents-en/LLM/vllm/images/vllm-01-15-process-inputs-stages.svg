<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="890" viewBox="0 0 1080 890" role="img" aria-label="Inside process_inputs: The Ordered Gauntlet">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="890" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Inside process_inputs: The Ordered Gauntlet</tspan></text>
<rect class="rough" x="56" y="100" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="134.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">1 · validate — _validate_params / _validate_lora / DP-rank bounds</tspan></text><rect class="rough" x="712" y="100" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="134.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">reject before tokenization</tspan></text><path d="M 672 130 L 701.0 130.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 130 L 697.0 134.4 L 697.0 125.6 z" fill="#66717a"/><path d="M 362 160 L 362.0 179.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 186 L 357.6 175.0 L 366.4 175.0 z" fill="#30363d"/><rect class="rough" x="56" y="186" width="612" height="60" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="362" y="205.44" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">2 · fork on isinstance(prompt, dict) and &quot;type&quot; in prompt —</tspan><tspan x="362" dy="14.879999999999999">rendered EngineInput as-is | else deprecated InputPreprocessor.preprocess() →</tspan><tspan x="362" dy="14.879999999999999">renderer</tspan></text><rect class="rough" x="712" y="186" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="220.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">normalized EngineInput either way</tspan></text><path d="M 672 216 L 701.0 216.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 216 L 697.0 220.4 L 697.0 211.6 z" fill="#66717a"/><path d="M 362 246 L 362.0 265.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 272 L 357.6 261.0 L 366.4 261.0 z" fill="#30363d"/><rect class="rough" x="56" y="272" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="306.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">3 · current_platform.validate_request</tspan></text><rect class="rough" x="712" y="272" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="306.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">platform-legal request</tspan></text><path d="M 672 302 L 701.0 302.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 302 L 697.0 306.4 L 697.0 297.6 z" fill="#66717a"/><path d="M 362 332 L 362.0 351.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 358 L 357.6 347.0 L 366.4 347.0 z" fill="#30363d"/><rect class="rough" x="56" y="358" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="384.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">4 · split enc / dec — validate lengths &amp; vocab (non-empty, ≤ max_model_len, ≠</tspan><tspan x="362" dy="14.879999999999999">max_model_len for generate)</tspan></text><rect class="rough" x="712" y="358" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="392.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">lengths &amp; vocab in range</tspan></text><path d="M 672 388 L 701.0 388.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 388 L 697.0 392.4 L 697.0 383.6 z" fill="#66717a"/><path d="M 362 418 L 362.0 437.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 444 L 357.6 433.0 L 366.4 433.0 z" fill="#30363d"/><rect class="rough" x="56" y="444" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="470.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">5 · params.clone() + finalize — max_tokens · update_from_generation_config ·</tspan><tspan x="362" dy="14.879999999999999">update_from_tokenizer</tspan></text><rect class="rough" x="712" y="444" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="478.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">owned, fully-defaulted params</tspan></text><path d="M 672 474 L 701.0 474.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 474 L 697.0 478.4 L 697.0 469.6 z" fill="#66717a"/><path d="M 362 504 L 362.0 523.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 530 L 357.6 519.0 L 366.4 519.0 z" fill="#30363d"/><rect class="rough" x="56" y="530" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="564.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">6 · multimodal flatten — argsort_mm_positions + dual hash</tspan></text><rect class="rough" x="712" y="530" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="564.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">sequence-ordered mm_features</tspan></text><path d="M 672 560 L 701.0 560.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 560 L 697.0 564.4 L 697.0 555.6 z" fill="#66717a"/><path d="M 362 590 L 362.0 609.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 616 L 357.6 605.0 L 366.4 605.0 z" fill="#30363d"/><rect class="rough" x="56" y="616" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="650.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">7 · build EngineCoreRequest</tspan></text><rect class="rough" x="712" y="616" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="650.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">one uniform wire struct</tspan></text><path d="M 672 646 L 701.0 646.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 646 L 697.0 650.4 L 697.0 641.6 z" fill="#66717a"/><path d="M 362 676 L 362.0 695.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 362 702 L 357.6 691.0 L 366.4 691.0 z" fill="#30363d"/><rect class="rough" x="56" y="702" width="612" height="60" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="362" y="736.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">8 · assign_request_id — external id + 8 random chars</tspan></text><rect class="rough" x="712" y="702" width="312" height="60" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="736.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="868" dy="0">globally-unique request_id</tspan></text><path d="M 672 732 L 701.0 732.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 732 L 697.0 736.4 L 697.0 727.6 z" fill="#66717a"/><rect class="rough" x="56" y="778" width="612" height="30" rx="15" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="362" y="797.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="362" dy="0">InputProcessor owns no tokenizer — the Renderer, upstream, does</tspan></text><text x="540" y="837" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">process_inputs is an ordered gauntlet: validate → fork on the rendered-vs-deprecated prompt shape → split enc/dec and</tspan><tspan x="540" dy="15.5">check lengths → params.clone() + finalize → multimodal flatten → build EngineCoreRequest → assign_request_id, each</tspan><tspan x="540" dy="15.5">stage adding one invariant.</tspan></text>
</svg>
