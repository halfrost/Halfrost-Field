<rect class="rough" x="56" y="100" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="136.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">1 · validate — _validate_params / _validate_lora / DP-rank bounds</tspan></text><rect class="rough" x="712" y="100" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="136.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">reject before tokenization</tspan></text><path d="M 700 131 L 701.0 131.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 131 L 697.0 135.4 L 697.0 126.6 z" fill="#66717a"/><path d="M 376 162 L 376.0 179.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 186 L 371.6 175.0 L 380.4 175.0 z" fill="#30363d"/><rect class="rough" x="56" y="186" width="640" height="62" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="376" y="204.67999999999998" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">2 · fork on isinstance(prompt, dict) and &quot;type&quot; in prompt —</tspan><tspan x="376" dy="17.36">rendered EngineInput as-is | else deprecated</tspan><tspan x="376" dy="17.36">InputPreprocessor.preprocess() → renderer</tspan></text><rect class="rough" x="712" y="186" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="222.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">normalized EngineInput either way</tspan></text><path d="M 700 217 L 701.0 217.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 217 L 697.0 221.4 L 697.0 212.6 z" fill="#66717a"/><path d="M 376 248 L 376.0 265.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 272 L 371.6 261.0 L 380.4 261.0 z" fill="#30363d"/><rect class="rough" x="56" y="272" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="308.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">3 · current_platform.validate_request</tspan></text><rect class="rough" x="712" y="272" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="308.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">platform-legal request</tspan></text><path d="M 700 303 L 701.0 303.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 303 L 697.0 307.4 L 697.0 298.6 z" fill="#66717a"/><path d="M 376 334 L 376.0 351.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 358 L 371.6 347.0 L 380.4 347.0 z" fill="#30363d"/><rect class="rough" x="56" y="358" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="385.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">4 · split enc / dec — validate lengths &amp; vocab (non-empty, ≤</tspan><tspan x="376" dy="17.36">max_model_len, ≠ max_model_len for generate)</tspan></text><rect class="rough" x="712" y="358" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="394.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">lengths &amp; vocab in range</tspan></text><path d="M 700 389 L 701.0 389.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 389 L 697.0 393.4 L 697.0 384.6 z" fill="#66717a"/><path d="M 376 420 L 376.0 437.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 444 L 371.6 433.0 L 380.4 433.0 z" fill="#30363d"/><rect class="rough" x="56" y="444" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="471.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">5 · params.clone() + finalize — max_tokens ·</tspan><tspan x="376" dy="17.36">update_from_generation_config · update_from_tokenizer</tspan></text><rect class="rough" x="712" y="444" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="480.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">owned, fully-defaulted params</tspan></text><path d="M 700 475 L 701.0 475.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 475 L 697.0 479.4 L 697.0 470.6 z" fill="#66717a"/><path d="M 376 506 L 376.0 523.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 530 L 371.6 519.0 L 380.4 519.0 z" fill="#30363d"/><rect class="rough" x="56" y="530" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="566.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">6 · multimodal flatten — argsort_mm_positions + dual hash</tspan></text><rect class="rough" x="712" y="530" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="566.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">sequence-ordered mm_features</tspan></text><path d="M 700 561 L 701.0 561.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 561 L 697.0 565.4 L 697.0 556.6 z" fill="#66717a"/><path d="M 376 592 L 376.0 609.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 616 L 371.6 605.0 L 380.4 605.0 z" fill="#30363d"/><rect class="rough" x="56" y="616" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="652.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">7 · build EngineCoreRequest</tspan></text><rect class="rough" x="712" y="616" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="652.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">one uniform wire struct</tspan></text><path d="M 700 647 L 701.0 647.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 647 L 697.0 651.4 L 697.0 642.6 z" fill="#66717a"/><path d="M 376 678 L 376.0 695.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 376 702 L 371.6 691.0 L 380.4 691.0 z" fill="#30363d"/><rect class="rough" x="56" y="702" width="640" height="62" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="376" y="738.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">8 · assign_request_id — external id + 8 random chars</tspan></text><rect class="rough" x="712" y="702" width="312" height="62" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="868" y="738.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="868" dy="0">globally-unique request_id</tspan></text><path d="M 700 733 L 701.0 733.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 708 733 L 697.0 737.4 L 697.0 728.6 z" fill="#66717a"/><rect class="rough" x="56" y="780" width="640" height="30" rx="15" fill="#efe9ff" stroke="#30363d" stroke-width="1.8"/><text x="376" y="800.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="376" dy="0">InputProcessor owns no tokenizer — the Renderer, upstream, does</tspan></text><text x="540" y="837.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">process_inputs is an ordered gauntlet: validate → fork on the rendered-vs-deprecated prompt shape → split</tspan><tspan x="540" dy="17.36">enc/dec and check lengths → params.clone() + finalize → multimodal flatten → build EngineCoreRequest →</tspan><tspan x="540" dy="17.36">assign_request_id, each stage adding one invariant.</tspan></text>
</svg>
