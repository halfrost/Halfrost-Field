th d="M 560 268 L 549.0 272.4 L 549.0 263.6 z" fill="#66717a"/><path d="M 278 290 L 278.0 309.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 316 L 273.6 305.0 L 282.4 305.0 z" fill="#30363d"/><rect class="rough" x="44" y="316" width="468" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="278" y="343.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="278" dy="0">swap_space present</tspan></text><rect class="rough" x="560" y="316" width="476" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="798" y="343.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">pop + deprecation warn · V0 leftover</tspan></text><path d="M 512 338 L 553.0 338.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 560 338 L 549.0 342.4 L 549.0 333.6 z" fill="#66717a"/><path d="M 278 360 L 278.0 379.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 386 L 273.6 375.0 L 282.4 375.0 z" fill="#30363d"/><rect class="rough" x="44" y="386" width="468" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="278" y="413.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="278" dy="0">kv_transfer_config is dict</tspan></text><rect class="rough" x="560" y="386" width="476" height="44" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="798" y="404.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">KVTransferConfig(**...) · ValidationError →</tspan><tspan x="798" dy="17.36">ValueError</tspan></text><path d="M 512 408 L 553.0 408.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 560 408 L 549.0 412.4 L 549.0 403.6 z" fill="#66717a"/><path d="M 278 430 L 278.0 449.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 456 L 273.6 445.0 L 282.4 445.0 z" fill="#30363d"/><rect class="rough" x="44" y="456" width="468" height="62" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="278" y="483.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="278" dy="0">_make_config: compilation / structured_outputs /</tspan><tspan x="278" dy="17.36">profiler / attention</tspan></text><rect class="rough" x="560" y="456" width="476" height="62" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="798" y="474.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">None→default · dict→is_init_field filter→splat</tspan><tspan x="798" dy="17.36">· instance→passthrough · bare</tspan><tspan x="798" dy="17.36">int→CompilationMode(int)</tspan></text><path d="M 512 487 L 553.0 487.0" fill="none" stroke="#66717a" stroke-width="1.8"/><path d="M 560 487 L 549.0 491.4 L 549.0 482.6 z" fill="#66717a"/><path d="M 278 518 L 278.0 539.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 278 546 L 273.6 535.0 L 282.4 535.0 z" fill="#30363d"/><rect class="rough" x="44" y="546" width="992" height="46" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="540" y="574.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">dp_size &gt; 1  AND  not external_launcher  AND  not TPU  →  raise ValueError</tspan></text><path d="M 540 592 L 540.0 613.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 620 L 535.6 609.0 L 544.4 609.0 z" fill="#30363d"/><rect class="rough" x="320" y="620" width="440" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="638.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">typed EngineArgs(...) · every value type- and</tspan><tspan x="540" dy="17.36">transport-safe</tspan></text><text x="540" y="682.36" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">Stage-0 kwargs massaging inside LLM.__init__ applies five in-place coercions plus the single-process</tspan><tspan x="540" dy="17.36">data-parallel guard, so every value reaches the EngineArgs constructor already type- and transport-safe.</tspan></text>
