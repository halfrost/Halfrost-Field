<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="698" viewBox="0 0 1080 698" role="img" aria-label="Method Ownership in the Offline Façade">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="698" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Method Ownership in the Offline Façade</tspan></text>
<rect class="rough" x="56" y="104" width="968" height="160" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="540" y="133.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="540" dy="0">class LLM(BeamSearchOfflineMixin, PoolingOfflineMixin, OfflineInferenceMixin)</tspan></text><text x="540" y="154.14" text-anchor="middle" font-size="11.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">entrypoints/llm.py  ·  the user-facing class</tspan></text><rect class="rough" x="76" y="166" width="280" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="216" y="191.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="216" dy="0">generate()</tspan></text><rect class="rough" x="396" y="166" width="280" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="536" y="191.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="536" dy="0">chat()</tspan></text><rect class="rough" x="716" y="166" width="280" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="856" y="191.4" text-anchor="middle" font-size="15" font-weight="700" fill="#27323a"><tspan x="856" dy="0">enqueue()</tspan></text><rect class="rough" x="96" y="222" width="888" height="28" rx="14" fill="#f6c77c" stroke="#30363d" stroke-width="1.8"/><text x="540" y="240.5" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27323a"><tspan x="540" dy="0">validate + default + delegate  ·  no scheduling / memory / exec</tspan></text><path d="M 540 264 L 540.0 285.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 292 L 535.6 281.0 L 544.4 281.0 z" fill="#30363d"/><rect x="56" y="292" width="968" height="202" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="74" y="321.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="74" dy="0">OfflineInferenceMixin  ·  offline_utils.py</tspan></text><rect class="rough" x="76" y="340" width="300" height="46" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="226" y="368.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="226" dy="0">_render_and_add_requests</tspan></text><path d="M 376 363 L 399.0 363.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 406 363 L 395.0 367.4 L 395.0 358.6 z" fill="#30363d"/><rect class="rough" x="406" y="340" width="230" height="46" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="521" y="368.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="521" dy="0">_add_request</tspan></text><path d="M 636 363 L 659.0 363.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 666 363 L 655.0 367.4 L 655.0 358.6 z" fill="#30363d"/><rect class="rough" x="666" y="340" width="300" height="46" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="816" y="368.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="816" dy="0">_run_engine</tspan></text><text x="540" y="408.32" text-anchor="middle" font-size="12" font-weight="700" fill="#66717a"><tspan x="540" dy="0">the render → add → drain spine</tspan></text><rect class="rough" x="120" y="420" width="380" height="56" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="310" y="439.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="310" dy="0">_add_completion_requests</tspan></text><text x="310" y="467.96" text-anchor="middle" font-size="11" font-weight="500" fill="#66717a"><tspan x="310" dy="0">align batch shapes</tspan></text><rect class="rough" x="580" y="420" width="380" height="56" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="770" y="439.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="770" dy="0">_run_completion</tspan></text><text x="770" y="467.96" text-anchor="middle" font-size="11" font-weight="500" fill="#66717a"><tspan x="770" dy="0">enqueue then drain</tspan></text><path d="M 540 494 L 540.0 517.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 540 524 L 535.6 513.0 L 544.4 513.0 z" fill="#30363d"/><rect class="rough" x="290" y="524" width="500" height="56" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="542.76" text-anchor="middle" font-size="16" font-weight="700" fill="#27323a"><tspan x="540" dy="0">single LLMEngine handle</tspan></text><text x="540" y="573.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">one polymorphic EngineCoreClient underneath</tspan></text><rect class="rough" x="56" y="600" width="968" height="40" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="540" y="624.68" text-anchor="middle" font-size="13" font-weight="600" fill="#27323a"><tspan x="540" dy="0">invariant: the user-facing class holds no scheduling / memory / execution logic — every path funnels to one spine</tspan></text><text x="540" y="653" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">Public generate / chat / enqueue on LLM validate, fill defaults, and orchestrate, delegating to the _render_and_add_requests →</tspan><tspan x="540" dy="15.5">_add_request → _run_engine spine on OfflineInferenceMixin over a single LLMEngine handle — no scheduling, memory, or execution</tspan><tspan x="540" dy="15.5">logic sits above the façade.</tspan></text>
</svg>
