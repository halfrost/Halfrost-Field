<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="836" viewBox="0 0 1080 836" role="img" aria-label="From Hidden States to a Token Id: The Sampler Pipeline">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="836" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">From Hidden States to a Token Id: The Sampler Pipeline</tspan></text>
<rect class="rough" x="56" y="104" width="456" height="54" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="284" y="135.86" text-anchor="middle" font-size="13.5" font-weight="800" fill="#27323a"><tspan x="284" dy="0">hidden_states  [num_scheduled_tokens, hidden]</tspan></text><rect class="rough" x="56" y="186" width="456" height="64" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="284" y="207.44" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="284" dy="0">hidden_states[input_batch.logits_indices] → final</tspan><tspan x="284" dy="14.879999999999999">positions only</tspan><tspan x="284" dy="14.879999999999999">(+ draft-verify rows) → sample_hidden_states</tspan></text><path d="M 284 158 L 284.0 179.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 186 L 279.6 175.0 L 288.4 175.0 z" fill="#30363d"/><rect class="rough" x="56" y="278" width="456" height="54" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="284" y="301.88" text-anchor="middle" font-size="12" font-weight="700" fill="#27323a"><tspan x="284" dy="0">compute_logits · LM head matmul (hidden_dim × vocab_size)</tspan><tspan x="284" dy="14.879999999999999">TP gathers sharded vocab</tspan></text><path d="M 284 250 L 284.0 271.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 278 L 279.6 267.0 L 288.4 267.0 z" fill="#30363d"/><rect class="rough" x="56" y="364" width="456" height="46" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="284" y="391.5" text-anchor="middle" font-size="12.5" font-weight="700" fill="#27323a"><tspan x="284" dy="0">logits  [num_sampled, vocab]</tspan></text><path d="M 284 332 L 284.0 357.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 364 L 279.6 353.0 L 288.4 353.0 z" fill="#30363d"/><rect class="rough" x="56" y="438" width="456" height="62" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="284" y="465.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="284" dy="0">if grammar_output: apply_grammar_bitmask in place</tspan><tspan x="284" dy="14.879999999999999">scheduler-owned, before the sampler sees logits</tspan></text><path d="M 284 410 L 284.0 431.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 438 L 279.6 427.0 L 288.4 427.0 z" fill="#30363d"/><path d="M 284 500 L 284.0 525.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 284 532 L 279.6 521.0 L 288.4 521.0 z" fill="#30363d"/><rect class="rough" x="134" y="532" width="300" height="40" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="284" y="556.68" text-anchor="middle" font-size="13" font-weight="800" fill="#27323a"><tspan x="284" dy="0">input_batch.num_draft_tokens</tspan></text><rect class="rough" x="56" y="600" width="192" height="56" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="152" y="632.68" text-anchor="middle" font-size="13" font-weight="700" fill="#27323a"><tspan x="152" dy="0">0 → Sampler</tspan></text><rect class="rough" x="262" y="600" width="250" height="56" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="387" y="624.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="387" dy="0">&gt; 0 → rejection_sampler  (spec</tspan><tspan x="387" dy="14.879999999999999">decode, art 12)</tspan></text><path d="M 152 572 L 152.0 593.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 152 600 L 147.6 589.0 L 156.4 589.0 z" fill="#66717a"/><path d="M 387 572 L 387.0 593.0" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 387 600 L 382.6 589.0 L 391.4 589.0 z" fill="#66717a"/><rect class="rough" x="560" y="104" width="464" height="76" rx="12" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="792" y="118.36" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="792" dy="0">apply_sampling_params  ·  ordered operators on a</tspan><tspan x="792" dy="17.36">fresh fp32 copy</tspan></text><text x="792" y="168.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="792" dy="0">torch.empty_like(..., float32).copy_(logits)</tspan></text><rect class="rough" x="560" y="196" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="222.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="792" dy="0">logit bias / allowed_token_ids / min_tokens</tspan></text><rect class="rough" x="560" y="254" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="280.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="792" dy="0">penalties (presence / frequency / repetition)</tspan></text><rect class="rough" x="560" y="312" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="338.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="792" dy="0">bad-words</tspan></text><rect class="rough" x="560" y="370" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="396.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="792" dy="0">temperature</tspan></text><rect class="rough" x="560" y="428" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="454.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="792" dy="0">min-p</tspan></text><rect class="rough" x="560" y="486" width="464" height="44" rx="7" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="792" y="512.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="792" dy="0">[ top-k / top-p deferred · skip_top_k_top_p=True ]</tspan></text><rect class="rough" x="560" y="544" width="464" height="44" rx="7" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="792" y="570.32" text-anchor="middle" font-size="12" font-weight="700" fill="#27323a"><tspan x="792" dy="0">draw · FlashInfer fused | gumbel_sample</tspan></text><path d="M 792 180 L 792.0 189.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 792 196 L 787.6 185.0 L 796.4 185.0 z" fill="#30363d"/><rect class="rough" x="560" y="610" width="464" height="46" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="792" y="637.68" text-anchor="middle" font-size="13" font-weight="800" fill="#27323a"><tspan x="792" dy="0">sampled_token_ids  reshaped [num_requests, 1]</tspan></text><path d="M 792 588 L 792.0 603.0" fill="none" stroke="#30363d" stroke-width="2.2"/><path d="M 792 610 L 787.6 599.0 L 796.4 599.0 z" fill="#30363d"/><path d="M 152 656 L 555.7 139.5" fill="none" stroke="#66717a" stroke-width="1.8" stroke-dasharray="8 7"/><path d="M 560 134 L 556.7 145.4 L 549.8 140.0 z" fill="#66717a"/><rect class="rough" x="56" y="700" width="968" height="54" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="723.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="540" dy="0">invariant: only final positions projected (cost ∝ #requests, not #tokens); raw logits preserved for logprobs; no-op defaults</tspan><tspan x="540" dy="14.879999999999999">temp=1.0 / top_p=1.0 / top_k=0 / min_p=0.0</tspan></text><text x="540" y="783" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">hidden_states[logits_indices] selects only final positions, compute_logits projects to vocab, a scheduler-owned grammar</tspan><tspan x="540" dy="15.5">bitmask is applied in place, then apply_sampling_params runs its operators in order on a private fp32 copy before the draw</tspan><tspan x="540" dy="15.5">— so sampling cost scales with request count, not token count.</tspan></text>
</svg>
