<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="626" viewBox="0 0 1080 626" role="img" aria-label="The SyncMPClient Wire Frame">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="626" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">The SyncMPClient Wire Frame</tspan></text>
<text x="56" y="112.68" text-anchor="start" font-size="13" font-weight="800" fill="#66717a"><tspan x="56" dy="0">preconditions</tspan></text><rect class="rough" x="56" y="122" width="360" height="34" rx="17" fill="#ffe3de" stroke="#30363d" stroke-width="1.8"/><text x="236" y="143.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="236" dy="0">ensure_alive()  ·  raises EngineDeadError</tspan></text><rect class="rough" x="432" y="122" width="300" height="34" rx="17" fill="#ffe3de" stroke="#30363d" stroke-width="1.8"/><text x="582" y="143.32" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="582" dy="0">free_pending_messages()</tspan></text><text x="540" y="188.68" text-anchor="middle" font-size="13" font-weight="700" fill="#27323a"><tspan x="540" dy="0">ordered multipart message  ·  zmq.ROUTER (client) → zmq.DEALER (engine)</tspan></text><rect class="rough" x="56" y="202" width="210" height="92" rx="12" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="161" y="236.86" text-anchor="middle" font-size="13.5" font-weight="700" fill="#27323a"><tspan x="161" dy="0">engine_identity</tspan></text><text x="161" y="269.78" text-anchor="middle" font-size="10.5" font-weight="500" fill="#66717a"><tspan x="161" dy="0">addresses a specific engine</tspan></text><rect class="rough" x="280" y="202" width="150" height="92" rx="12" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="355" y="228.49" text-anchor="middle" font-size="13.5" font-weight="700" fill="#27323a"><tspan x="355" dy="0">type tag · 1</tspan><tspan x="355" dy="16.74">byte</tspan></text><text x="355" y="269.78" text-anchor="middle" font-size="10.5" font-weight="500" fill="#66717a"><tspan x="355" dy="0">e.g. ADD = b'\x00'</tspan></text><rect class="rough" x="444" y="202" width="300" height="92" rx="12" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="594" y="236.86" text-anchor="middle" font-size="13.5" font-weight="700" fill="#27323a"><tspan x="594" dy="0">msgpack payload</tspan></text><text x="594" y="269.78" text-anchor="middle" font-size="10.5" font-weight="500" fill="#66717a"><tspan x="594" dy="0">encoder.encode(request)</tspan></text><rect class="rough" x="758" y="202" width="244" height="92" rx="12" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="880" y="236.86" text-anchor="middle" font-size="13.5" font-weight="700" fill="#27323a"><tspan x="880" dy="0">out-of-band tensor buffers</tspan></text><text x="880" y="269.78" text-anchor="middle" font-size="10.5" font-weight="500" fill="#66717a"><tspan x="880" dy="0">optional</tspan></text><rect class="rough" x="430" y="330" width="220" height="40" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="540" y="355.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="540" dy="0">len(msg) &lt;= 3 ?</tspan></text><rect class="rough" x="56" y="408" width="468" height="92" rx="12" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="290" y="443.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="290" dy="0">send_multipart(copy=False)  ·  return</tspan></text><text x="290" y="475.96" text-anchor="middle" font-size="11" font-weight="500" fill="#66717a"><tspan x="290" dy="0">zero-copy · no tensor buffers</tspan></text><rect class="rough" x="556" y="408" width="468" height="110" rx="12" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="790" y="439.62" text-anchor="middle" font-size="13" font-weight="700" fill="#27323a"><tspan x="790" dy="0">send_multipart(copy=False, track=True)</tspan><tspan x="790" dy="16.12">+ add_pending_message(tracker, request)</tspan></text><text x="790" y="482.14" text-anchor="middle" font-size="11" font-weight="500" fill="#66717a"><tspan x="790" dy="0">retains buffer via zmq.MessageTracker until ZMQ finishes sending</tspan><tspan x="790" dy="13.64">backing memory</tspan></text><path d="M 470 370 L 296.8 406.6" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 290 408 L 299.9 401.4 L 301.7 410.0 z" fill="#66717a"/><path d="M 610 370 L 783.2 406.6" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 790 408 L 778.3 410.0 L 780.1 401.4 z" fill="#66717a"/><text x="290" y="396.32" text-anchor="middle" font-size="12" font-weight="700" fill="#3a7d44"><tspan x="290" dy="0">yes</tspan></text><text x="790" y="396.32" text-anchor="middle" font-size="12" font-weight="700" fill="#c07a1a"><tspan x="790" dy="0">no</tspan></text><text x="540" y="552.32" text-anchor="middle" font-size="12" font-weight="500" fill="#66717a"><tspan x="540" dy="0">add_request is fire-and-forget; outputs return async on a separate socket; deep topology → article 03</tspan></text><text x="540" y="579" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">An ordered multipart (engine_identity, one-byte type tag, *msgpack payload) rides a ROUTER→DEALER socket; len(msg) &lt;= 3 is a plain</tspan><tspan x="540" dy="15.5">zero-copy send_multipart, else out-of-band tensor buffers force track=True + add_pending_message until ZMQ finishes sending — all</tspan><tspan x="540" dy="15.5">fronted by ensure_alive().</tspan></text>
</svg>
