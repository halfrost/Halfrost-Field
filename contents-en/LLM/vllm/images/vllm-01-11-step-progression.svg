an x="762" dy="0">+1</tspan></text><rect class="rough" x="859" y="223" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="942" y="254.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="942" dy="0">+1</tspan></text><rect class="rough" x="56" y="289" width="68" height="52" rx="8" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="90" y="320.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="90" dy="0">R2</tspan></text><rect class="rough" x="139" y="289" width="166" height="52" rx="8" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="222" y="320.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="222" dy="0">decode +1</tspan></text><rect class="rough" x="319" y="289" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="402" y="320.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="402" dy="0">+1</tspan></text><rect class="rough" x="499" y="289" width="166" height="52" rx="8" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="582" y="320.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="582" dy="0">+1 ✓</tspan></text><rect class="rough" x="679" y="289" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="762" y="320.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="762" dy="0">—</tspan></text><rect class="rough" x="859" y="289" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="942" y="320.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="942" dy="0">—</tspan></text><rect class="rough" x="56" y="355" width="68" height="52" rx="8" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="90" y="386.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="90" dy="0">R3</tspan></text><rect class="rough" x="139" y="355" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="222" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="222" dy="0">—</tspan></text><rect class="rough" x="319" y="355" width="166" height="52" rx="8" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="402" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#66717a"><tspan x="402" dy="0">—</tspan></text><rect class="rough" x="499" y="355" width="166" height="52" rx="8" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="582" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="582" dy="0">prefill +6</tspan></text><rect class="rough" x="679" y="355" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="762" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="762" dy="0">+1</tspan></text><rect class="rough" x="859" y="355" width="166" height="52" rx="8" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="942" y="386.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="942" dy="0">+1</tspan></text><rect x="132" y="424" width="20" height="20" rx="5" fill="#f6c77c" stroke="#30363d" stroke-width="1.4"/><text x="160" y="439.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="160" dy="0">prefill / chunk</tspan></text><rect x="452" y="424" width="20" height="20" rx="5" fill="#e5f4e9" stroke="#30363d" stroke-width="1.4"/><text x="480" y="439.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="480" dy="0">+1 decode</tspan></text><rect x="760" y="424" width="20" height="20" rx="5" fill="#ffe3de" stroke="#30363d" stroke-width="1.4"/><text x="788" y="439.04" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="788" dy="0">finish → free now or defer</tspan></text><text x="56" y="471.04" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="56" dy="0">schedule() grants {request_id: num_tokens} each step</tspan></text><text x="56" y="493.04" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="56" dy="0">batch membership changes every step — R3 joins at k+2, R2 leaves at k+2</tspan></text><text x="56" y="515.04" text-anchor="start" font-size="14" font-weight="700" fill="#c07a1a"><tspan x="56" dy="0">R2 finishes (k+2) before R0 (k+3) — finish order ≠ submission order</tspan></text><rect class="rough" x="56" y="526" width="968" height="36" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="549.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">input processing runs ONCE up front   ·   schedule → execute → commit repeat once per step</tspan></text><text x="540" y="591.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">Each EngineCore.step() advances every in-flight request by a few tokens; requests enter and finish</tspan><tspan x="540" dy="17.36">independently across steps (R2 before R0), a finished request frees its KV blocks, and only input processing</tspan><tspan x="540" dy="17.36">runs once up front while schedule/execute/commit repeat per step.</tspan></text>
</svg>
