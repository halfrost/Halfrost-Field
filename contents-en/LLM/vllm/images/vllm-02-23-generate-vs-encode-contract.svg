<rect width="1080" height="744" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">generate vs encode: A Contract Matrix on EngineClient</tspan></text>
<text x="540" y="109.04" text-anchor="middle" font-size="14" font-weight="700" fill="#66717a"><tspan x="540" dy="0">abstract on EngineClient · implemented by AsyncLLM</tspan></text><rect class="rough" x="44" y="118" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="145.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="162" dy="0">contract</tspan></text><rect class="rough" x="294" y="118" width="360" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="474" y="136.35999999999999" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="474" dy="0">generate(SamplingParams) →</tspan><tspan x="474" dy="17.36">RequestOutput</tspan></text><rect class="rough" x="668" y="118" width="368" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="852" y="136.35999999999999" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="852" dy="0">encode(PoolingParams) →</tspan><tspan x="852" dy="17.36">PoolingRequestOutput</tspan></text><rect class="rough" x="44" y="176" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">param object</tspan></text><rect class="rough" x="294" y="176" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">SamplingParams (msgspec.Struct)</tspan></text><rect class="rough" x="668" y="176" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="203.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">PoolingParams (msgspec.Struct)</tspan></text><rect class="rough" x="44" y="234" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="261.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">output</tspan></text><rect class="rough" x="294" y="234" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="261.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">RequestOutput</tspan></text><rect class="rough" x="668" y="234" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="261.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">PoolingRequestOutput</tspan></text><rect class="rough" x="44" y="292" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="319.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">output_kind</tspan></text><rect class="rough" x="294" y="292" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="319.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">DELTA if stream else FINAL_ONLY</tspan></text><rect class="rough" x="668" y="292" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="310.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">FINAL_ONLY enforced in __post_init__</tspan><tspan x="852" dy="17.36">(raises on DELTA)</tspan></text><rect class="rough" x="44" y="350" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="377.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">decode loop</tspan></text><rect class="rough" x="294" y="350" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="377.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">autoregressive · yes</tspan></text><rect class="rough" x="668" y="350" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="377.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">NONE (generator = shape convention)</tspan></text><rect class="rough" x="44" y="408" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="435.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">streaming</tspan></text><rect class="rough" x="294" y="408" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="435.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">incremental deltas</tspan></text><rect class="rough" x="668" y="408" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="435.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">one final vector</tspan></text><rect class="rough" x="44" y="466" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="493.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">extra args</tspan></text><rect class="rough" x="294" y="466" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="484.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">data_parallel_rank ·</tspan><tspan x="474" dy="17.36">reasoning_parser_kwargs</tspan></text><rect class="rough" x="668" y="466" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="493.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">neither</tspan></text><rect class="rough" x="44" y="524" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="551.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">collection</tspan></text><rect class="rough" x="294" y="524" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="551.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">streamed as-arrives</tspan></text><rect class="rough" x="668" y="524" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="542.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">order-preserving · all-or-nothing</tspan><tspan x="852" dy="17.36">(final_res_batch[i])</tspan></text><rect class="rough" x="44" y="582" width="236" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="162" y="609.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="162" dy="0">head selection</tspan></text><rect class="rough" x="294" y="582" width="360" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="474" y="609.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="474" dy="0">n / logprobs / stop</tspan></text><rect class="rough" x="668" y="582" width="368" height="44" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="2"/><text x="852" y="600.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="852" dy="0">PoolingParams.task (embed / classify /</tspan><tspan x="852" dy="17.36">score)</tspan></text><rect class="rough" x="44" y="642" width="992" height="42" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="540" y="668.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">generate is unreachable from pooling serving classes — they call encode, full stop</tspan></text><text x="540" y="699.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">The sampling-vs-pooling fork as a contract matrix: generate streams token deltas with a decode loop, while</tspan><tspan x="540" dy="17.36">encode has no decode loop, yields exactly once per prompt, and enforces FINAL_ONLY in</tspan><tspan x="540" dy="17.36">PoolingParams.__post_init__ — so a pooling request can never acquire generative behavior.</tspan></text>
</svg>
