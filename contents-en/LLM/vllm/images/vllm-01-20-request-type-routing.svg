<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="656" viewBox="0 0 1080 656" role="img" aria-label="EngineCoreRequestType Routing: One Demux Path">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="656" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">EngineCoreRequestType Routing: One Demux Path</tspan></text>
<rect class="rough" x="56" y="108" width="244" height="40" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="178" y="133.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="178" dy="0">byte</tspan></text><rect class="rough" x="314" y="108" width="352" height="40" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="490" y="133.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="490" dy="0">origin → destination</tspan></text><rect class="rough" x="680" y="108" width="352" height="40" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="856" y="133.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="856" dy="0">decoder</tspan></text><rect class="rough" x="56" y="162" width="244" height="48" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><text x="178" y="191.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="178" dy="0">ADD = b'\x00'</tspan></text><rect class="rough" x="314" y="162" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="191.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="490" dy="0">client → engine  ·  over socket</tspan></text><rect class="rough" x="680" y="162" width="352" height="48" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="1.6"/><text x="856" y="182.35999999999999" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="856" dy="0">TYPED </tspan><tspan x="856" dy="17.36">MsgpackDecoder(EngineCoreRequest, ...)</tspan></text><rect class="rough" x="56" y="224" width="244" height="48" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><text x="178" y="253.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="178" dy="0">ABORT = b'\x01'</tspan></text><rect class="rough" x="314" y="224" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="253.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="490" dy="0">client → engine  ·  over socket</tspan></text><rect class="rough" x="680" y="224" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="856" y="253.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="856" dy="0">untyped generic</tspan></text><rect class="rough" x="56" y="286" width="244" height="48" rx="10" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><text x="178" y="315.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="178" dy="0">UTILITY = b'\x03'</tspan></text><rect class="rough" x="314" y="286" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="315.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="490" dy="0">client → engine  ·  over socket</tspan></text><rect class="rough" x="680" y="286" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="856" y="306.36" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="856" dy="0">untyped · return-valued ops, call_id</tspan><tspan x="856" dy="17.36">↔ Future</tspan></text><rect class="rough" x="56" y="348" width="244" height="48" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="1.6"/><text x="178" y="377.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="178" dy="0">START_DP_WAVE = b'\x02'</tspan></text><rect class="rough" x="314" y="348" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="377.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="490" dy="0">coordinator → engine</tspan></text><rect class="rough" x="680" y="348" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="856" y="377.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="856" dy="0">—</tspan></text><rect class="rough" x="56" y="410" width="244" height="48" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="1.6"/><text x="178" y="439.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="178" dy="0">EXECUTOR_FAILED = b'\x04'</tspan></text><rect class="rough" x="314" y="410" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="439.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="490" dy="0">in-process sentinel  ·  never on wire</tspan></text><rect class="rough" x="680" y="410" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="856" y="439.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="856" dy="0">—</tspan></text><rect class="rough" x="56" y="472" width="244" height="48" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="1.6"/><text x="178" y="501.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="178" dy="0">WAKEUP = b'\x05'</tspan></text><rect class="rough" x="314" y="472" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="490" y="501.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="490" dy="0">in-process sentinel  ·  shutdown</tspan></text><rect class="rough" x="680" y="472" width="352" height="48" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="856" y="501.04" text-anchor="middle" font-size="14" font-weight="500" fill="#27323a"><tspan x="856" dy="0">—</tspan></text><text x="540" y="543.04" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">UTILITY carries get_supported_tasks / sleep / add_lora / collective_rpc</tspan></text><text x="540" y="569.04" text-anchor="middle" font-size="14" font-weight="600" fill="#c07a1a"><tspan x="540" dy="0">sentinels reuse the same dispatch path so the busy loop needs one demux; only ADD gets a typed decoder</tspan></text><text x="540" y="599.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">ADD / ABORT / UTILITY cross the socket client→engine (only ADD gets the typed MsgpackDecoder; the rest share</tspan><tspan x="540" dy="17.36">an untyped decoder), START_DP_WAVE is coordinator→engine, and EXECUTOR_FAILED / WAKEUP are in-process</tspan><tspan x="540" dy="17.36">sentinels that never travel the wire yet reuse the same demux dispatch path.</tspan></text>
</svg>
