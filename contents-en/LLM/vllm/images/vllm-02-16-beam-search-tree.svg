<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="648" viewBox="0 0 1080 648" role="img" aria-label="beam_search: An Entrypoint-Side Tree, Not One Engine Request">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="648" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.54" text-anchor="start" font-size="26.5" font-weight="800" fill="#27323a"><tspan x="54" dy="0">beam_search: An Entrypoint-Side Tree, Not One Engine Request</tspan></text>
<rect class="rough" x="44" y="108" width="456" height="28" rx="14" fill="#b8d8ff" stroke="#30363d" stroke-width="1.8"/><text x="272" y="127.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="272" dy="0">step t · beam_width beams</tspan></text><circle class="rough" cx="170" cy="176" r="24" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><circle class="rough" cx="360" cy="176" r="24" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><rect class="rough" x="44" y="214" width="456" height="44" rx="22" fill="#f1f3f4" stroke="#30363d" stroke-width="1.8"/><text x="272" y="232.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="272" dy="0">step t+1 · 2×beam_width candidates (from engine</tspan><tspan x="272" dy="17.36">logprobs)</tspan></text><path class="rough" d="M 170 200 L 90 272" fill="none" stroke="#66717a" stroke-width="1.4"/><rect class="rough" x="68" y="272" width="44" height="26" rx="6" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><path class="rough" d="M 170 200 L 155 272" fill="none" stroke="#66717a" stroke-width="1.4"/><rect class="rough" x="133" y="272" width="44" height="26" rx="6" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><path class="rough" d="M 170 200 L 220 272" fill="none" stroke="#66717a" stroke-width="1.4"/><rect class="rough" x="198" y="272" width="44" height="26" rx="6" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><path class="rough" d="M 360 200 L 300 272" fill="none" stroke="#66717a" stroke-width="1.4"/><rect class="rough" x="278" y="272" width="44" height="26" rx="6" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><path class="rough" d="M 360 200 L 365 272" fill="none" stroke="#66717a" stroke-width="1.4"/><rect class="rough" x="343" y="272" width="44" height="26" rx="6" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><path class="rough" d="M 360 200 L 430 272" fill="none" stroke="#66717a" stroke-width="1.4"/><rect class="rough" x="408" y="272" width="44" height="26" rx="6" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6"/><rect class="rough" x="44" y="316" width="456" height="62" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="272" y="334.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="272" dy="0">rank: cumulative_logprob / (seq_len **</tspan><tspan x="272" dy="17.36">length_penalty)</tspan><tspan x="272" dy="17.36">→ prune to beam_width (utils.py:153)</tspan></text><path d="M 272 298 L 272.0 309.0" fill="none" stroke="#66717a" stroke-width="1.6"/><path d="M 272 316 L 267.6 305.0 L 276.4 305.0 z" fill="#66717a"/><circle class="rough" cx="170" cy="416" r="24" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><circle class="rough" cx="360" cy="416" r="24" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><rect class="rough" x="44" y="454" width="456" height="26" rx="13" fill="#e5f4e9" stroke="#30363d" stroke-width="1.8"/><text x="272" y="472.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="272" dy="0">beam_width kept</tspan></text><path d="M 272 378 L 272.0 385.0" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 272 392 L 267.6 381.0 L 276.4 381.0 z" fill="#30363d"/><path d="M 146 416 L 30 416 L 30 176" fill="none" stroke="#66717a" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="9 6"/><path d="M 30 176 L 139.0 176.0" fill="none" stroke="#66717a" stroke-width="1.6" stroke-dasharray="8 7"/><path d="M 146 176 L 135.0 180.4 L 135.0 171.6 z" fill="#66717a"/><rect x="560" y="110" width="476" height="402" rx="16" fill="#fff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="578" y="139.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="578" dy="0">per-step loop (offline.py:58-191)</tspan></text><rect class="rough" x="576" y="164" width="444" height="44" rx="10" fill="#dfeeff" stroke="#30363d" stroke-width="2"/><text x="798" y="182.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">1 · build SamplingParams(logprobs=2*beam_width,</tspan><tspan x="798" dy="17.36">max_tokens=1, temperature, skip_clone=True)</tspan></text><rect class="rough" x="576" y="222" width="444" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="798" y="240.35999999999999" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">2 · one engine request per beam → 1 token +</tspan><tspan x="798" dy="17.36">logprobs</tspan></text><rect class="rough" x="576" y="280" width="444" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="798" y="307.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">3 · Python expand · each beam × candidate tokens</tspan></text><rect class="rough" x="576" y="338" width="444" height="44" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="798" y="356.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">4 · score cumulative_logprob / (seq_len **</tspan><tspan x="798" dy="17.36">length_penalty)</tspan></text><rect class="rough" x="576" y="396" width="444" height="44" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="798" y="423.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">5 · prune to beam_width</tspan></text><rect class="rough" x="576" y="454" width="444" height="44" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="798" y="481.04" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="798" dy="0">6 · repeat until EOS / max</tspan></text><path d="M 1020 190 L 1030 190 L 1030 478 L 1020 478" fill="none" stroke="#66717a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="9 6"/><path d="M 1030 478 L 1027.0 478.0" fill="none" stroke="#66717a" stroke-width="1.5" stroke-dasharray="8 7"/><path d="M 1020 478 L 1031.0 473.6 L 1031.0 482.4 z" fill="#66717a"/><rect class="rough" x="44" y="526" width="992" height="42" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="552.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">the engine never &quot;does beam search&quot; — the tree lives entirely in the entrypoint</tspan></text><text x="540" y="595.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">beam_search is an entrypoint-side driver: each step issues max_tokens=1, logprobs=2*beam_width engine</tspan><tspan x="540" dy="17.36">requests per beam, then expands, ranks by cumulative_logprob / (seq_len ** length_penalty), and prunes back</tspan><tspan x="540" dy="17.36">to beam_width in Python — the engine only ever runs single-token generation.</tspan></text>
</svg>
