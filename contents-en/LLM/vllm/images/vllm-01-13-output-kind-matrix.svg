<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="616" viewBox="0 0 1080 616" role="img" aria-label="RequestOutputKind: Three Streaming Modes Compared">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="616" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">RequestOutputKind: Three Streaming Modes Compared</tspan></text>
<rect x="764" y="92" width="268" height="404" rx="12" fill="#fff7e8" stroke="#f6c77c" stroke-width="2"/><rect class="rough" x="260" y="108" width="236" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="378" y="134.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="378" dy="0">CUMULATIVE = 0</tspan></text><rect class="rough" x="512" y="108" width="236" height="42" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="630" y="134.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="630" dy="0">DELTA = 1</tspan></text><rect class="rough" x="780" y="108" width="236" height="42" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="898" y="134.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="898" dy="0">FINAL_ONLY = 2</tspan></text><rect class="rough" x="48" y="166" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="195.68" text-anchor="middle" font-size="13" font-weight="700" fill="#27323a"><tspan x="146" dy="0">per intermediate step</tspan></text><rect class="rough" x="260" y="166" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="195.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="378" dy="0">whole-so-far (re-sent)</tspan></text><rect class="rough" x="512" y="166" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="187.88" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="630" dy="0">new slice from</tspan><tspan x="630" dy="14.879999999999999">sent_tokens_offset</tspan></text><rect class="rough" x="780" y="166" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="195.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="898" dy="0">None (nothing emitted)</tspan></text><rect class="rough" x="48" y="232" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="261.68" text-anchor="middle" font-size="13" font-weight="700" fill="#27323a"><tspan x="146" dy="0">on finish</tspan></text><rect class="rough" x="260" y="232" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="261.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="378" dy="0">emits final</tspan></text><rect class="rough" x="512" y="232" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="261.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="630" dy="0">emits final</tspan></text><rect class="rough" x="780" y="232" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="261.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="898" dy="0">emits exactly one, on finish</tspan></text><rect class="rough" x="48" y="298" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="319.62" text-anchor="middle" font-size="13" font-weight="700" fill="#27323a"><tspan x="146" dy="0"># RequestOutputs /</tspan><tspan x="146" dy="16.12">request</tspan></text><rect class="rough" x="260" y="298" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="327.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="378" dy="0">growing, many</tspan></text><rect class="rough" x="512" y="298" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="327.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="630" dy="0">many deltas</tspan></text><rect class="rough" x="780" y="298" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="327.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="898" dy="0">exactly 1</tspan></text><rect class="rough" x="48" y="364" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="393.68" text-anchor="middle" font-size="13" font-weight="700" fill="#27323a"><tspan x="146" dy="0">used by</tspan></text><rect class="rough" x="260" y="364" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="393.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="378" dy="0">non-delta streaming</tspan></text><rect class="rough" x="512" y="364" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="393.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="630" dy="0">OpenAI SSE streaming</tspan></text><rect class="rough" x="780" y="364" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="385.88" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="898" dy="0">offline LLM.generate (forced</tspan><tspan x="898" dy="14.879999999999999">by _add_request)</tspan></text><rect class="rough" x="48" y="430" width="196" height="50" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="146" y="459.68" text-anchor="middle" font-size="13" font-weight="700" fill="#27323a"><tspan x="146" dy="0">mailbox coalescing</tspan></text><rect class="rough" x="260" y="430" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="378" y="459.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="378" dy="0">replace slot</tspan></text><rect class="rough" x="512" y="430" width="236" height="50" rx="10" fill="#fff" stroke="#30363d" stroke-width="1.6"/><text x="630" y="459.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="630" dy="0">aggregate=True → concatenate</tspan></text><rect class="rough" x="780" y="430" width="236" height="50" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="1.6"/><text x="898" y="459.32" text-anchor="middle" font-size="12" font-weight="500" fill="#27323a"><tspan x="898" dy="0">replace slot</tspan></text><text x="540" y="512.75" text-anchor="middle" font-size="12.5" font-weight="600" fill="#c07a1a"><tspan x="540" dy="0">FINAL_ONLY is the offline default that _add_request forces — the drain loop's `if output.finished:` relies on exactly one output per</tspan><tspan x="540" dy="15.5">request.</tspan></text><text x="540" y="561" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">CUMULATIVE re-sends the growing whole, DELTA emits only the new slice (mailbox aggregate=True concatenates), and</tspan><tspan x="540" dy="15.5">FINAL_ONLY emits exactly one output on finish — the mode _add_request forces for offline batch inference and that the `if</tspan><tspan x="540" dy="15.5">output.finished:` drain relies on.</tspan></text>
</svg>
