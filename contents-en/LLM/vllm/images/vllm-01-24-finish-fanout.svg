<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="672" viewBox="0 0 1080 672" role="img" aria-label="Finishing Fans Out on Two Clocks">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="672" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Finishing Fans Out on Two Clocks</tspan></text>
<rect class="rough" x="360" y="96" width="360" height="48" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="540" y="125.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="540" dy="0">_free_request  populates two sets</tspan></text><rect x="56" y="180" width="470" height="190" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="74" y="209.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="74" dy="0">Channel 1 → worker</tspan></text><rect class="rough" x="80" y="226" width="300" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="230" y="251.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="230" dy="0">finished_req_ids</tspan></text><text x="80" y="289.14" text-anchor="start" font-size="11" font-weight="500" fill="#27323a"><tspan x="80" dy="0">rides the NEXT SchedulerOutput → worker prunes the request from its</tspan><tspan x="80" dy="13.64">persistent / differential batch</tspan></text><text x="80" y="333.27" text-anchor="start" font-size="10.5" font-weight="500" fill="#66717a"><tspan x="80" dy="0">reset by reassignment (= set(), not clear()) so the just-emitted</tspan><tspan x="80" dy="13.02">SchedulerOutput keeps its reference</tspan></text><rect x="554" y="180" width="470" height="190" rx="16" fill="#dfeeff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="572" y="209.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="572" dy="0">Channel 2 → client</tspan></text><rect class="rough" x="578" y="226" width="330" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="743" y="250.68" text-anchor="middle" font-size="13" font-weight="800" fill="#27323a"><tspan x="743" dy="0">finished_req_ids_dict[client_index]</tspan></text><text x="578" y="297.14" text-anchor="start" font-size="11" font-weight="500" fill="#27323a"><tspan x="578" dy="0">attached to outgoing EngineCoreOutputs.finished_requests →</tspan><tspan x="578" dy="13.64">OutputProcessor retires its RequestState</tspan></text><path d="M 440 144 L 297.8 178.4" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 291 180 L 300.7 173.1 L 302.7 181.7 z" fill="#66717a"/><path d="M 640 144 L 782.2 178.4" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 789 180 L 777.3 181.7 L 779.3 173.1 z" fill="#66717a"/><rect class="rough" x="360" y="386" width="360" height="40" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="411.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="540" dy="0">_free_request_blocks  ·  decision</tspan></text><rect class="rough" x="56" y="458" width="470" height="86" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="291" y="498.01" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="291" dy="0">not defer_block_free or last_sched_seq &lt;= processed_step_seq</tspan><tspan x="291" dy="14.26">→ kv_cache_manager.free(request) NOW</tspan></text><rect class="rough" x="554" y="458" width="470" height="86" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="789" y="498.01" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27323a"><tspan x="789" dy="0">else → park (sched_step_seq, blocks) in deferred_frees</tspan><tspan x="789" dy="14.26">→ return to pool only after that GPU step completes</tspan></text><path d="M 470 426 L 297.9 456.8" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 291 458 L 301.1 451.7 L 302.6 460.4 z" fill="#66717a"/><path d="M 610 426 L 782.1 456.8" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 789 458 L 777.4 460.4 L 778.9 451.7 z" fill="#66717a"/><rect class="rough" x="56" y="562" width="968" height="40" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="540" y="578.88" text-anchor="middle" font-size="12" font-weight="600" fill="#27323a"><tspan x="540" dy="0">invariant: a block is never returned while an enqueued GPU write could still touch it; a finish is observable only after one</tspan><tspan x="540" dy="14.879999999999999">extra flush step</tspan></text><text x="540" y="625" text-anchor="middle" font-size="12.5" font-weight="500" fill="#66717a"><tspan x="540" dy="0">finished_req_ids rides the NEXT SchedulerOutput so the worker prunes the request, while finished_req_ids_dict rides THIS step's</tspan><tspan x="540" dy="15.5">EngineCoreOutputs.finished_requests so the client retires its RequestState — and _free_request_blocks frees now or parks blocks in</tspan><tspan x="540" dy="15.5">deferred_frees until any in-flight GPU write completes.</tspan></text>
</svg>
