<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700" role="img" aria-label="Finishing Fans Out on Two Clocks">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="700" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Finishing Fans Out on Two Clocks</tspan></text>
<rect class="rough" x="360" y="96" width="360" height="48" rx="10" fill="#f6c77c" stroke="#30363d" stroke-width="2"/><text x="540" y="125.4" text-anchor="middle" font-size="15" font-weight="800" fill="#27323a"><tspan x="540" dy="0">_free_request  populates two sets</tspan></text><rect x="56" y="180" width="470" height="202" rx="16" fill="#e5f4e9" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="74" y="209.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="74" dy="0">Channel 1 → worker</tspan></text><rect class="rough" x="80" y="226" width="300" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="230" y="251.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="230" dy="0">finished_req_ids</tspan></text><text x="80" y="294.36" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="80" dy="0">rides the NEXT SchedulerOutput → worker prunes the</tspan><tspan x="80" dy="17.36">request from its persistent / differential batch</tspan></text><text x="80" y="344.36" text-anchor="start" font-size="14" font-weight="500" fill="#66717a"><tspan x="80" dy="0">reset by reassignment (= set(), not clear()) so the</tspan><tspan x="80" dy="17.36">just-emitted SchedulerOutput keeps its reference</tspan></text><rect x="554" y="180" width="470" height="202" rx="16" fill="#dfeeff" stroke="#30363d" stroke-width="1.6" stroke-dasharray="8 7"/><text x="572" y="209.76" text-anchor="start" font-size="16" font-weight="700" fill="#66717a"><tspan x="572" dy="0">Channel 2 → client</tspan></text><rect class="rough" x="578" y="226" width="330" height="40" rx="10" fill="#fff" stroke="#30363d" stroke-width="2"/><text x="743" y="251.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="743" dy="0">finished_req_ids_dict[client_index]</tspan></text><text x="578" y="293.68" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="578" dy="0">attached to outgoing</tspan><tspan x="578" dy="17.36">EngineCoreOutputs.finished_requests →</tspan><tspan x="578" dy="17.36">OutputProcessor retires its RequestState</tspan></text><path d="M 440 144 L 297.8 178.4" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 291 180 L 300.7 173.1 L 302.7 181.7 z" fill="#66717a"/><path d="M 640 144 L 782.2 178.4" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 789 180 L 777.3 181.7 L 779.3 173.1 z" fill="#66717a"/><rect class="rough" x="360" y="400" width="360" height="40" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="540" y="425.04" text-anchor="middle" font-size="14" font-weight="800" fill="#27323a"><tspan x="540" dy="0">_free_request_blocks  ·  decision</tspan></text><rect class="rough" x="56" y="472" width="470" height="86" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="291" y="502.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="291" dy="0">not defer_block_free or last_sched_seq &lt;=</tspan><tspan x="291" dy="17.36">processed_step_seq</tspan><tspan x="291" dy="17.36">→ kv_cache_manager.free(request) NOW</tspan></text><rect class="rough" x="554" y="472" width="470" height="86" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="789" y="502.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="789" dy="0">else → park (sched_step_seq, blocks) in</tspan><tspan x="789" dy="17.36">deferred_frees</tspan><tspan x="789" dy="17.36">→ return to pool only after that GPU step completes</tspan></text><path d="M 470 440 L 297.9 470.8" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 291 472 L 301.1 465.7 L 302.6 474.4 z" fill="#66717a"/><path d="M 610 440 L 782.1 470.8" fill="none" stroke="#66717a" stroke-width="2.2"/><path d="M 789 472 L 777.4 474.4 L 778.9 465.7 z" fill="#66717a"/><rect class="rough" x="56" y="576" width="968" height="44" rx="10" fill="#ffe3de" stroke="#30363d" stroke-width="2"/><text x="540" y="594.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">invariant: a block is never returned while an enqueued GPU write could still touch it; the client sees the</tspan><tspan x="540" dy="17.36">finish this step — only worker-state cleanup waits one step</tspan></text><text x="540" y="645.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">finished_req_ids rides the NEXT SchedulerOutput so the worker prunes the request, while finished_req_ids_dict</tspan><tspan x="540" dy="17.36">rides THIS step's EngineCoreOutputs.finished_requests so the client retires its RequestState — and</tspan><tspan x="540" dy="17.36">_free_request_blocks frees now or parks blocks in deferred_frees until any in-flight GPU write completes.</tspan></text>
</svg>
