<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="592" viewBox="0 0 1080 592" role="img" aria-label="Reasoning-Before-Tools: A Two-Phase Parser State Machine">
<defs>
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.55"/>
  </filter>
  <marker id="arrow" viewBox="0 0 12 12" refX="9.2" refY="6" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
    <path d="M 1.5 2 L 11 6 L 1.5 10 z" fill="#30363d"/>
  </marker>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    .rough { filter: url(#roughen); }
  </style>
</defs>
<rect width="1080" height="592" fill="#fbfaf7"/>
<path d="M 40 86 H 1040" stroke="#e9e2d7" stroke-width="1"/>
<text x="54" y="53.72" text-anchor="start" font-size="27" font-weight="800" fill="#27323a"><tspan x="54" dy="0">Reasoning-Before-Tools: A Two-Phase Parser State Machine</tspan></text>
<rect class="rough" x="200" y="104" width="680" height="62" rx="10" fill="#b8d8ff" stroke="#30363d" stroke-width="2"/><text x="540" y="122.68" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="540" dy="0">first parse_delta seeds state.reasoning_ended from prompt tokens</tspan><tspan x="540" dy="17.36">(abstract_parser.py:805-817)</tspan><tspan x="540" dy="17.36">· matches server-side priming in _create_chat_completion</tspan></text><path d="M 400 166 L 256.7 211.9" fill="none" stroke="#30363d" stroke-width="2"/><path d="M 250 214 L 259.1 206.5 L 261.8 214.8 z" fill="#30363d"/><rect class="rough" x="70" y="214" width="360" height="170" rx="10" fill="#fff0d8" stroke="#30363d" stroke-width="2"/><text x="86" y="243.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="86" dy="0">STATE 1 · REASONING</tspan></text><text x="86" y="279.64000000000004" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="86" dy="0">guard _in_reasoning_phase =</tspan><tspan x="86" dy="17.36">(_reasoning_parser is not None)</tspan><tspan x="86" dy="17.36">and (not state.reasoning_ended)</tspan><tspan x="86" dy="17.36">———</tspan><tspan x="86" dy="17.36">action: reasoning extraction →</tspan><tspan x="86" dy="17.36">emit reasoning deltas</tspan></text><rect class="rough" x="650" y="214" width="360" height="170" rx="10" fill="#efe9ff" stroke="#30363d" stroke-width="2"/><text x="666" y="243.04" text-anchor="start" font-size="14" font-weight="800" fill="#27323a"><tspan x="666" dy="0">STATE 2 · TOOL_CALL</tspan></text><text x="666" y="270.96000000000004" text-anchor="start" font-size="14" font-weight="500" fill="#27323a"><tspan x="666" dy="0">guard _in_tool_call_phase =</tspan><tspan x="666" dy="17.36">(_tool_parser is not None)</tspan><tspan x="666" dy="17.36">and state.reasoning_ended</tspan><tspan x="666" dy="17.36">———</tspan><tspan x="666" dy="17.36">action: tool-call extraction →</tspan><tspan x="666" dy="17.36">dispatch by tool_choice:</tspan><tspan x="666" dy="17.36">named / required / auto</tspan></text><path d="M 430 292 L 643.0 292.0" fill="none" stroke="#30363d" stroke-width="2.4"/><path d="M 650 292 L 639.0 296.4 L 639.0 287.6 z" fill="#30363d"/><text x="540" y="262.36" text-anchor="middle" font-size="14" font-weight="700" fill="#c07a1a"><tspan x="540" dy="0">&lt;/think&gt; at :842-844</tspan><tspan x="540" dy="17.36">flips reasoning_ended = True</tspan></text><rect class="rough" x="70" y="400" width="360" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="250" y="418.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="250" dy="0">parser is None → guard False →</tspan><tspan x="250" dy="17.36">pass-through content</tspan></text><rect class="rough" x="650" y="400" width="360" height="44" rx="10" fill="#f1f3f4" stroke="#30363d" stroke-width="2"/><text x="830" y="418.36" text-anchor="middle" font-size="14" font-weight="600" fill="#27323a"><tspan x="830" dy="0">parser is None → guard False →</tspan><tspan x="830" dy="17.36">pass-through content</tspan></text><rect class="rough" x="44" y="460" width="992" height="44" rx="10" fill="#b9dfc3" stroke="#30363d" stroke-width="2"/><text x="540" y="487.04" text-anchor="middle" font-size="14" font-weight="700" fill="#27323a"><tspan x="540" dy="0">reasoning strictly before tools — enforced in TWO places: engine grammar AND client-facing parser</tspan></text><text x="540" y="539.68" text-anchor="middle" font-size="14" font-weight="500" fill="#66717a"><tspan x="540" dy="0">DelegatingParser.parse_delta is a two-phase state machine: the reasoning phase strictly precedes the</tspan><tspan x="540" dy="17.36">tool-call phase (after an end-of-reasoning marker like &lt;/think&gt; flips reasoning_ended), so tool syntax is</tspan><tspan x="540" dy="17.36">never parsed out of &lt;think&gt; tokens.</tspan></text>
</svg>
